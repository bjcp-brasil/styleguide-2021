  - id: '4'
    name: Pale Malty European Lager
    notes: Essa categoria de estilos contém lagers alemãs claras de força vollbier (densidade inicial entre 11°P e 14°P) à starkbier (densidade inicial acima de 16°P) que enfatizam o sabor de malte Pilsner no equilíbrio, mantendo-se bem atenuadas.
    subcategory:
    - id: 4A
      name: Munich Helles
      impression: Uma lager alemã de cor dourada com sabor maltado suave e com um final macio e seco. A presença sutil de lúpulo condimentado, floral e/ou herbal e amargor contido ajudam a manter o equilibro maltado, mas não doce, o que ajuda a fazer dessa cerveja uma bebida refrescante para o dia a dia.
      aroma: Aroma de malte como cereais adocicado. Aroma de lúpulo condimentado, floral e/ou de herbal de baixo a moderadamente baixo. Perfil de fermentação agradável e limpo, com o malte dominando o equilíbrio. Os exemplares mais frescos vão ter mais aroma adocicado de malte.
      appearance: Cor de amarelo claro a dourado claro. Límpida. Colarinho branco, cremoso e persistente.
      flavor: Início moderadamente maltado com uma sugestão de dulçor, sabor de malte adocicado como cereais de intensidade moderada com uma impressão macia e arredondada no sabor, sustentada pelo amargor de baixo a médio-baixo. Final macio e seco, não é bem definida e cortante. Sabor de lúpulo condimentado, floral e/ou de herbal de baixo a moderadamente baixo. O malte domina o lúpulo no sabor, no final e no retrogosto, mas o lúpulo deve ser perceptível. Sem dulçor residual, somente a impressão maltada com amargor contido. Perfil de fermentação limpo.
      mouthfeel: Corpo médio. Carbonatação média. Perfil suave de maturação a frio bem feita (lagering).
      comments: Exemplares muito frescos podem ter um caráter de malte e lúpulo mais proeminente que se dissipa ao longo do tempo, como é frequentemente notado nas cervejas exportadas. A Helles em Munique tende a ser uma versão mais leve do que as de fora da cidade. Pode ser chamada de Helles Lagerbier.
      history: Criada em Munique em 1894 para competir com cervejas clara do tipo Pilsner, geralmente sendo creditada pela primeira vez a Spaten. Mais popular no sul da Alemanha.
      ingredients: Malte Pilsner da Europa continental. Lúpulos tradicionais alemães. Levedura lager alemã limpa.
      comparison: Equilíbrio e amargor similar a Munich Dunkel, mas com uma natureza menos adocicada de malte e de cor clara ao invés de ser escura e rica. Maior corpo e presença de malte do que uma German Pils, mas não tão definida e com menos caráter de lúpulo. Perfil de malte similar a de uma German Helles Exportbier, porém com menos lúpulo no equilíbrio e levemente menos alcoólica. Menos corpo e álcool do que uma Festbier
