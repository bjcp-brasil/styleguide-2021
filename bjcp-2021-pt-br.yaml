    - id: 27A
      name: 'Historical Beer: Piwo Grodziskie'
      impression: Uma cerveja de trigo histórica da região central europeia com densidade baixa, amarga e defumada por carvalho, com um perfil de fermentação limpo e sem acidez. Altamente carbonatada, seca, com final bem definido e refrescante.
      aroma: Defumado por madeira de carvalho de baixo a moderado é o componente de aroma mais proeminente, mas pode ser sutil e difícil detectar. Aroma de lúpulo condimentado, herbal ou floral de baixa intensidade está tipicamente presente e deve ser em intensidade menor ou igual ao defumado. Notas de cereais como trigo também são detectados nos melhores exemplares. Fora essas características, o aroma é limpo, embora ésteres leves de frutas de pomar (especialmente maçã vermelha madura ou pera) sejam bem-vindos. Sem acidez. Leve enxofre é opcional.
      appearance: Cor de amarelo palha a dourado, com excelente limpidez. Um colarinho alto, largo, branco, bem coeso, com excelente retenção é característico. Turbidez alta é uma falha.
      flavor: Sabor defumado por carvalho de moderadamente baixo a médio em primeiro plano e se mantém até o final; o defumado pode ser mais forte no sabor do que no aroma. O caráter de defumado é delicado e não deve ser acre e pode trazer uma impressão de dulçor. Amargor de moderado a forte é evidente e permanece até o final. O equilíbrio geral é para o lúpulo. Sabor de lúpulo condimentado, herbal ou floral baixo, mas perceptível. Caráter de cereais como trigo de intensidade baixa como uma nota de fundo. Ésteres leves como frutas de pomar (maçã vermelha ou pera) podem estar presentes. Final seco e bem definido. Sem acidez.
      mouthfeel: Corpo leve, com um final bem definido e seco. Carbonatação é bem alta e pode adicionar uma leve picância carbônica ou uma sensação de formigamento. Sem aquecimento alcoólico.
      comments: 'Pronunciada em inglês ’pivo grow-JEES-kee-uh’ (significa: Cerveja de Grodzisk). Conhecida como Grätzer (pronunciado ’GRATE-sir’) em países de língua alemã e em alguma literatura de cerveja. Tradicionalmente feita por uma brassagem por rampas, uma longa fervura ( 2 horas) e múltiplas cepas de levedura ale. A cerveja nunca é filtrada, mas é usado Isinglass para clarificar a cerveja antes da refermentação na garrafa. Servida tradicionalmente em copos cônicos altos para acomodar a vigorosa espuma gerada.'
      history: Desenvolvida séculos atrás como um estilo único na cidade polonesa de Grodzizk (conhecida como Grätz quando governada pela Prússia e Alemanha). Sua fama e popularidade se estendeu rapidamente para outras partes do mundo no fim do século 19 e início do século 20. A produção comercial regular diminuiu depois da Segunda Guerra Mundial e acabou nos anos 90. Essa descrição de estilo descreve a versão tradicional durante o seu período de maior popularidade.
      ingredients: Malte de trigo defumado em carvalho, que tem um caráter menos intenso de defumado do que o Rauchmalz alemão e uma qualidade mais seca e crisp. Sabor defumado como de bacon ou presunto é inapropriado. Lúpulos tradicionais poloneses, tchecos ou alemães. Água com dureza moderada de sulfatos. Levedura ale limpa e atenuante. Levedura Weizen é inapropriada.
      comparison: Similar em força a uma Berliner Weisse, mas nunca deve ser ácida e é muito mais amarga. Tem um caráter defumado mas com intensidade mais baixa do que em uma Rauchbier. Densidade mais baixa que uma Lichtenhainer mas mais amarga e não ácida. Mais amarga que uma Gose mas sem sal e condimentos.
