  - id: '19'
    name: Amber and Brown American Beer
    notes: Esta categoria contém ales americanas modernas, âmbar e marrom, de alta fermentação e lagers de fermentação em temperaturas mais quentes, com teor alcoólico padrão, que podem ser de equilibradas a amargas.
    subcategory:
    - id: 19A
      name: American Amber Ale
      impression: Uma cerveja artesanal americana âmbar, lupulada e de força moderada, com um sabor de caramelo maltado. O equilíbrio pode variar um pouco, com algumas versões sendo bastante maltadas e outras agressivamente lupuladas. As versões lupuladas e amargas não devem ter sabores conflitantes com o perfil do malte caramelo.
      aroma: Aroma de lúpulo de baixo a moderado, refletindo variedades de lúpulos americanos ou do Novo Mundo (cítrico, floral, de pinho, resinoso, condimentado, de frutas tropicais, de frutas de caroço, de frutas vermelhas ou de melão). Um caráter cítrico de lúpulo é comum, mas não é obrigatório. Malte de moderadamente baixo a moderadamente alto, geralmente com um caráter moderado de caramelo, que pode dar suporte, equilibrar ou às vezes mascarar a apresentação do lúpulo. Os ésteres variam de nenhum a moderados.
      appearance: Cor de âmbar profundo a marrom acobreado, às vezes com um tom avermelhado. Colarinho quase branco e moderadamente volumoso, com boa retenção. Geralmente bastante límpida.
      flavor: Sabor de lúpulo de moderado a alto com características semelhantes ao aroma. Os sabores de malte são de moderados a fortes e geralmente mostram um dulçor maltado inicial seguido de um sabor moderado de caramelo e, às vezes, sabores de malte tostado ou biscoito em quantidades menores. Sabores de maltes escuros ou torrados ausentes. Amargor de moderado a moderadamente alto. O equilíbrio pode variar de um pouco maltado a um pouco amargo. Ésteres frutados podem ser de moderados a nenhum. O dulçor do caramelo, o sabor do lúpulo e o amargor podem permanecer um pouco no final, com intensidade de média a alta, embora ainda seja seco.
      mouthfeel: Corpo de médio a médio-cheio. Carbonatação de média a alta. Acabamento geral macio e sem adstringência. Versões com teor alcoólico mais alto podem ter um leve aquecimento alcoólico.
      comments: Pode se sobrepor na cor com as American Pale Ales mais escuras, mas com sabor e equilíbrio de malte diferentes. Existe uma gama de equilíbrios neste estilo, desde equilibrado e maltado, até mais agressivamente lupulado.
      history: Um estilo moderno de cerveja artesanal americana desenvolvido como uma variação das American Pale Ales. A Mendocino Red Tail Ale foi produzida pela primeira vez em 1983 e era conhecida regionalmente como Red Ale. Ela serviu como progenitora das Double Reds (American Strong Ale), Red IPAs e outras cervejas lupuladas e caramelizadas.
      ingredients: Malte Pale Ale neutro. Maltes crystal médio a escuro. Lúpulos americanos ou do Novo Mundo são comuns, muitas vezes com sabores cítricos, mas outros também podem ser usados. Levedura de neutra a que produz leve esterificação.
      comparison: Mais escura, mais caramelizada, mais encorpada e geralmente menos amarga no equilíbrio do que as American Pale Ales. Menos álcool, amargor e caráter de lúpulo do que as Red IPAs. Menor teor alcoólico, malte e caráter de lúpulo do que American Strong Ales. Menos chocolate e caramelo escuro do que uma American Brown Ale.
