    - id: 9B
      name: Eisbock
      impression: Uma lager alemã escura, forte, encorpada, rica e maltada, frequentemente com uma qualidade viscosa e sabores intensos. Mesmo que os sabores sejam concentrados, o álcool deve ser suave com leve aquecimento, não quente.
      aroma: Dominado por malte intenso e rico e pela presença marcante de álcool. O malte pode ter caráter de pão, tostado, com algum caramelo ou leves notas de chocolate, frequentemente com notas de frutas escuras como ameixas ou uvas. Sem aroma de lúpulo. O aroma de álcool não deve ser áspero ou solvente. Perfil de fermentação limpo.
      appearance: Coloração de cobre profundo a marrom escuro, muitas vezes com atraentes reflexos rubi. Boa limpidez. A retenção da espuma pode ser de moderada a baixa. Colarinho de cor quase branca a marfim profundo. Lágrimas pronunciadas nas laterais do copo são frequentemente evidentes.
      flavor: Malte rico e doce, equilibrado por uma presença significativa de álcool. O malte pode ter produtos de Maillard, qualidades tostadas, um pouco de caramelo e, ocasionalmente, um leve sabor de chocolate. Pode apresentar uma quantidade considerável de ésteres de frutas escuras derivados do malte. O amargor do lúpulo compensa o dulçor do malte o suficiente para evitar um caráter enjoativo. Sem sabor de lúpulo. O álcool ajuda a equilibrar a forte presença do malte. O final deve ser rico em malte com certa secura do álcool. Não deve possuir caráter de xarope, viscosidade ou dulçor enjoativo. Perfil de fermentação limpo.
      mouthfeel: Corpo de cheio a muito cheio. Baixa carbonatação. Aquecimento alcoólico significativo sem queimar. Muito macia e sedosa, sem aspereza de álcool, amargor, álcool superior ou outros sabores concentrados.
      comments: Longa maturação a frio é necessária após o congelamento para suavizar o álcool e melhorar o equilíbrio entre o malte e o álcool. Pronuncia-se “ICE-bock.”
      history: Originária de Kulmbach, na Francônia, no final dos anos 1800, embora a origem exata não seja conhecida. As fábulas a descrevem como proveniente do congelamento acidental da cerveja em uma cervejaria.
      ingredients: Os mesmos utilizados na Doppelbock. Produzida pelo congelamento de uma cerveja tipo Doppelbock e a remoção do gelo (“destilação por congelamento”), concentrando assim os sabores e o álcool, bem como quaisquer defeitos presentes. As Eisbocks comerciais geralmente tem entre 7 e 33% ABV.
      comparison: As Eisbocks não são simplesmente Doppelbocks mais fortes; o nome se refere ao processo de congelamento e concentração da cerveja, não sendo uma declaração relativa ao álcool; algumas Doppelbocks são mais fortes que algumas Eisbocks. Não é tão espessa, rica ou doce quanto uma Wheatwine.
