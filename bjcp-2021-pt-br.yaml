      name: Experimental Beer
      impression: Varia, mas deve ser uma experiência única.
      aroma: Varia.
      appearance: Varia.
      flavor: Varia.
      mouthfeel: Varia.
      comments: O estilo não pode representar uma cerveja comercial reconhecida (caso contrário, ela deveria ser uma Commercial Specialty Beer) e não pode se encaixar em nenhum outro estilo de Cerveja de Especialidade (incluindo aqueles dentro dessa categoria).
      statistics:
