      impression: De acordo com os estilos base, métodos e ingredientes declarados. Assim como todas as Cervejas de Especialidade, o resultado da combinação dos estilos precisa ser harmonioso, equilibrado e agradável de beber.
      aroma: De acordo com os estilos base declarados.
      appearance: De acordo com os estilos base declarados.
      flavor: De acordo com os estilos base declarados.
      mouthfeel: De acordo com os estilos base declarados.
      comments: Veja o preâmbulo para o propósito.
      statistics:
