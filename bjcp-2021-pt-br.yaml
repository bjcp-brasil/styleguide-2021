      name: 'Specialty IPA: Red IPA'
      impression: Uma cerveja lupulada, amarga e de teor alcoólico moderadamente alto, como uma American IPA, mas com algum caráter de caramelo, de toffee ou de fruta similar a uma American Amber Ale. Mantendo o final seco e o corpo leve que torna as IPAs fáceis de beber; uma Red IPA é um pouco mais saborosa e maltada do que uma American IPA, sem ser doce ou pesada.
      aroma: Aroma de lúpulo de moderado a forte, muitas vezes com um caráter de frutas de caroço, de frutas tropicais, de frutas cítricas, resinoso, de pinho, de frutas vermelhas ou de melão. O aroma adocicado de malte, de médio-baixo a médio, combina bem com a seleção de lúpulos e geralmente apresenta caramelo de médio a escuro, toffee, pão tostado ou caráter de frutas escuras. Perfil de fermentação limpo. Ésteres leves são opcionais. Aroma leve de álcool é opcional.
      appearance: Cor variando de âmbar avermelhado claro a cobre avermelhado escuro. Límpida. Leve turbidez é opcional. Colarinho de tamanho médio, de quase branco a creme, com boa persistência.
      flavor: Sabor de lúpulo de médio a muito alto, mesmos descritores do aroma. Suporte do malte limpo, de médio-baixo a médio, com os mesmos descritores do aroma. As escolhas de malte e lúpulo não devem produzir conflitos de sabor. Amargor de médio-alto a muito alto, sem aspereza. Final de seco a médio, com um retrogosto amargo, lupulado e maltado. Ésteres baixos são opcionais. Sabor de álcool muito baixo é opcional. O malte não deve ofuscar o sabor e o amargor do lúpulo no equilíbrio.
      mouthfeel: Corpo de médio-leve a médio, com uma textura macia. Carbonatação de média a média-alta. Sem aspereza. Leve aquecimento alcoólico é opcional.
      comments: Destacada da American Amber Ale para melhor diferenciar os exemplos com maior teor alcoólico e altamente lupulados das cervejas mais equilibradas e de teor alcoólico padrão.
      history: Um estilo moderno de cerveja artesanal americana, baseada na American IPA, mas com os sabores de malte de uma American Amber Ale. Veja American Amber Ale.
      ingredients: Semelhante a uma American IPA, mas com maltes crystal médios ou escuros, possivelmente alguns maltes com um leve aspecto tostado. Podem ser usados açúcares como adjuntos. Qualquer caráter de lúpulo americano ou do novo mundo é aceitável, mas os lúpulos e o perfil maltado não devem entrar em conflito.
