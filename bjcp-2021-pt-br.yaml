    - id: 4C
      name: Helles Bock
      impression: Uma lager alemã relativamente clara, forte e maltada com um final bem atenuado que aumenta a facilidade de beber. O caráter de lúpulo é geralmente mais aparente e o caráter de malte menos profundamente rico do que em outras Bocks.
      aroma: Aroma de malte adocicado como cereais de moderado a forte, muitas vezes com qualidade levemente tostada e baixos níveis de produtos de reação de Maillard. Aroma de lúpulo condimentado, herbal e/ou floral moderadamente baixo é opcional. Perfil de fermentação limpo. Opcionalmente pode apresentar ésteres frutados de baixa intensidade. Álcool muito leve é opcional.
      appearance: Cor de dourado profundo a âmbar claro. Limpidez de brilhante a limpa. Espuma volumosa, cremosa, persistente e de cor branca.
      flavor: Sabor de malte de moderado a moderadamente forte, predominância de adocicado lembrando cereais, massa de pão, pão e/ou levemente tostado com alguns produtos ricos de reação de Maillard adicionando complexidade. Pouco sabor de caramelo é opcional. Sabor de lúpulo de baixo a moderado de perfil condimentado, herbal, floral, apimentado é opcional, mas presente nos melhores exemplares. Amargor de lúpulo moderado, mais presente no equilíbrio do que em outras Bocks. Perfil de fermentação limpo. Bem atenuada, não é enjoativa e com um final moderadamente seco que pode ter sabor tanto de malte quanto de lúpulo.
      mouthfeel: Corpo médio. Carbonatação de moderada a moderadamente alta. Suave e limpa, sem aspereza ou adstringência, apesar do amargor de lúpulo mais alto. Leve aquecimento alcoólico é opcional.
      comments: Também conhecida como Maibock. Em comparação com cervejas Bock mais escuras, os lúpulos compensam o baixo nível de produtos de reação de Maillard no equilíbrio.
      history: Um desenvolvimento bem recente se comparado aos outros membros da família bock. A disponibilidade da Maibock é uma oferta sazonal associada à primavera, ao mês de maio e pode apresentar uma gama de cores e lupulagem mais ampla do que é visto em produtos exportados.
      ingredients: Uma combinação de malte Pils, Vienna e Munich. Sem adjuntos. Uso de malte tipo crystal claro em pequenas quantidades é possível. Lúpulos alemães tradicionais. Levedura de lager limpa. Mostura usando decocção é tradicional, mas o tempo de fervura é menor em comparação com uma Dunkles Bock para controlar o desenvolvimento da cor. Água mole.
      comparison: Pode ser considerada como uma versão mais clara de uma Dunkles Bock ou como uma Munich Helles ou Festbier produzida com a intensidade de uma bock. Embora muito maltada, essa cerveja geralmente tem menos riqueza e sabores de malte escuro e pode ser mais seca, mais lupulada e mais amarga do que uma Dunkles Bock. Menos forte do que uma Doppelbock clara, mas com sabores similares.
