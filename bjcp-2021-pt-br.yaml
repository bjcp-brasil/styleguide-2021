    - id: 24B
      name: Belgian Pale Ale
      impression: Uma cerveja belga de alta fermentação, feita somente com malte, de força média, moderadamente amarga, sem dry-hopping e sem sabores fortes. Uma cerveja de cor acobreada que não traz junto o caráter agressivo de levedura ou acidez de muitas cervejas belgas; tem bom equilíbrio entre o maltado e o frutado, tendo muitas vezes um perfil de pão e de tostado.
      aroma: Aroma moderado de malte de pão, que pode incluir notas tostadas, de biscoito ou de nozes, possivelmente com um leve toque de caramelo ou mel. Frutado de moderado a moderadamente alto complementa o malte e é sugestivo de pera, laranja, maçã ou limão e, às vezes, de frutas de caroço mais escuras, como ameixas. Caráter de lúpulo picante, herbal ou floral de baixo a moderado. Baixo teor de fenólicos apimentados e condimentados são opcionais. O caráter do lúpulo é mais baixo em equilíbrio do que o malte e o frutado.
      appearance: Cor âmbar a cobre. Limpidez é muito boa. Colarinho branco cremoso e sólido. Bem carbonatada.
      flavor: Tem um sabor inicial macio, suave e moderadamente maltado com um perfil variável de tostado, biscoito, nozes, caramelo leve ou notas de mel. Frutado de moderado a moderadamente alto, com caráter de pera, laranja, maçã ou limão. Caráter de lúpulo picante, herbal ou floral de médio-baixo a baixo. Amargor de médio-alto a médio-baixo, reforçado por fenólicos apimentados opcionais de baixo a muito baixo. Final de seco a equilibrado, com o lúpulo se tornando mais pronunciado no retrogosto daquelas com final mais seco. No geral bastante equilibrado, sem nenhum componente único de alta intensidade; inicialmente, o malte e o frutado são mais destacados, com um suporte do amargor e um caráter seco no final.
      mouthfeel: Corpo médio a médio-leve. Paladar suave. O nível de álcool é contido e qualquer caráter de aquecimento deve ser baixo, quando presente. Carbonatação média a média-alta.
      comments: Mais comumente encontrado nas províncias flamengas de Antuérpia, Brabante, Hainaut e Flandres Oriental. Uma Spéciale Belge Ale (Belgian Special Ale) na Bélgica.
      history: Surgida após uma competição em 1904 para criar uma cerveja especial regional para competir com cervejas britânicas importadas e lagers continentais. De Koninck da Antuérpia é o exemplo moderno mais conhecido, fazendo a cerveja desde 1913.
      ingredients: Conjunto de grãos variável com maltes pale, caramelo e de caráter específico. Sem adjuntos. Lúpulos ingleses ou continentais. Levedura frutada com baixo teor de fenóis.
      comparison: Bastante semelhante às pale ales da Inglaterra (11C Strong Bitter), tipicamente com um caráter de levedura ligeiramente diferente e um perfil de malte mais variado. Menos caráter de levedura do que muitas outras cervejas belgas, no entanto.
