    - id: 14B
      name: Scottish Heavy
      impression: Uma cerveja maltada de teor alcoólico mais baixo com sabores leves de caramelo, tosta, toffee e frutas. Uma leve secura proveniente de torra compensa a doçura residual no final, com o amargor percebido apenas para evitar que a cerveja seja enjoativa.
      aroma: Malte de médio-baixo a médio com notas de caramelo e toffee, e qualidades levemente tostadas e açucaradas que podem remeter a migalhas de pão torrado, biscoito champagne, biscoitos ingleses, bolacha crackers ou caramelo. Leve frutado de maçã/pera e leve aroma de lúpulo inglês (terroso, floral, laranja-cítrico, picante, etc.) são permitidos.
      appearance: De cobre claro a marrom. Límpida. Colarinho cremoso, quase branco, de baixo a moderado.
      flavor: Malte médio como pão tostado, com nuances de caramelo e toffee, terminando com uma leve secura proveniente de torra. Uma ampla gama de sabores de açúcar caramelizado e pão tostado é possível, usando descritores semelhantes ao aroma. Maltado e perfil de fermentação limpos. Ésteres e sabor de lúpulo leves são permitidos (descritores semelhantes ao aroma). Amargor suficiente para não ser enjoativa, mas com equilíbrio e retrogosto de maltado.
      mouthfeel: Corpo médio-leve a médio. Carbonatação de baixa a moderada. Pode ser moderadamente cremosa.
      comments: Veja a introdução da categoria para comentários detalhados. Pode não parecer tão amarga quanto as especificações indicam devido à densidade final maior e dulçor residual. Não confunda a leve secura proveniente de torra com defumado; o defumado não está presente nessas cervejas.
      history: Veja a introdução da categoria. Os nomes de cervejas Shilling eram usados para cervejas suaves (não envelhecidas) antes da Primeira Guerra Mundial, mas os estilos assumiram uma forma moderna apenas após a Segunda Guerra Mundial.
      ingredients: Na sua forma mais simples, malte pale ale e malte com mais cor, mas também pode usar açúcares, milho, trigo, malte crystal, corantes e uma variedade de outros grãos. Levedura limpa. Água leve. Sem malte defumado com turfa.
      comparison: Veja a introdução da categoria. Semelhante a outras Scottish Ales em perfil de sabor, de cor mais clara e mais forte que uma Scottish Light. Semelhante em teor alcoólico a Ordinary Bitter, mas com um perfil de sabor e equilíbrio diferentes.
