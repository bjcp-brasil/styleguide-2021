    - id: 27A
      name: 'Historical Beer: Roggenbier'
      impression: Uma Dunkles Weissbier feita com centeio ao invés de trigo, mas com um corpo mais alto e menos lúpulos de finalização. O centeio dá um sabor de pão e apimentado, um corpo mais cremoso e um final mais seco e como cereais, que combina com o característico banana e cravo da levedura Weizen.
      aroma: Aroma condimentado de centeio de baixo a moderado (como pimenta preta) mesclado com aromáticos de levedura Weizen (condimentado como cravo e ésteres frutados, banana ou cítrico) de baixo a moderado. Lúpulo condimentado, floral ou herbal de intensidade baixa é aceitável.
      appearance: Cor de cobre alaranjado claro a um cobre amarronzado ou avermelhado escuro. Colarinho alto e cremoso de cor quase branca até castanho claro, bastante denso e persistente e, muitas vezes, espesso e firme. Aparência turva.
      flavor: Sabor de cereais e centeio como condimentado ou apimentado de moderadamente baixo a moderadamente alto, muitas vezes tendo um sabor terroso lembrando pão de centeio ou centeio integral. Amargor de médio a médio-baixo permite um dulçor inicial de malte (às vezes com um pouco de caramelo) que pode ser saboreado antes que o caráter de levedura e apimentado de centeio assumam o controle. Caráter de banana e cravo de levedura Weizen de baixo a moderado, embora o equilíbrio possa variar. Final meio seco, como cereais com um retrogosto levemente amargo (do centeio). Lúpulo condimentado, herbal ou floral de baixo a moderado é aceitável e pode persistir no retrogosto.
      mouthfeel: Corpo de médio a médio-alto. Carbonatação alta. Cremosidade moderada.
      comments: Centeio é um grão sem casca e dificulta a mostura, muitas vezes resultando em um mosto com textura de goma, propensa a ficar pegajosa. O centeio tem sido caracterizado como o cereal com o sabor mais assertivo. Não é apropriado adicionar semente de cominho como alguns cervejeiros norte-americanos fazem; o caráter condimentado do centeio é tradicionalmente vindo apenas dos grãos.
      history: Uma cerveja de centeio alemã especial fabricada em Regensburg, na Baviera, em 1988, na cervejaria Schierlinger. Depois da eventual compra pela Paulaner a cerveja hoje é posicionada no mercado como uma marca regional e por isso é difícil de ser encontrada.
      ingredients: Até 60% de centeio malteado na lista de grãos. Maltes Pale e de trigo. Maltes tipo cristal e maltes escuro sem casca podem ser usados. Levedura Weizen. Lúpulos alemães ou tchecos. Mostura por decocção usando um processo patenteado.
      comparison: Uma variante mais distinta de uma Dunkles Weissbier usando centeio malteado no lugar de trigo malteado. Cervejas de centeio norte americanas não terão o caráter de levedura weizen e terão mais lúpulo.
