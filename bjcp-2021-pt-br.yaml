    - id: 5D
      name: German Pils
      impression: Uma lager alemã, clara, seca e amarga com aroma proeminente de lúpulo. Apresenta final bem definido, limpo e refrescante, exibindo uma cor dourada brilhante com excelente retenção de espuma.
      aroma: Lúpulo floral, picante/condimentado e/ou herbal de moderado a moderadamente-alto. Presença de malte lembrando cereais, adocicado e/ou massa de pão com intensidade de baixo a médio, frequentemente com leve notas de mel e de biscoito tostado. Perfil de fermentação limpo. O lúpulo deve estar à frente, mas não dominar totalmente o malte no equilíbrio.
      appearance: De amarelo palha a amarelo profundo, de brilhante a muito límpida, com espuma branca, cremosa e de longa duração.
      flavor: O sabor inicial de malte é rapidamente superado pelo sabor e amargor do lúpulo, levando a um final seco e bem definido (crisp). Sabor de malte e lúpulo similar ao aroma (mesmos descritores e intensidades). Amargor de médio a alto, persistente no retrogosto junto com um toque de malte e lúpulo. Perfil de fermentação limpo. Água com caráter mineral pode acentuar e prolongar o final seco. O lúpulo e o malte podem diminuir com o tempo, mas a cerveja deve ter sempre o equilíbrio tendendo ao amargor.
      mouthfeel: Corpo médio-leve. Carbonatação de média a alta. Não deve ser pesada. Sem aspereza, mas pode apresentar uma nitidez mineral em alguns exemplares.
      comments: Exemplares modernos da Pils tendem a ficar mais claros na cor, mais secos e nítidos no final e mais amargos conforme se move do sul para o norte na Alemanha, frequentemente refletindo o aumento de sulfatos na água. As Pils encontradas na Baviera tendem a ser um pouco mais suaves no amargor, com mais sabor de malte e caráter de lupulagem tardia, mas ainda com lúpulo o suficiente e final bem definido para se diferenciar da Munich Helles. O uso do termo ’Pils’ é mais comum na Alemanha do que o termo ’Pilsner’ para diferenciar do estilo tcheco e (algumas pessoas dizem) para mostrar respeito.
      history: Adaptada da Pilsner Tcheca para se adequar às condições de produção cervejeira da Alemanha, particularmente à água com maior teor de minerais e variedades de lúpulo nacionais. Fabricada pela primeira vez na Alemanha no início da década de 1870. Tornou-se mais popular após a Segunda Guerra Mundial, à medida que as escolas de cerveja alemãs enfatizaram técnicas modernas. Juntamente com sua “prima” Czech Pilsner, é a ancestral dos estilos de cerveja mais amplamente produzidos atualmente.
      ingredients: Malte Pilsner Europeu continental. Lúpulos tradicionais alemães. Levedura lager alemã limpa.
      comparison: Mais leve em corpo e cor, mais seca, com final mais bem definido, mais atenuada, amargor mais persistente e carbonatação mais alta do que uma Czech Premium Pale Lager. Mais caráter de lúpulo, sabor de malte e amargor do que a International Pale Lager. Mais caráter de lúpulo e amargor, com um final mais seco e mais bem definido do que uma Munich Helles; a Helles tem mais intensidade de malte, mas com o mesmo caráter da German Pils.
