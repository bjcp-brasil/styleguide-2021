      aroma: Aroma de lúpulo de proeminente a intenso, tipicamente apresentando características modernas de lúpulos americanos ou do novo mundo, como cítrico, floral, pinho, resinoso, condimentado, frutas tropicais, frutas de caroço, frutas vermelhas ou melão. O malte pode vir como suporte, em segundo plano, limpo, de neutro a como cereais. Perfil de fermentação neutro a levemente frutado. O álcool pode ser notado, mas não deve ser similar a solvente.
      appearance: De dourada a laranja-acobreada clara, mas a maioria das versões modernas é bastante clara. Boa limpidez, embora um pouco de turbidez seja aceitável. Colarinho de tamanho moderado, persistente, de quase branco e branco.
      flavor: Sabor de lúpulo forte e complexo (mesmos descritores do aroma). Amargor de moderadamente alto a muito alto, mas não deve ser áspero. Suporte do malte de baixo a médio, limpo, suave e discreto; pode ter sabores leves de caramelo ou tostado. Final de seco a médio-seco, não pode ser doce ou pesado, com um retrogosto persistente de lúpulo e amargor. Frutado baixo a moderado opcional. Um sabor de álcool leve, limpo e suave é permitido.
      mouthfeel: Corpo de médio-leve a médio, com uma textura macia. Carbonatação de média a média-alta. Sem adstringência áspera vinda do lúpulo. Aquecimento alcoólico suave e contido é aceitável.
      comments: Raramente chamada de Imperial IPA. Muitas versões modernas têm várias adições de dry-hop.
      history: Uma inovação de cerveja artesanal americana desenvolvida pela primeira vez em meados da década de 1990 como uma versão mais intensa da American IPA. Tornou-se mais dominante e popular ao longo dos anos 2000 e inspirou a criatividade adicional das IPAs. Russian River Pliny the Elder, fabricada pela primeira vez em 2000, ajudou a popularizar o estilo.
