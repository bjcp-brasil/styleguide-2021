  - id: '26'
    name: Monastic Ale
    notes: As instituições religiosas possuem uma longa história de produção de cerveja na Bélgica, embora algumas vezes interrompida por conflitos e ocupações, como a que ocorreu durante as Guerras Napoleônicas e a Primeira Guerra Mundial. Pouquíssimas dessas instituições produzem cervejas atualmente, embora muitas licenciaram seus nomes para cervejarias comerciais. Apesar da produção limitada, os estilos tradicionais derivados dessas cervejarias foram bem influentes e se espalharam para além da Bélgica. Vários termos têm sido usados para descrever essas cervejas, mas muitas são denominações protegidas e refletem a origem da cerveja e não um estilo. Esses mosteiros podem produzir qualquer estilo que escolherem, entretanto os estilos indicados nessa categoria são os estilos mais comuns associados a essa tradição cervejeira. Diferenciamos as cervejas desta categoria daquelas que foram inspiradas pelas cervejarias religiosas. Apesar das alegações de exclusividade, essas cervejas compartilham
      de vários atributos comuns que ajudam a caracterizar os estilos. São todos estilos de alta fermentação, com uma alta atenuação (“-mais digerível” na Bélgica), atingem alta carbonatação através de acondicionamento em garrafa (“-refermentada em garrafa” na Bélgica) e tem caráter de levedura belga distinto, complexo, com condimentado e esterificado agressivo. Muitas tem teor alcoólico alto.
    subcategory:
    - id: 26A
      name: Belgian Single
      impression: Uma cerveja de mesa clara, amarga e lupulada, muito seca e altamente carbonatada. O caráter agressivo frutado-condimentado da levedura belga e o alto amargor predominam no equilíbrio, com uma base de malte suave, de apoio, levemente como cereais e adocicado, além de um perfil de lúpulo condimentado-floral.
      aroma: Característica de levedura belga de intensidade média-baixa a média-alta, exibindo um caráter frutado e condimentado em conjunto com um perfil de intensidade média-baixo a média de lúpulo condimentado ou floral, ocasionalmente realçadas por toques leves de especiarias herbais ou cítricas. Em segundo plano, o malte é de baixo a médio-baixo, com notas de pão, biscoito, cereais ou mel suave. O frutado pode variar bastante (maçã, pera, toranja, limão, laranja, pêssego, damasco). Fenólicos são tipicamente como pimenta preta ou cravo. Tutti-frutti é inapropriado.
      appearance: Cor de amarelo claro a dourado médio. Geralmente tem boa limpidez, com um colarinho lembrando merengue de coloração branca, de tamanho moderado, persistente, com característico rendado belga.
      flavor: No início, o sabor maltado é leve com caráter de biscoito de mel, pão ou biscoito tipo água e sal. Possui sabor de grãos suave e um final lupulado, amargo e seco e bem definido. Na boca, sabor moderado de lúpulo com característica condimentada ou floral. Ésteres moderados semelhantes aos encontrados no aroma. Fenólicos condimentados de leves a moderados como os encontrados no aroma. Amargor de médio a alto, acentuado pela secura. O caráter de levedura e o de lúpulo permanecem no retrogosto.
      mouthfeel: Corpo de médio-baixo a médio. Macia. Carbonatação de média-alta a alta, pode causar um pouco de formigamento. Não deve ter aquecimento alcoólico perceptível.
      comments: Raramente é fabricada, quando é, geralmente não é rotulada e nem vendida fora dos mosteiros. Também pode ser chamada de cerveja dos monges, cerveja dos Irmãos ou simplesmente Blond (não usamos este termo para não causar confusão com um outro estilo, o Belgian Blond Ale). Altamente atenuada, geralmente com 85% ou mais.
      history: Embora as cervejarias de monastérios tenham a tradição de produzir cerveja com menor teor alcoólico como alimento diário de um monge (a Westmalle começou a produzir a sua em 1922), a cerveja clara e amarga que o estilo descreve é uma invenção relativamente moderna que reflete os gostos atuais. A Westvleteren produziu a deles pela primeira vez em 1999, mas substituiu produtos mais antigos de densidade mais baixa.
      ingredients: Malte Pilsen. Levedura belga. Lúpulos continentais.
      comparison: Como uma interpretação belga de alta fermentação de uma German Pils - clara, lupulada e bem atenuada, mas com um caráter forte da levedura belga. Tem menos dulçor, maior atenuação, menos caráter de malte e é mais centrada no lúpulo do que uma Belgian Pale Ale. Mais parecida com uma versão mais altamente lupulada e muito mais leve de uma Belgian Tripel (com o seu amargor e a secura) do que com uma Belgian Blond Ale mais leve.
