  - id: '5'
    name: Pale Bitter European Beer
    notes: Essa categoria descreve cervejas de origem alemã que são claras e são de equilibradas a amargas, com intensidade de lúpulo de moderado a moderadamente forte proveniente de lúpulos tradicionais alemães. Elas geralmente são de baixa fermentação ou maturadas a frio por um longo período de tempo (lagered) para fornecer um perfil macio e são bem atenuadas, assim como a grande maioria das cervejas alemãs.
    subcategory:
    - id: 5A
      name: German Leichtbier
      impression: Uma lager alemã clara, altamente atenuada, com corpo leve e com menos teor alcoólico e calorias que outras cervejas de teor alcoólico padrão. Moderadamente amarga com sabores perceptíveis de malte e lúpulo e, ainda sim, é uma cerveja interessante de beber.
      aroma: Aroma de lúpulo de baixo a médio com caráter condimentado, de herbal e/ou floral. Aroma de malte de baixo a médio-baixo adocicado de cereais ou ligeiramente como crackers. Perfil de fermentação limpo.
      appearance: Cor de palha claro a amarelo profundo. Limpidez brilhante. Colarinho branco moderado com persistência de média a média-baixa.
      flavor: Sabor de malte de baixo a médio como adocicado, de cereais. Amargor de lúpulo médio. Sabor de lúpulo com característica condimentada, herbal e/ou floral de baixo a médio. Caráter de fermentação limpo, com maturação a frio bem feita. Final seco com um retrogosto levemente maltado e lupulado.
      mouthfeel: Corpo de leve a muito leve. Carbonatação de média a alta. Suave, bem atenuada.
      comments: Comercializada primariamente como uma cerveja orientada para dietas, com teor de carboidratos, álcool e calorias mais baixos. Pronuncia-se “LAIXT-beer.” Pode ser conhecida também como Diat Pils ou Helles, esse estilo está na classe de densidade schankbier. Outras variações de cervejas da classe Leicht (leve) podem ser feitas com Weissbier, Kölsch e Altbier; essas cervejas se enquadram melhor no estilo 34B Mixed-Style Beer.
      history: As versões tradicionais existiam como bebidas para trabalhadores braçais em fábricas ou nos campos, mas as versões modernas são baseadas em produtos populares norte americanos da mesma classe e direcionados para consumidores fitness preocupados com saúde ou bem estar. Vem cada vez mais sendo substituída no mercado atual por cervejas não-alcoólicas e radlers.
      ingredients: Malte Pils da Europa continental. Levedura lager alemã. Lúpulos tradicionais alemães.
      comparison: Como uma German Pils ou Munich Helles com teor alcoólico mais baixo, corpo mais leve e levemente menos agressiva. Mais amarga e mais saborosa que uma American Light Lager.
