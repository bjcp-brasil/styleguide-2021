    - id: 25C
      name: Belgian Golden Strong Ale
      impression: Uma cerveja belga com teor alcoólico alto, muito clara, altamente atenuada, que é mais frutada e lupulada do que condimentada. Complexa e delicada, o final seco, o corpo baixo e a alta carbonatação acentuam o caráter do lúpulo e da levedura. Carbonatação espumante e efervescente, formando um colarinho firme branco.
      aroma: Um complexo buquê de ésteres frutados, lúpulos herbais e elevado álcool apimentado sobre uma base de malte quase neutra. Os ésteres são de moderados a altos, muitas vezes remetendo a maçã, pera e marmelo, especialmente pera. Lúpulos de baixos a moderados de perfil herbal, floral ou condimentado. Álcool e fenóis são de baixos a moderados e, muitas vezes, têm uma qualidade perfumada ou apimentada. A percepção do álcool deve ser suave, não pode ser quente ou remetendo a solvente. O malte deve ser quase neutro, possivelmente com leve adocicado de grãos.
      appearance: Cor de amarelo claro a dourado. Boa limpidez. Efervescente. Colarinho branco, maciço, de longa duração, firme, resultando no característico ’rendado belga’ (Belgian lace) na borda do copo na medida em que desaparece.
      flavor: Perfil semelhante ao do aroma (mesmos descritores e intensidades) para ésteres, lúpulos, fenóis e álcool. Os ésteres como pera, álcool apimentado, lúpulos herbais e sabores suaves de malte perduram na boca por um longo tempo até o retrogosto, tendo um final seco. O amargor é de médio a alto, acentuado pelo final seco e pela alta carbonatação, que permanece no retrogosto.
      mouthfeel: Carbonatação muito alta. Efervescente. Corpo de leve a médio, porém mais leve do que a densidade pode sugerir. A carbonatação acentua a percepção de leveza. O aquecimento alcoólico é suave, mas perceptível, sem que seja quente ou que remeta a solvente.
      comments: Os nomes para diversos exemplares comerciais do estilo incluem referências ao diabo, referindo-se ao seu alto teor alcoólico e como tributo ao exemplar original (Duvel). Tradicionalmente refermentada em garrafa.
      history: Desenvolvida pela cervejaria Moortgat depois da I Guerra Mundial como uma resposta à crescente popularidade das cervejas Pilsen. Originariamente uma cerveja mais escura, assumiu a sua forma moderna na década de 1970
      ingredients: Malte Pilsen com substanciais adjuntos açucarados. Lúpulos continentais. Levedura belga frutada. Água bastante mole. Não é tradicional adicionar especiarias.
      comparison: Muitas vezes confundida com a Belgian Tripel, mas geralmente é mais clara, com corpo mais leve, com final mais bem definido e seca. Tende a se usar levedura que favorece o desenvolvimento de ésteres (particularmente de maçã, pera e marmelo) ao invés de condimentos no equilíbrio e tem mais caráter de lúpulo com adição tardia.
