  - id: '14'
    name: Scottish Ale
    notes: 'Existem realmente apenas três estilos tradicionais de cerveja amplamente disponíveis hoje na Escócia: a 70/- Scottish Heavy, a 80/- Scottish Export e a Strong Scotch Ale (Wee Heavy, Estilo 17C). A 60/- Scottish Light é rara e muitas vezes disponível apenas em barris, mas atualmente parece estar tendo um tímido renascimento. Todos esses estilos assumiram a forma moderna após a Segunda Guerra Mundial, independentemente do uso prévio dos mesmos nomes. Atualmente, a 60/- é semelhante a uma dark mild, a 70/- é semelhante a uma ordinary bitter e a 80/- é semelhante a uma best ou strong bitter. As cervejas escocesas têm um equilíbrio e perfil de sabor diferente, mas ocupam uma posição de mercado semelhante às cervejas inglesas. As cervejas Light, Heavy e Export têm perfis de sabor semelhantes, e muitas vezes são produzidas pelo método parti-gyle. À medida que a densidade aumenta, o mesmo acontece com o caráter da cerveja. Os ingredientes tradicionais eram malte pale ale com alto teor
      de dextrinas, milho, açúcares escuros e caramelo cervejeiro para dar cor. As receitas modernas (pós-Segunda Guerra Mundial) muitas vezes adicionam pequenas quantidades de malte escuro e porcentagens baixas de malte crystal, juntamente com outros ingredientes como malte amber e malte de trigo. Os cervejeiros escoceses tradicionalmente usavam mosturas de infusão única, muitas vezes com a técnica underlet e múltiplas lavagens. Em geral, essas cervejas escocesas são mais fracas, mais doces, mais escuras, com menor atenuação e menos lupuladas em comparação com as cervejas inglesas modernas equivalentes. Elas são produzidas usando temperaturas de fermentação ligeiramente mais frias do que suas correspondentes inglesas. Muitas dessas diferenças foram exageradas na tradição popular; elas são perceptíveis, mas não gritantes, apenas o suficiente para afetar o equilíbrio da cerveja e talvez indicar uma preferência nacional de sabor. O equilíbrio permanece maltado e um tanto adocicado devido à
      densidade final maior, menor teor alcoólico e menor taxa de lupulagem. Muitas dessas divergências em relação à cerveja inglesa ocorreram entre o final de 1800 e meados de 1900. Métodos de produção defendidos por cervejeiros caseiros, como caramelização por fervura ou perfil de grãos carregado de uma variedade de maltes crystal, não são comumente usados em produtos tradicionais, mas podem aproximar esses sabores quando ingredientes tradicionais não estão disponíveis. O uso de malte defumado em fogo de turfa não é apenas completamente inautêntico, mas também produz um sabor sujo e fenólico inadequado em qualquer um desses estilos. As versões defumadas (usando qualquer tipo de defumação) devem ser inseridas em 32A Classic Style Smoked Beer. O uso de designações ’shilling’ (/-) é uma curiosidade escocesa. Originalmente, referia-se ao preço da cerveja em barris, que de forma alguma poderia ser constante ao longo do tempo. Xelins nem são usados como moeda agora na Escócia. Mas o nome ficou
      como uma abreviação de um tipo de cerveja, mesmo que o significado original tenha deixado de ser o preço real durante a Primeira Guerra Mundial. Tudo o que isso significa agora é que números maiores designam cervejas mais fortes, pelo menos dentro da mesma cervejaria. Entre as guerras mundiais, algumas cervejarias usavam o preço por pint em vez de xelins (por exemplo, Maclay 6d por 60/-, 7d por 70/-, 8d por 80/-). Confusamente, durante esse período, a 90/- pale ale era uma cerveja engarrafada de baixa densidade. Curioso, de fato.'
    subcategory:
