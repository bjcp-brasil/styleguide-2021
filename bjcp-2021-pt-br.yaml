    - id: X5
      name: New Zealand Pilsner
      impression: Uma cerveja clara, seca, de cor dourada e fermentação limpa, apresentando as características tropicais, cítricas, frutadas e gramíneas dos lúpulos neozelandeses. Corpo médio, sensação na boca leve, paladar e final suaves e base de malte com notas variando do neutro ao pão fornecem o suporte para que esta cerveja seja fácil de beber, refrescante e tenha o lúpulo em destaque.
      aroma: Aroma de lúpulo de médio a alto, refletindo as variedades modernas de lúpulo do Novo Mundo, frequentemente apresentando caráter de frutas tropicais, frutas cítricas (limão, toranja branca), gooseberry, melão, com um leve toque de pimentão verde ou aspecto gramíneo. Malte de médio-baixo a médio para dar suporte, com perfil de neutro a pão ou biscoito água e sal. DMS muito baixo aceitável, mas não obrigatório. Caráter de levedura neutro e limpo, opcionalmente com um perfil sulfuroso muito leve. O caráter de lúpulo deve ser mais proeminente no equilíbrio, mas algum caráter de malte deve ser evidente.
      appearance: Cor de amarelo palha a dourado profundo, mas a maioria dos exemplares são amarelo-ouro. Geralmente bastante límpida a cristalina; turbidez é uma falha. Espuma branca, cremosa e duradoura.
      flavor: Amargor de lúpulo de médio a alto e limpo, não áspero, mais proeminente no equilíbrio e duradouro no retrogosto. Sabor de lúpulo de médio a alto, com características semelhantes ao aroma (tropical, cítrico, gooseberry, melão, gramíneo). Sabor de malte de médio-baixo a médio, remetendo a dulçor de cereais, pão ou biscoito. Perfil de fermentação limpo (ésteres de fermentação são uma falha). Final de meio seco a seco, limpo, suave e amargo, mas não áspero, no retrogosto. O malte pode sugerir uma impressão de dulçor, mas a cerveja não deve ser literalmente doce. O final pode ser seco, mas não bem definido ou cortante. O equilíbrio deve ser sempre em direção ao amargor, mas o sabor do malte deve ser perceptível.
      mouthfeel: Corpo de médio-baixo a médio. Carbonatação de média a média-alta. Suavidade é a impressão mais proeminente. Nunca áspera, nem adstringente.
      comments: Os aromas do lúpulo geralmente têm uma qualidade semelhante à de muitos vinhos Sauvignon Blanc da Nova Zelândia, com aromas de frutas tropicais, gramíneas, melão e limão. Frequentemente produzida como um estilo híbrido na Nova Zelândia, usando uma levedura ale neutra em temperaturas mais baixas. Limitar o teor de enxofre do produto acabado é importante, pois pode entrar em conflito com o caráter do lúpulo.
      history: Definida em grande parte pela cerveja original, criada na cervejaria Emerson em meados da década de 1990, a New Zealand Pilsner expandiu em perfil à medida que as variedades de lúpulo da Nova Zelândia aumentaram em número e popularidade.
      ingredients: Variedades de lúpulo da Nova Zelândia, como Motueka, Riwaka, Nelson Sauvin, muitas vezes com Pacific Jade para amargor. Outras variedades do Novo Mundo, da Austrália ou dos EUA, podem ser usadas, se tiverem características semelhantes. Malte base claro, Pilsner ou Pale, talvez com uma pequena porcentagem de malte de trigo. Água com baixo teor de minerais, geralmente com mais cloretos que sulfatos. Levedura lager limpa ou levedura ale muito neutra.
      comparison: Comparada com uma German Pils, não é tão bem definida e seca no final, com uma presença mais suave e maltada e um corpo mais cheio. Em comparação com a Czech Premium Pale Lager, apresenta menor complexidade de malte e uma fermentação mais limpa. Similar em equilíbrio a uma Kölsch ou British Golden Ale, mas com um aroma mais lupulado. Comparada com qualquer um desses estilos alemães, apresenta variedades de lúpulo da Nova Zelândia com características tropicais, cítricas, frutadas e gramíneas, frequentemente com um caráter de vinho branco. Não deve ser tão lupulada ou amarga quanto um IPA.
