  - id: '12'
    name: Pale Commonwealth Beer
    notes: Esta categoria contém ales claras, moderadamente fortes, inclinadas para o lúpulo e amargas de países do antigo Império Britânico.
    subcategory:
    - id: 12A
      name: British Golden Ale
      impression: Uma cerveja amarga e clara, com destaque para o lúpulo e com teor alcoólico de médio a moderadamente forte. A facilidade em beber e a qualidade refrescante são componentes críticos do estilo, pois inicialmente era uma cerveja sazonal de verão.
      aroma: O aroma de lúpulo é de moderadamente baixo a moderadamente alto e pode usar qualquer variedade de lúpulos - florais, herbais ou terrosos dos lúpulos ingleses e cítricos dos lúpulos americanos são os mais comuns. Frequentemente, uma única variedade de lúpulo será destacada. Aroma baixo de malte como pão e sem caramelo. Aroma frutado de médio-baixo a baixo do lúpulo em vez de ésteres. Um baixo nível de diacetil é opcional.
      appearance: Cor de palha a dourada. limpidez de boa a brilhante. Colarinho branco de baixo a moderado. Um colarinho baixo é aceitável, quando a carbonatação também é baixa.
      flavor: Amargor de médio a médio-alto. O sabor do lúpulo é de moderado a moderadamente alto de qualquer variedade de lúpulo, embora os sabores cítricos sejam cada vez mais comuns. Caráter de malte de médio-baixo a baixo, geralmente de pão e talvez com um pouco de sabor de biscoito. Sabores de caramelo são tipicamente ausentes. O amargor e o sabor do lúpulo devem ser pronunciados. Ésteres de moderadamente baixos a baixos. Final de meio seco a seco. O amargor aumenta com o nível de álcool, mas é sempre equilibrado. Um baixo nível de diacetil é opcional.
      mouthfeel: Corpo de leve a médio. Carbonatação de baixa a moderada no barril (chope), embora as versões comerciais engarrafadas sejam mais altas. Versões mais fortes podem ter um leve aquecimento alcoólico, mas esse caráter não deve ser muito alto.
      comments: Cerveja bem lupulada e refrescante, com ênfase em destacar os lúpulos. Servido mais frio do que as bitters tradicionais, este estilo foi originalmente concebido como uma cerveja refrescante de verão, mas agora é frequentemente fabricada durante todo o ano. Originalmente feita com lúpulo inglês, mas cada vez mais lúpulos americanos com sabor cítrico são usados. Golden Ales também são chamadas de Golden Bitters, Summer Ales ou British Blonde Ales. Pode ser encontrado em barril, chope e garrafa.
      history: As Golden Ales modernas foram desenvolvidas na Inglaterra para competir com as fortemente comercializadas lagers. Embora seja difícil identificar a primeira cerveja, a Hop Back’s Summer Lightning, fabricada pela primeira vez em 1986, é considerado por muitos como a responsável pelo estilo.
      ingredients: Malte pale ou pilsen claro atuando como uma tela em branco para o caráter do lúpulo. Pode usar adjuntos como açúcar, milho ou trigo. O lúpulo inglês é frequentemente usado, embora as variedades cítricas americanas estejam se tornando mais comuns. Levedura britânica de fermentação limpa.
      comparison: Mais semelhante a uma American Pale Ale do que qualquer outra coisa, embora geralmente contenha menos álcool e possua ingredientes britânicos. Não tem caramelo e tem menos ésteres em comparação com British Bitters e Pale Ales. Seca como a Bitters, mas com menos caráter de malte para sustentar o lúpulo, dando um equilíbrio diferente. Frequentemente usa (e destaca) lúpulos americanos, mais do que a maioria dos outros estilos britânicos modernos. Equilíbrio de lupulagem entre uma Blonde Ale e uma American Pale Ale.
