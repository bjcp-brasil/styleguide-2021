    - id: 21B
      name: 'Specialty IPA: Brown IPA'
      impression: Uma cerveja lupulada, amarga e moderadamente forte como uma American IPA, mas com caramelo escuro, chocolate, toffee ou caráter de frutas escuras como em uma American Brown Ale. Mantendo o final seco e o corpo leve que torna as IPAs tão fáceis de beber; uma Brown IPA é um pouco mais saborosa e maltada do que uma American IPA, sem ser doce ou pesada.
      aroma: Aroma de lúpulo de moderado a moderadamente alto, muitas vezes com um caráter de frutas de caroço, de frutas tropicais, de frutas cítricas, resinoso, de pinho, de frutas vermelhas ou de melão. O aroma adocicado de malte médio-baixo a médio combina bem com a seleção de lúpulo e geralmente se apresenta como notas de chocolate ao leite, cacau, toffee, nozes, biscoitos, caramelo escuro, pão tostado ou caráter de frutas escuras. Perfil de fermentação limpo. Ésteres leves são opcionais. Aroma leve de álcool é opcional.
      appearance: Cor variando de marrom avermelhado a marrom escuro, mas sem ser preto. Límpida, quando não for opaca. Leve turbidez é opcional. Colarinho de tamanho médio, de creme a castanho, com boa persistência.
      flavor: Sabor de lúpulo de médio a alto, mesmos descritores do aroma. Suporte maltado limpo, de médio-baixo a médio, com os mesmos descritores do aroma. As escolhas de malte e lúpulo não devem produzir conflitos no sabor. Amargor de médio-alto a alto, sem aspereza. Final de seco a médio, com um retrogosto amargo, lupulado e maltado. Ésteres baixos são opcionais. Sabor de álcool muito baixo é opcional. Sem sabores de malte altamente torrados ou queimados. O malte deve quase equilibrar o amargor e o sabor do lúpulo.
      mouthfeel: Corpo de médio-leve a médio, com uma textura suave. Carbonatação de média a média-alta. Sem aspereza. Leve aquecimento alcoólico é opcional.
      comments: Destacada do estilo American Brown Ale para melhor diferenciar os exemplos com maior teor alcoólico e altamente lupulados das cervejas mais equilibradas e de teor alcoólico padrão.
      history: Veja American Brown Ale.
      ingredients: Semelhante a uma American IPA, mas com maltes crystal médio ou escuro, maltes tipo chocolate, levemente torrados, ou outros maltes de cor intermediária. Pode usar açúcares como adjuntos, incluindo açúcar mascavo. Qualquer caráter de lúpulo americano ou do Novo Mundo é aceitável, mas os lúpulos e o perfil maltado não devem entrar em conflito.
      comparison: Uma versão mais forte e amarga de uma American Brown Ale, com o equilíbrio seco de uma American IPA. Tem menos sabor torrado que a Black IPA, mas com mais sabores de chocolate que uma Red IPA.
