    - id: 16C
      name: Tropical Stout
      impression: Uma stout muito escura, doce, frutada, com teor alcoólico moderadamente alto, com sabores suaves e torrados, mas sem aspereza de queimado.
      aroma: Dulçor de moderada a alta intensidade é proeminente. Aroma moderado a alto de café, chocolate ou torrado, mas não queimado. Frutado médio a alto. Pode ter aroma de melaço, alcaçuz, açúcar queimado, frutas secas ou vínico. Versões com teor alcoólico mais alto podem ter um aroma sutil e limpo de álcool. Baixo aroma de lúpulo opcional. Diacetil baixo opcional.
      appearance: Cor marrom muito profundo a preto. Limpidez geralmente obscurecida pela cor escura. Límpida, se não for opaca. Colarinho volumoso castanho a marrom, com boa retenção.
      flavor: Bastante doce com sabores suaves de cereais escuros e amargor contido, médio-baixo a médio. Sabor suave e torrado, muitas vezes como café ou chocolate, embora moderado no equilíbrio pelo final doce. Sem sabor de malte queimado ou aspereza no final. Ésteres frutados moderados a altos. Pode ter uma qualidade doce, de rum escuro, melaço ou açúcar queimado. Baixo sabor de lúpulo opcional. Diacetil médio-baixo opcional.
      mouthfeel: Corpo médio-cheio a cheio, muitas vezes com um caráter suave e cremoso. Pode ter um aquecimento alcoólico, mas não pode queimar. Carbonatação moderada a moderadamente alta.
      comments: Surpreendentemente refrescante em um clima quente. Os níveis de doçura podem variar significativamente. Tropical implica que a cerveja se originou e é popular nos trópicos, não que tenha características de frutas tropicais oriundas de lúpulo ou de frutas.
      history: Uma adaptação local das Foreign Extra Stouts fabricada com ingredientes e métodos regionais no Caribe e em outros mercados tropicais. Amargor mais baixo do que em stouts tipo exportação, pois essas cervejas não precisam ser enviadas para o exterior e atendem às preferências do paladar local.
      ingredients: Semelhante a uma Sweet Stout, mas com maior densidade. Malte pale, maltes torrados escuros e cereais. Lúpulo principalmente para amargor. Pode usar adjuntos e açúcar para aumentar a densidade. Normalmente feita com levedura lager fermentada a quente.
      comparison: Tem gosto de uma Sweet Stout escalonada com maior frutado. Semelhante a algumas Imperial Stouts sem o alto amargor, torra forte ou queimado, e lúpulos tardios e com menor teor alcoólico. Muito mais doce e menos lupulada do que American Stouts. Muito mais doce e menos amarga do que as Foreign Extra Stouts de densidade semelhante.
