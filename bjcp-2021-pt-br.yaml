    - id: 6B
      name: Rauchbier
      impression: Uma lager alemã defumada em madeira de faia, maltada e de cor âmbar. O perfil esperado de uma Märzen com malte tostado e rico, amargor contido, fermentação limpa e final relativamente seco intensificado por um caráter defumado de perceptível a intenso.
      aroma: Uma combinação de defumado e malte, variando em equilíbrio e intensidade. O caráter defumado em madeira de faia pode ser de sutil a muito forte e percebido como defumado, amadeirado ou como bacon. O perfil de malte pode ser de baixo a moderado e ser um tanto rico, tostado ou doce de malte. Os componentes de malte e defumado são com frequência inversamente proporcionais (ou seja, quando o defumado aumenta, o malte diminui e vice-versa). Aroma de lúpulo floral e/ou condimentado baixo é opcional. Perfil de fermentação limpo.
      appearance: Muito límpida, com colarinho alto, cremoso e rico, com cor de bege a creme. Cor de âmbar profundo a marrom-acobreado, muitas vezes um pouco mais escura do que o estilo base Märzen.
      flavor: 'Geralmente segue o perfil do aroma com uma combinação de defumado e malte, que varia em equilíbrio e intensidade ainda que sempre haja suporte mútuo. Qualidades típicas de uma Märzen devem ser evidentes, particularmente o maltado e a riqueza tostada, mas o sabor de defumado em madeira de faia pode ser de baixo a alto. No paladar pode ser um tanto maltada, rica e doce, ainda que o final costume ser de meio-seco a seco, com o caráter de defumado, às vezes, potencializando a secura do final. O retrogosto pode refletir tanto a riqueza de malte, como o defumado, sendo que o desejável é o equilíbrio na apresentação. Amargor de lúpulo moderado e equilibrado. Sabor de lúpulo de nenhum a moderado com notas condimentadas, florais e/ou herbais. Caráter de fermentação lager limpo. A qualidade e o caráter do defumado são importantes, este deve ser limpo. Em níveis altos o defumado pode ter característica semelhante a presunto ou bacon, o que é aceitável, desde que não entre na faixa que
        lembre gordura. Sabor fenólico defumado áspero, amargo, queimado, acre, carbonizado, como borracha, sulfuroso ou como creosoto (Nota do tradutor: substância oleosa de cor escura usada pela indústria de preservantes de madeira) é inapropriado.'
      mouthfeel: Corpo médio. Carbonatação de média a médio-alta. Caráter lager suave. Adstringência ou aspereza fenólica significativas são inapropriadas.
      comments: Significa literalmente cerveja defumada em alemão. O caráter de defumado e a intensidade variam entre maltarias e cervejarias, portanto permita uma variação no estilo quando estiver julgando - nem todos os exemplares são altamente defumados. Muitos outros estilos alemães tradicionais são defumados; estes exemplares devem ser inscritos no estilo 32A Classic Style Smoked Beer. Esse estilo é apenas para a cerveja mais comum, baseada na Märzen.
      history: Uma especialidade histórica da cidade de Bamberg, na Francônia, região da Baviera, na Alemanha. Embora cervejas defumadas certamente fossem produzidas há muito tempo, as origens desse estilo específico não são claras, mas deve ter sido desenvolvido depois que a Märzen foi criada.
      ingredients: Perfil de maltes semelhantes a uma Märzen com a adição considerável de Rauchmalz Alemão (malte tipo Vienna defumado em madeira de faia). Algumas cervejarias defumam seu próprio malte. Levedura lager alemã. Lúpulos tradicionais alemães ou tchecos.
      comparison: Como uma Märzen, mas com um aroma e sabor adocicado e defumado equilibrados e de cor um pouco mais escura.
