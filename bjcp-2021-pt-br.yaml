  - id: '3'
    name: Czech Lager
    notes: Lagers tchecas são geralmente divididas por classe de densidade (draft, lager, especial) e cor (clara, âmbar, escura). Os nomes tchecos para essas categorias são svetlé (clara), polotmavé (âmbar) e tmavé (escura). As classes de densidade são výcepní (draft, densidade inicial entre 7°P e 10°P), ležák (lager, densidade inicial entre 11°P e 12°P) e speciální (especial, densidade inicial acima de 13°P). Pivo é a palavra tcheca para cerveja. A divisão em classes de densidade é similar ao agrupamento alemão em schankbier, vollbier, e starkbier, embora com faixas de densidade diferente. As cervejas tchecas dentro das classes são geralmente referenciadas apenas pela sua densidade. Frequentemente existem variações entre os agrupamentos de densidade-cor, principalmente na classe speciální. O guia de estilos combina algumas dessas classes, enquanto outras cervejas do mercado tcheco não são descritas (tal como a Czech Strong Porter). Isso não significa que as categorias abaixo abrangem as
      cervejas tchecas em sua totalidade, é simplesmente uma maneira de agrupar alguns dos tipos mais comuns encontrados para propósitos de julgamento. Lagers tchecas são geralmente diferenciadas das alemãs e outras lagers ocidentais pelo fato de que as lagers alemãs são quase sempre completamente atenuadas, enquanto as lagers tchecas podem conter uma pequena porção de extrato não fermentado permanecendo na cerveja pronta. Como consequência, a densidade final é levemente maior (com menor atenuação aparente), corpo e sensação na boca levemente maiores e um perfil de sabor mais rico e complexo em cervejas de cor e força equivalentes. Lagers alemãs tendem a apresentar um perfil de fermentação mais limpo, enquanto as lagers tchecas são fermentadas mais frias (entre 7°C e 10°C) e por um período maior de tempo e podem ter uma leve, quase imperceptível (perto do limiar de percepção) quantidade de Diacetil que geralmente é percebido mais como um corpo arredondado do que aparente no aroma e sabor
      (presença marcante de diacetil com caráter de manteiga é uma falha). As cepas de leveduras lager tchecas não são sempre tão limpas e atenuantes como as cepas alemãs, o que ajuda a atingir uma densidade final maior (juntamente com os métodos de mosturação e fermentação mais fria). Lagers tchecas são tradicionalmente produzidas com decocção (geralmente dupla), mesmo com maltes modernos, enquanto a maioria das lagers alemãs são produzidas com mosturação por infusão única ou com rampas. Essas diferenças caracterizam o perfil rico, a sensação na boca e o perfil de sabor que distinguem as lagers tchecas.
    subcategory:
    - id: 3A
      name: Czech Pale Lager
      impression: Uma lager tcheca de corpo mais leve, rica, refrescante, lupulada e amarga com os sabores familiares à, mais forte, Czech Premium Pale Lager (tipo Pilsner) mas em uma versão com menor teor alcoólico, corpo mais leve e levemente menos intensa.
      aroma: Malte rico como pão de leve a moderado combinado com um buquê de lúpulo condimentado e/ou herbal de intensidade de leve a moderado; o equilíbrio entre malte e lúpulos pode variar. Leve toque de caramelo é aceitável. Diacetil leve (mas nunca intrusivo) e leves ésteres frutados são opcionais. Sem enxofre.
      appearance: Cor de amarelo claro a dourado profundo. De brilhante a muito límpida com um colarinho branco, cremoso e duradouro.
      flavor: Sabor de malte rico como pão de médio-baixo a médio com um final lupulado e arredondado. Sabor de lúpulo condimentado e/ou herbal de baixo a médio-alto. Amargor é proeminente mas nunca áspero. Saborosa e refrescante. Diacetil ou ésteres frutados são aceitáveis em níveis baixos mas não precisam estar presentes nem devem ser dominantes.
      mouthfeel: Corpo de médio-leve a médio. Carbonatação moderada.
      comments: O nome tcheco desse estilo é svetlé výcepní pivo.
      history: Josef Groll inicialmente fabricou dois tipos de cerveja clara em 1842-3, a výcepní e a ležák, com a cerveja de menor densidade inicial tendo o dobro da produção; Evan Rail especula que essas cervejas tinham provavelmente 10ºP e 12ºP, mas que a výcepní poderia ser mais fraca. Esse é o tipo de cerveja mais consumido na República Tcheca na atualidade.
      ingredients: Água mole com baixo teor de sulfato e carbonato. Lúpulos tradicionais tchecos. Malte Pilsner tcheco. Levedura lager tcheca. Água com baixo teor de íons provê um perfil de lúpulo distinto, macio e arredondado, mesmo com altas cargas de lúpulo.
      comparison: Uma versão para o dia a dia, com corpo mais leve, refrescante e menos intensa de uma Czech Premium Pale Lager.
