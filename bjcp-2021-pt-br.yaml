    - id: 27A
      name: 'Historical Beer: Sahti'
      impression: Uma cerveja finlandesa farmhouse tradicional forte, pesada e doce, geralmente com centeio e zimbro, e um caráter de levedura de banana e cravo.
      aroma: Impressão de malte doce, como mosto. Maltado como cereais, caramelo e centeio em segundo plano. Leve aroma de álcool. Éster alto como banana com fenóis de moderados a moderadamente altos como cravo. Pode ter um caráter amadeirado de zimbro de leve a moderado. Não é azeda. Sem lúpulo.
      appearance: Cor de amarelo a marrom escuro; a maioria é de âmbar médio a âmbar escuro. Geralmente um pouco nebulosa e turva. Colarinho pequeno, devido à baixa carbonatação.
      flavor: Bastante doce e muitas vezes com sabor de malte cru como mosto, como cereais com algum caramelo e toffee. Amargor baixo. Sem sabor de lúpulo. Caráter baixo amadeirado ou como pinho é aceitável. Éster de moderado a alto como banana e frutado, cravo e condimentado moderados. Final bastante doce. Fresca, não é azeda.
      mouthfeel: Espessa, viscosa e pesada com proteínas (sem fervura significa sem hot break). De quase sem carbonatação a moderadamente alta, similar a Cask Ales inglesas. Aquecimento pelo teor alcoólico e pelo frescor, porém muitas vezes mascarado pelo dulçor.
      comments: O uso do centeio não significa que deve ter sabor como cominho (um sabor comum em pães de centeio). O zimbro atua um pouco como o lúpulo no equilíbrio e sabor, provendo um contraponto de sabor e amargor ao dulçor de malte. Caráter de zimbro amadeirado e como pinho é mais comum do que o frutado como gin.
      history: Um estilo tradicional nativo da Finlândia; uma tradição farmhouse de pelo menos 500 anos, geralmente feito durante ocasiões festivas como casamentos de verão e consumidas dentro de uma ou duas semanas após a brassagem.
      ingredients: Cevada malteada. Centeio é comum. Lúpulo baixo, se tiver. Galhos de zimbro (com ou sem bagas) são utilizados para filtração (tradicionalmente troncos ocos de madeira). Utilização de fermento finlandês para produção de pão numa fermentação quente e rápida (levedura alemã de Weizen é uma substituição razoável). Longo regime de mosturação. O mosto não é fervido.
      comparison: Traz semelhanças com Weizenbocks, porém doce e espessa, com caráter de centeio e zimbro.
