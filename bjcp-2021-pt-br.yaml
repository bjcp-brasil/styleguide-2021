    - id: 23B
      name: Flanders Red Ale
      impression: Uma ale belga ácida e frutada, marrom-avermelhada envelhecida em carvalho com sabores de malte tostado servindo como suporte e complexidade de fruta. O final seco e tânico reforça a sugestão de um vinho tinto vintage (de uma safra de excepcional qualidade).
      aroma: Perfil ácido-frutado complexo com o malte fornecendo suporte. O frutado é alto e remete a cerejas pretas, laranjas, ameixas, groselhas ou fruit leather (polpas de frutas que são espalhadas e secas em formato de tiras). Baunilha, chocolate ou fenol condimentado de baixo a médio-baixo podem estar presentes para complexidade. O aroma ácido pode variar de moderado a alto. Um caráter avinagrado dominante é inapropriado, embora níveis baixos a moderados de ácido acético sejam aceitáveis desde que equilibrados com o malte. Sem aroma de lúpulo.
      appearance: De cor vermelho profundo, bordô, a marrom-avermelhado. Boa limpidez. Colarinho de branco a castanho muito claro. De média a boa retenção de espuma.
      flavor: Sabores maltados de moderados a moderadamente altos em geral apresentam uma qualidade rica-tostada. Sabores intensos de frutas, sendo os descritores os mesmos do aroma. Acidez complexa de moderada a alta, acentuada pelos ésteres; não deve ser uma simples acidez lática. Um caráter avinagrado dominante é inapropriado, embora níveis baixos a moderados de ácido acético sejam aceitáveis desde que equilibrados com o malte. Geralmente com o aumento do caráter ácido o malte reduz gradualmente para um sabor mais de segundo plano (e vice-versa). Baunilha, chocolate ou fenol condimentado de baixo a médio-baixo são opcionais. Sem sabor de lúpulo. Amargor contido com o equilíbrio para o lado do malte. Ácidos e taninos podem realçar a percepção de amargor e prover equilíbrio e estrutura. Algumas versões são adoçadas ou combinadas para serem doce; permita uma ampla variedade nos níveis de dulçor, que podem suavizar a acidez picante e a percepção acética.
      mouthfeel: Corpo médio, frequentemente realçado por taninos. Carbonatação baixa a média-baixa. Baixa a média adstringência, geralmente com uma acidez que causa um sutil formigamento na língua. No paladar é enganosamente leve e com final bem definido (crisp), embora um final meio adocicado não seja incomum.
      comments: A observação “como vinho” não deve ser levada muito literalmente; ela pode sugerir um vinho francês da Borgonha de alta acidez, mas claramente não é idêntica. Produzida por envelhecimento extenso (até dois anos) em imensos barris de madeira (foeders), combinando cervejas jovens e bem maturadas e adoçantes em quantidades variáveis na finalização do produto. Uma alta gama de produtos são possíveis dependendo da real combinação e se há utilização de adoçantes. Sabores acéticos podem ser notados, mas nem toda acidez nesta cerveja é derivada de ácido acético; vinagre supera em mais de seis vezes a acidez total deste estilo. Versões com adição de fruta devem ser inscritas como uma 29A Fruit Beer.
      history: Uma cerveja nativa da Flandres Oriental, representada pelos produtos da cervejaria Rodenbach, estabelecida em 1821. O envelhecimento em imensos barris de madeira e a combinação de cervejas jovens e envelhecidas foram emprestados da tradição inglesa. Os cervejeiros belgas consideram a Flanders Red e a Oud Bruin da mesma família de estilos, mas a primeira diferenciação foi feita quando Michael Jackson inicialmente definiu os estilos de cerveja, dado que os perfis de sabor são claramente diferentes. Muitos exemplares modernos são influenciados pela popularidade da Rodenbach Grand Cru.
      ingredients: Maltes Vienna ou Munique, uma variedade de maltes caramelo e milho. Lúpulos da Europa continental de baixo alfa ácido. Sacch, Lacto e Bretta. Envelhecida em carvalho. Por vezes combinada e adoçada (naturalmente ou artificialmente).
      comparison: Menos rica em sabores maltados que uma Oud Bruin, geralmente mais voltada para um perfil azedo-frutado e acético.
