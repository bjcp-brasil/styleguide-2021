  - id: '23'
    name: European Sour Ale
    notes: Esta categoria contém os estilos de cervejas ácidas tradicionais da Europa que ainda são produzidas, das quais muitas (mas não todas) contêm algum componente de trigo. A maioria possui baixo amargor, com a acidez da cerveja proporcionando o equilíbrio que normalmente o amargor de lúpulo contribuiria de outra forma. Algumas são adoçadas ou saborizadas, seja na cervejaria ou no momento do consumo.
    subcategory:
    - id: 23A
      name: Berliner Weisse
      impression: Uma cerveja de trigo alemã muito clara, refrescante, de baixo teor alcoólico, com uma acidez lática limpa e um nível de carbonatação muito alto. No malte, um leve sabor de massa de pão sustenta a acidez, que não deve parecer artificial. Um frutado suave aparece nos melhores exemplares.
      aroma: Um caráter nitidamente ácido de moderado a moderadamente-alto é dominante. Pode chegar até um moderadamente frutado, geralmente limão, maçã azeda, pêssego ou damasco e uma nota floral leve. Sem aroma de lúpulo. Nas versões mais frescas o trigo pode ser notado como massa de pão crua e, combinado com a acidez, pode sugerir pão de fermentação natural.
      appearance: De coloração palha, pode ser bem clara. A limpidez varia de transparente a um tanto turva. Colarinho branco alto, denso e com retenção pobre. Altamente efervescente.
      flavor: Acidez lática limpa domina e pode ser bastante forte. Um sabor complementar que remete a massa de pão, pão ou cereais como trigo é geralmente perceptível. Amargor de lúpulo indetectável; a acidez supre o equilíbrio no lugar dos lúpulos. Nunca avinagrado. Frutado nítido, apesar de restrito, pode ser detectado como pêssego-damasco, limão-cítrico ou maçã azeda. Final muito seco. O equilíbrio é dominado pela acidez, mas algum sabor de malte deve estar presente. Sem sabor de lúpulo. Sem THP.
      mouthfeel: Corpo leve, mas nunca ralo. Carbonatação muito alta. Sem sensação de álcool. Acidez que cessa rapidamente (crisp).
      comments: Qualquer aspecto de Bretta é contido e tipicamente expresso na forma de notas florais e frutadas, nunca funky. Versões envelhecidas podem denotar características de cidra, mel, feno ou suave flor silvestre e, por vezes, acidez elevada. Na Alemanha é classificada como uma Schankbier, ou seja, uma cerveja leve com densidade inicial na faixa de 7-8°P. Versões com adição de fruta ou especiarias devem ser inscritas como 29A Fruit Beer, como 30A Spice, Herb, or Vegetable Beer ou como 29B Fruit and Spice Beer.
      history: Uma especialidade regional de Berlim. Em 1809 era referida como “a Champagne do Norte” pelas tropas de Napoleão devido à sua qualidade vibrante e elegante. Em dado momento era defumada e costumava haver uma versão de intensidade Märzen (14°P). Cada vez mais rara na Alemanha, mas agora produzida em diversos outros países.
      ingredients: Malte Pilsen. Usualmente malte de trigo, geralmente metade dos grãos, no mínimo. Uma co-fermentação simbiótica com levedura de alta fermentação e LAB (bactéria de ácido lático, da sigla em inglês) fornece a acidez acentuada, que pode ser melhorada pela mistura (durante a fermentação) de cervejas com tempos de envelhecimento distintos e pela maturação a frio. Decocção na mostura com mash hopping (adição de lúpulos durante a mosturação) é tradicional. Cientistas cervejeiros alemães acreditam que Bretta é essencial para obter o perfil de sabor frutado-floral correto.
      comparison: Comparada à Lambic, possui uma acidez lática limpa com Bretta variando de contida a abaixo do limiar sensorial. Também possui teor alcoólico mais baixo. Comparada à Straight Sour Beer e à Catharina Sour, apresenta densidade menor e pode conter Bretta.
