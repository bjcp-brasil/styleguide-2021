  - id: '16'
    name: Dark British Beer
    notes: Esta categoria contém cervejas de teor alcoólico de médio a alto, de amargas a doces, de stouts britânicas e de irlandesas modernas, que se originaram na Inglaterra, mesmo que algumas sejam agora mais amplamente associadas à Irlanda. Neste caso, “British” significa as Ilhas Britânicas de maneira mais ampla e não a Grã-Bretanha.
    subcategory:
    - id: 16A
      name: Sweet Stout
      impression: Uma stout muito escura, doce, encorpada e levemente torrada que pode sugerir café com creme ou expresso adoçado.
      aroma: Aroma suave de cereais torrados, às vezes com notas de café ou chocolate. Muitas vezes existe uma impressão de dulçor semelhante a creme. O frutado pode ser de baixo a moderadamente alto. Diacetil baixo opcional. Aroma de lúpulo baixo floral ou terroso opcional.
      appearance: Cor de marrom muito escuro a preto. Límpida, se não for opaca. Colarinho cremoso de castanho claro a marrom.
      flavor: Sabores escuros, torrados, café ou chocolate dominam o paladar. Ésteres frutados de baixo a moderado. Amargor moderado. O dulçor médio a alto oferece um contraponto ao caráter torrado e ao amargor, perdurando até o final. O equilíbrio entre cereais escuros ou maltes e dulçor pode variar, de bastante doce a moderadamente seco e um pouco torrado. Diacetil baixo opcional. Baixo sabor de lúpulo floral ou terroso opcional.
      mouthfeel: Corpo médio-cheio a cheio e cremoso. Carbonatação baixa a moderada. O alto dulçor residual de açúcares não fermentados aumenta a sensação na boca cheia.
      comments: A densidade é baixa na Grã-Bretanha (às vezes mais baixas do que as estatísticas abaixo), mais altas nos produtos exportados e nos EUA. Existem variações, no nível de dulçor residual, na intensidade do caráter torrado, e o equilíbrio entre estas duas variáveis é passível de interpretação.
      history: Um estilo inglês de stout desenvolvido no início de 1900. Historicamente conhecidas como stouts “Milk” ou “Cream”, legalmente essa designação não é mais permitida na Inglaterra, mas pode ser aceitável em outros lugares. O nome “Milk” é derivado do uso da lactose do açúcar do leite como adoçante. Originalmente comercializado como um tônico para pessoas com deficiências e lactantes.
      ingredients: Base de malte pale com maltes ou cereais escuros. Pode usar adjuntos de cereais ou açúcar. A lactose é frequentemente adicionada para fornecer doçura residual adicional.
      comparison: Muito mais doce e menos amarga do que outras stouts, exceto a mais forte Tropical Stout. O caráter torrado é suave, não queimado como outras stouts. Pode ser semelhante em equilíbrio à Oatmeal Stout, embora com mais dulçor.
