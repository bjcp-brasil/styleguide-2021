    - id: 6C
      name: Dunkles Bock
      impression: Uma cerveja lager alemã com teor alcoólico mais alto, escura e maltada, que enfatiza as qualidades ricas e ligeiramente tostadas dos maltes continentais, sem ser doce no final.
      aroma: Aroma de malte rico como pão de intensidade de médio a médio-alto, frequentemente com quantidades moderadas de produtos ricos de Maillard e/ou nuances tostadas. Praticamente sem aroma de lúpulo. Um pouco de álcool pode ser perceptível. Caráter limpo de lager, embora seja permitido um leve toque de frutas escuras.
      appearance: Cor de cobre claro a marrom, frequentemente com atraentes reflexos granada. Boa limpidez, apesar da cor escura. Colarinho de alta formação, cremoso, persistente e quase branco.
      flavor: Sabor de malte de médio a médio-alto com caráter rico e complexo, dominada por produtos ricos de Maillard e nuances tostadas. Algumas notas de caramelo escuro podem estar presentes. O amargor do lúpulo é geralmente apenas alto o suficiente para sustentar os sabores do malte, permitindo que um pouco do adociado do malte permaneça até o final. Bem atenuada, não enjoativa. Perfil de fermentação limpo, entretanto o malte pode fornecer um leve caráter de frutas escuras. Sem sabor de lúpulo. Sem caráter torrado, queimado ou de biscoito seco.
      mouthfeel: Corpo de médio a médio-cheio. Carbonatação de moderada a moderadamente baixa. Algum aquecimento alcoólico pode ser encontrado, mas nunca deve ser quente. Suave, sem aspereza ou adstringência.
      comments: Mostura usando decocção desempenha um papel importante no desenvolvimento dos sabores, pois incrementa os sabores de malte que remetem a caramelo e reações de Maillard.
      history: Originada na cidade de Einbeck, no norte da Alemanha, um popular centro cervejeiro e exportador nos dias da Liga Hanseática (séculos XIV a XVII). Recriada em Munique a partir do século XVII. A palavra “Bock” é traduzida como “bode” em alemão e é por isso que o referido animal é frequentemente usado em logotipos e anúncios.
      ingredients: Maltes Munich e Vienna, raramente é usada uma pequena quantidade de maltes torrados escuros para ajuste de cor, sem uso de quaisquer adjuntos não maltados. Variedades de lúpulo da Europa continental são usadas. Levedura lager alemã limpa.
      comparison: Mais escura, com um sabor maltado mais rico e menos amargor aparente do que uma Helles Bock. Menos álcool e riqueza de malte do que uma Doppelbock. Sabores de malte mais fortes e teor alcoólico mais alto do que um Märzen. Mais rica, menos atenuada e menos lupulada do que uma Czech Amber Lager.
