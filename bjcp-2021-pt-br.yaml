    - id: 20B
      name: American Stout
      impression: Uma stout escura bastante forte, altamente torrada, amarga e lupulada. O corpo e os sabores escuros típicos das stouts com um caráter mais agressivo e amargo do lúpulo americano.
      aroma: Aroma torrado de moderado a forte, muitas vezes com qualidade de café torrado ou chocolate amargo. Aromas queimados ou de carvão são aceitáveis em níveis baixos. Aroma de lúpulo de muito baixo a médio, muitas vezes com um caráter cítrico ou resinoso. Ésteres médios são opcionais. Álcool leve é opcional. Não deve parecer agressiva, acre ou ácida.
      appearance: Geralmente uma cor preta intensa, embora algumas possam parecer marrom muito escuro. Colarinho volumoso e persistente, com cor de castanho claro a marrom claro. Geralmente opaca.
      flavor: Sabores torrados de moderados a muito altos, muitas vezes com gosto de café, chocolate amargo ou meio amargo ou grãos de café torrados. Pode ter gosto de borra de café levemente queimada, mas esse caráter não deve ser proeminente. Dulçor de malte de baixo a médio, muitas vezes com sabores ricos de chocolate ou caramelo. Amargor de médio a alto. Sabor de lúpulo de baixo a alto, geralmente cítrico ou resinoso. Final de médio a seco, ocasionalmente com uma qualidade levemente queimada. Ésteres baixos são opcionais. Leve sabor de álcool, macio, é opcional.
      mouthfeel: Corpo de médio a alto. Pode ser um pouco cremosa. Pode ter um pouco de adstringência derivada da torra, mas esse caráter não deve ser excessivo. Carbonatação de média-alta a alta. Aquecimento alcoólico de leve a moderadamente forte, mas macio e não excessivamente quente.
      comments: As cervejarias expressam individualidade variando o perfil do malte torrado, o dulçor e o sabor do malte e a quantidade de lúpulos de finalização utilizados. Geralmente tem sabores de malte torrado e lupulagem mais ousados do que em outras stouts tradicionais (exceto Imperial Stouts). Cada vez mais difícil de ser encontrada.
      history: Uma cerveja artesanal moderna e um estilo caseiro, que aplicaram um regime de lúpulo americano mais agressivo a uma cerveja forte tradicional, English Stout ou Irish Stout. As versões caseiras já foram conhecidas como West Coast Stout, uma nomenclatura comum para uma cerveja altamente lupulada.
      ingredients: Maltes base, leveduras e lúpulos comuns americanos. Uso variado de maltes escuros e torrados, bem como maltes tipo caramelo. Adjuntos ou aditivos podem estar presentes em pequenas quantidades para adicionar complexidade.
      comparison: Como uma Irish Extra Stout lupulada, amarga e fortemente torrada. Muito mais torra e corpo que uma Black IPA. Versões maiores e mais fortes pertencem ao estilo Imperial Stout. Mais forte e assertiva, particularmente nas adições de maltes escuros ou grãos e caráter de lúpulo, do que uma American Porter.
