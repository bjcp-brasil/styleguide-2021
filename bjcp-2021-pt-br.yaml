  - id: '7'
    name: Amber Bitter European Beer
    notes: Essa categoria agrupa cervejas de origem alemã ou austríaca, de cor âmbar, equilibradas ou amargas.
    subcategory:
    - id: 7A
      name: Vienna Lager
      impression: Uma lager âmbar da Europa continental de teor alcoólico moderado com maltado macio e suave e um amargor moderado para dar equilibrio, ainda assim com um final relativamente seco. O sabor de malte é limpo, rico como pão e um tanto tostado, com uma elegância oriunda não dos maltes especiais ou adjuntos, mas sim da qualidade dos maltes base e do processo.
      aroma: Aroma de malte moderadamente intenso com notas tostadas e de maltado rico. Aroma de lúpulo floral e/ou condimentado pode ser de baixo a ausente. Caráter lager limpo. Aromas significativo de caramelo, similar a biscoito e/ou torrado são inapropriados.
      appearance: Cor de âmbar avermelhado claro a cobre. Limpidez brilhante. Colarinho espesso, quase branco e persistente.
      flavor: Complexidade de malte suave, elegante em primeiro plano com amargor de lúpulo firme o suficiente para prover um final equilibrado. O sabor de malte tende em direção ao caráter rico e tostado, sem sabores significativos de caramelo, similar a biscoito ou torrado. Razoavelmente seca, com final macio, com tanto a riqueza de malte quanto o amargor de lúpulo presentes no retrogosto. Sabor de lúpulo floral, condimentado e/ou herbal pode ser de baixo a ausente. Perfil limpo de fermentação.
      mouthfeel: Corpo de médio-leve a médio com uma delicada cremosidade. Carbonatação moderada. Macia.
      comments: Uma cerveja do dia a dia de teor alcoólico padrão, não uma cerveja brassada para festivais. Muitos exemplares tradicionais se tornaram mais doces e carregados de adjuntos, agora parecendo mais com International Amber ou Dark Lagers.
      history: Desenvolvida por Anton Dreher em Vienna em 1841, se tornando popular no século XIX. O estilo foi levado para o México por Santiago Graf e outros cervejeiros imigrantes austríacos no final do século XIX. Parece ter sido adotada como uma estilo artesanal moderno em outros países.
      ingredients: Tradicionalmente malte Vienna da melhor qualidade, mas também pode ser usado Malte Pils ou Munich. Lúpulos continentais europeus tradicionais. Levedura lager alemã limpa. Pode usar pequenas quantidades de maltes especiais para cor e dulçor.
      comparison: Sabor de malte similar a uma Märzen, mas com intensidade e corpo mais leve, com um toque a mais de amargor e secura no equilíbrio. Menor teor alcoólico que uma Märzen ou Festbier. Menos rica, maltada e lupulada que uma Czech Amber Lager.
