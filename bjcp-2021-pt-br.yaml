  - id: '15'
    name: Irish Beer
    notes: As cervejas tradicionais da Irlanda contidas nesta categoria são cervejas âmbar a escuras, de alta fermentação, de intensidade moderada a levemente forte, e muitas vezes são amplamente incompreendidas devido a diferenças nas versões de exportação ou foco excessivo nos atributos específicos da cerveja produzida por grandes cervejarias conhecidas. Cada um dos estilos neste agrupamento tem um alcance mais amplo do que comumente se acredita.
    subcategory:
    - id: 15A
      name: Irish Red Ale
      impression: Uma cerveja fácil de beber, muitas vezes com sabores sutis. Ligeiramente maltada no equilíbrio, às vezes com um dulçor inicial de toffee ou caramelo, no palato leve caráter de cereais e biscoito, no final um toque torrado seco. Algumas versões podem enfatizar mais o caramelo e o dulçor, enquanto outras favorecem no paladar cereais e torrado seco.
      aroma: Aroma de malte baixo a moderado, pode ter um perfil de cereais neutros ou um leve caramelo, tostado ou toffee. Caráter amanteigado muito leve opcional. Aroma baixo de lúpulo terroso ou floral opcional. Bastante limpa.
      appearance: Cor âmbar médio a cobre avermelhado médio. Límpida. Colarinho baixo, quase branco a castanho claro, persistência média.
      flavor: Moderado a muito pouco sabor e dulçor de malte caramelo, raramente com um leve tostado amanteigado ou toffee. O paladar é frequentemente bastante neutro e como cereais, ou pode assumir uma nota levemente tostada ou de biscoito, terminando com um leve sabor de cereais torrados, o que confere uma secura característica ao final. Um leve sabor de lúpulo terroso ou floral é opcional. Amargor médio a médio-baixo. Final meio seco a seco. Limpa e suave. Ésteres baixos opcionais. O equilíbrio tende a ser ligeiramente para o malte, embora o uso leve de cereais torrados possa aumentar ligeiramente a percepção de amargor.
      mouthfeel: Corpo médio-leve a médio, embora exemplos contendo baixos níveis de diacetil possam ter uma sensação na boca levemente escorregadia (não necessária). Carbonatação moderada. Suave.
      comments: O estilo é bastante amplo para permitir exemplos além dos tradicionais da Irlanda. Os exemplos irlandeses tendem a ser menos alcoólicos, com mais cereais e mais secos no final, enquanto as versões não irlandesas geralmente são mais fortes em álcool, mais doces, talvez com mais caráter de caramelo e esterificadas, e geralmente são ofertas sazonais.
      history: Enquanto a Irlanda tem uma longa herança de fabricação de cervejas ale, o estilo moderno Irish Red Ale é essencialmente uma adaptação ou interpretação do popular estilo English Bitter, com menos lupulagem e um toque de torra para adicionar cor e secura; embora alguns sugiram uma história mais longa. Redescoberto como um estilo de cerveja artesanal na Irlanda, hoje é uma parte essencial da linha da maioria das cervejarias, junto com pale ale e stout.
      ingredients: Geralmente tem um pouco de cevada torrada ou malte black para dar cor avermelhada e final torrado seco. Malte base pale. Os maltes de caramelo eram historicamente importados e mais caros, então nem todos os cervejeiros os usavam.
      comparison: Uma cerveja irlandesa equivalente a uma Bitter inglesa menos amarga e menos lupulada, com um final seco devido à cevada torrada. Mais atenuada, com menos sabor de caramelo e corpo do que as Scottish Ales de força equivalente.
