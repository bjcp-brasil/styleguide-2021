    - id: 11B
      name: Best Bitter
      impression: Uma cerveja "session" saborosa, mas refrescante. Alguns exemplos podem ter um equilibrio mais voltado para o malte, mas isso não deve sobrepor a impressão geral de amargor. A facilidade de consumo é um componente crítico do estilo.
      aroma: Aroma de malte de baixo a moderado, muitas vezes (mas nem sempre) com uma qualidade de caramelo de baixo a médio-baixo. Complexidade de malte como pão, biscoito ou levemente tostado é comum. Frutado de leve a moderado. O aroma de lúpulo pode variar de moderado a nenhum, tipicamente com um caráter floral, terroso, resinoso ou frutado. Geralmente sem diacetil, embora níveis muito baixos sejam permitidos.
      appearance: Cor de âmbar claro a cobre médio. Limpidez de boa a brilhante. Colarinho de branco a quase branco de baixo a moderado. Pode ter muito pouco colarinho devido à baixa carbonatação.
      flavor: Amargor de médio a moderadamente alto. Ésteres frutados de moderadamente baixos a moderadamente altos. Sabor de lúpulo de baixo a moderado, tipicamente com caráter terroso, resinoso, frutado e/ou floral. Maltado de baixo a médio com final seco. O perfil de malte é tipicamente de pão, biscoito ou levemente tostado. Sabores de caramelo ou toffee de baixo a moderado são opcionais. O equilíbrio é muitas vezes decididamente amargo, embora o amargor não deva dominar completamente o sabor do malte, ésteres e lúpulo. Geralmente sem diacetil, embora níveis muito baixos sejam permitidos.
      mouthfeel: Corpo de médio-leve a médio. Carbonatação baixa, embora exemplos engarrafados possam ter carbonatação moderada.
      comments: Sabor de malte mais evidente do que em uma Ordinary Bitter; esta é uma session ale mais forte.
      history: Veja os comentários na introdução da categoria.
      ingredients: Maltes pale ale, amber e/ou crystal. A maioria contém açúcar. Pode usar um toque de caramelo e/ou malte escuro para ajuste de cor. Pode usar milho ou trigo. Lúpulos de finalização ingleses são os mais tradicionais, mas qualquer lúpulo é permitido; se forem usados lúpulos americanos, é necessário um toque suave. Levedura britânica com caráter presente.
      comparison: Mais álcool do que uma Ordinary Bitter, muitas vezes utilizando ingredientes de maior qualidade. Menos álcool do que uma Strong Bitter. Mais caráter de malte caramelo ou malte base e cor do que uma British Golden Ale. A ênfase está na adição de lúpulo de amargor, em oposição à agressiva adição de lúpulo intermediária e tardia vista em ales americanas.
