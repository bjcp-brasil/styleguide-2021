  - id: '18'
    name: Pale American Ale
    notes: Esta categoria contém ales americanas modernas com teor alcoólico médio e cor clara, que são de moderadamente maltadas a moderadamente amargas.
    subcategory:
    - id: 18A
      name: Blonde Ale
      impression: Cerveja artesanal americana fácil de beber, acessível e orientada para o malte, frequentemente com notas interessantes de frutas, lúpulo ou caráter maltado. Bem equilibrada e límpida, é uma cerveja refrescante sem sabores agressivos.
      aroma: Aroma maltado de leve a moderado, geralmente neutro ou como cereais, possivelmente com uma leve nota de pão ou de caramelo. Frutado de baixo a moderado é opcional, mas aceitável. Pode ter um aroma de lúpulo de baixo a médio e pode refletir quase qualquer variedade de lúpulo, embora notas cítricas, florais, frutadas e/ou condimentadas sejam comuns. Perfil limpo de fermentação.
      appearance: Cor de amarelo claro a dourado profundo. De límpida a brilhante. Colarinho branco, com formação de baixa a média, com retenção de razoável a boa.
      flavor: Maltado inicial suave, mas também pode ter leve sabor de malte com caráter (por exemplo, pão, torrada, biscoito, trigo). Sabores de caramelo geralmente ausentes; se presentes, são tipicamente notas de caramelo claro ou mel. Ésteres frutados de baixo a médio são opcionais, mas são bem-vindos. Sabor de lúpulo de leve a moderado (qualquer variedade), mas não deve ser excessivamente agressivo. Amargor de médio-baixo a médio, mas o equilíbrio normalmente pende para o malte ou mesmo entre malte e lúpulo. Final de meio seco a levemente maltado; uma impressão de dulçor é, muitas vezes, devido ao amargor mais baixo do que a, realmente, dulçor residual. Perfil limpo de fermentação.
      mouthfeel: Corpo de médio-leve a médio. Carbonatação de média a alta. Suave, mas sem ser pesada.
      comments: Versões oxidadas podem desenvolver notas de caramelo ou mel, que não devem ser confundidas com sabores similares derivados do malte. Às vezes conhecido como Golden Ale ou simplesmente Gold.
      history: Um estilo de cerveja artesanal americano produzido como uma alternativa de produção mais rápida às lagers americanas tradicionais. Acredita-se que foi produzido pela primeira vez, em 1987, na Catamount. Muitas vezes posicionada como uma cerveja de entrada para o portfólio da cervejaria.
      ingredients: Geralmente puro malte, mas pode incluir malte de trigo ou açúcares como adjuntos. Qualquer variedade de lúpulo pode ser usada. Levedura pode ser americana limpa, inglesa levemente frutada ou do tipo Kölsch. Também pode ser feita com levedura lager ou acondicionada a frio.
      comparison: Tipicamente tem mais sabor do que a American Lager e a Cream Ale. Menos amargor que uma American Pale Ale. Talvez semelhante a alguns exemplos mais maltados de Kölsch.
