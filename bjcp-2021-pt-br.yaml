  - id: Estilos Provisórios
    name: null
    notes: Estilos Provisórios
    subcategory:
    - id: X1
      name: Dorada Pampeana
      impression: Fácil de beber, maltada.
      aroma: Aroma adocicado de malte de leve a moderado. Aroma frutado de baixo a moderado é aceitável. Pode ter aroma de lúpulo de baixo a médio. Sem diacetil.
      appearance: Cor de amarelo claro a dourado profundo. De limpa a brilhante. Colarinho de baixo a médio, com boa retenção.
      flavor: Dulçor maltado inicial suave. Sabores de caramelo são tipicamente ausentes. Sabor de lúpulo de leve a moderado (geralmente Cascade), mas não deve ser agressivo. Amargor de lúpulo de baixo a moderado, com o equilíbrio normalmente tendendo ao maltado. Final de meio seco a um pouco doce. Sem diacetil.
      mouthfeel: Corpo de médio-baixo a médio. Carbonatação de média a alta. Macia, sem amargor áspero ou adstringência.
      comments: É difícil alcançar o equilíbrio.
      history: 'No início, os cervejeiros caseiros argentinos estavam muito limitados: não existiam extratos, só podiam usar malte Pils, lúpulo Cascade e levedura seca, geralmente Nottingham, Windsor ou Safale. Com esses ingredientes, os cervejeiros argentinos desenvolveram uma versão específica de Blond Ale, chamando-a de Dorada Pampeana.'
      ingredients: Geralmente só malte Pale ou Pils, embora possa incluir proporções baixas de maltes caramelizados. Comumente se utiliza lúpulo Cascade. Levedura americana, inglesa ou Kölsch limpa, geralmente acondicionada a frio.
      statistics:
        og:
          min: '1.042'
          max: '1.054'
        ibus:
          min: '15'
          max: '22'
        fg:
          min: '1.009'
          max: '1.013'
        srm:
          min: '3'
          max: '5'
        abv:
          min: '4.3'
          max: '5.5'
      tags:
      - south-america
    - id: X2
      name: IPA Argenta
      impression: Uma ale argentina decididamente lupulada e amarga, refrescante e moderadamente forte. O ponto principal do estilo está em ser fácil de beber, sem aspereza e com um bom equilíbrio.
      aroma: Aroma de lúpulo intenso com caráter cítrico e floral, oriundo dos lúpulos argentinos. Algum dulçor maltado e caramelo pode ser encontrado como nota de fundo, mas deve estar em menor intensidade que em exemplares ingleses. Um caráter frutado proveniente de ésteres e leve fenóis de fermentação de trigo podem também ser detectadas em algumas versões, embora um caráter de fermentação neutra seja mais comum. Um caráter alcoólico pode ser percebido em versões mais fortes. Sem DMS. O diacetil é um grande demérito, porque pode encobrir aromas de lúpulo, e nunca deve estar presente.
      appearance: Cor variando de dourada média a cobre avermelhada médio; algumas versões podem ter um tom alaranjado. Deve ser límpida, ainda que versões com dry-hopping não filtradas ou com trigo não maltado possam ser um pouco turvas. Boa formação de espuma e persistente.
      flavor: 'Sabor de lúpulo de médio a alto, devendo refletir o caráter de lúpulo argentino: cítrico, toranja e casca de tangerina devem dominar. Pode ter um caráter floral, como flor de laranjeira, ou herbal e resinoso, embora isso seja menos comum e deve apenas adicionar complexidade. Amargor de lúpulo de médio-alto a muito alto, apesar da base de malte dar suporte ao forte caráter de lúpulo e prover melhor equilíbrio. Sabor de malte deve ser de baixo a médio e é geralmente limpo e doce como malte, ainda que algum caramelo ou sabores de especiarias do trigo, maltado ou não maltado, sejam aceitáveis em níveis baixos. Sem diacetil. Frutado baixo é aceitável, mas não é obrigatório. O amargor pode permanecer no retrogosto, mas não deve ser áspero. Final de meio seco a seco, refrescante. Algum sabor limpo de álcool pode ser notado em versões mais fortes.'
      mouthfeel: Corpo de médio-baixo a médio, sem adstringência derivada de lúpulo, ainda que a carbonatação de moderada a médio-alta, combinada com o trigo, possa dar uma sensação seca, mesmo com presença de dulçor de malte. Algum aquecimento alcoólico suave pode e deve ser sentido em versões mais fortes (mas não em todas). O corpo geralmente é mais baixo do que em uma English IPA e mais seca que uma American IPA
      history: Uma versão argentina do estilo histórico inglês, desenvolvida em 2013, nos encontros da associação Somos Cerveceros, momento em que suas características marcantes foram definidas. Difere de uma American IPA por ser produzida com trigo e usando lúpulos argentinos, que tem sabor e aroma com características únicas. O estilo busca que as características cítricas do lúpulo argentino estejam em harmonia com o trigo, como em uma Witbier. A pouca quantidade de trigo pode ser semelhante ao grist de uma Kölsch, em que também há um frutado proveniente da fermentação.
      ingredients: Malte Pale Ale (bem modificado e adequado para mostura simples) com até 15% de trigo, tanto maltado como não maltado; maltes Caramelo devem ser limitados, dando preferência ao trigo caramelo. Lúpulos argentinos, como Cascade, Mapuche e Nugget são típicos, embora Spalt, Victoria e Bullion também possam ser usados para adicionar complexidade. Levedura americana, que traz um perfil levemente frutado e limpo. Caráter da água varia de baixo a moderado teor de sulfatos.
      statistics:
        og:
          min: '1.055'
          max: '1.065'
        ibus:
          min: '35'
          max: '60'
        srm:
          min: '6'
          max: '15'
        abv:
          min: '5.0'
          max: '5.5'
      examples:
      - Antares Ipa Argenta
      - Kerze Ipa Argenta
      tags:
      - south-america
    - id: X3
      name: Italian Grape Ale
      impression: Uma cerveja italiana às vezes refrescante, às vezes mais complexa, caracterizada por diferentes variedades de uvas.
      aroma: As características aromáticas de uma determinada uva devem ser perceptíveis, mas não devem se sobrepor aos outros aromas. O caráter da uva deve ser agradável e não deve apresentar defeitos, como oxidação. O caráter de malte é geralmente contido e não deve exibir um perfil torrado. O aroma de lúpulo (floral, terroso) pode variar de médio-baixo a ausente. Alguns exemplares podem ter um leve perfil selvagem, descrito como curral, terroso, caprino, mas não deve ser tão intenso como em uma Lambic ou Fruit Lambic. Sem diacetil.
      appearance: A cor pode variar de dourado claro a cobre, mas alguns exemplares podem ser marrons. A cor avermelhada ou rubi se deve, geralmente, à utilização de variedades de uva tinta. Espuma de branca a avermelhada, geralmente com retenção média-baixa. Geralmente com boa limpidez, mas pode apresentar alguma turbidez.
      flavor: 'Assim como no aroma, o caráter de uva (similar a mosto ou vinho) deve estar presente e sua intensidade pode variar de média-baixa a média-alta. Variedades de uva podem contribuir de diferentes formas no perfil de sabor: em geral, sabores de frutas tropicais ou frutas de caroço (pêssego, pera, damasco e abacaxi) podem vir de uvas brancas, e sabores de frutas vermelhas (p.ex., cereja e morango) de variedades de uvas tintas. Além disso, o caráter frutado oriundo da fermentação também é comum. Diferentes tipos de maltes especiais podem ser usados, mas devem ser equilibrados e para dar suporte, não tão proeminentes a ponto de ofuscar a cerveja base. Um forte caráter torrado e/ou de chocolate é inapropriado. Leves notas ácidas, devido ao uso de uva, são comuns e podem ajudar a melhorar a facilidade em se beber, mas não devem ser proeminentes como em uma Sour Ale, Lambic ou similares. Sabores de carvalho, junto com algumas notas de curral, terrosas ou caprinas podem estar presentes,
        mas não devem ser predominantes. Amargor e sabores de lúpulo são baixos. Diacetil ausente.'
      mouthfeel: A carbonatação média-alta melhora a percepção do aroma. O corpo é geralmente de baixo a médio e alguma acidez pode contribuir para aumentar a percepção de secura. Exemplares fortes podem apresentar algum aquecimento, mas sem serem quentes ou como solventes.
      history: Inicialmente produzida em Birrificio Montegioco e Birrificio Barley, em 2006-2007, a Italian Grape Ale (IGA) agora é produzida por muitas cervejarias artesanais italianas. Também está se tornando popular nos EUA e em outros países vinicultores. Representa uma união entre a cerveja e o vinho, promovida pela grande disponibilidade local de diferentes variedades de uvas em todo o país. Podem ser uma expressão do território, da biodiversidade e da criatividade do cervejeiro. Normalmente vista como uma cerveja especial dentre os produtos da cervejaria. As cervejarias chamam de “Wild IGA” ou “Sour IGA” qualquer versão selvagem ou ácida do estilo.
      ingredients: 'Malte Pils, na maioria dos casos, ou malte base Pale com alguns maltes especiais (se houver). O teor de uva pode representar até 40% do perfil de maltes. A uva ou o mosto de uvas, às vezes fervidos por longo tempo antes da utilização, podem ser utilizados em diferentes fases: durante a fervura ou, mais frequentemente, durante a fermentação primária ou secundária. A levedura pode apresentar um caráter neutro (mais comum) ou um perfil frutado ou condimentado (cepas inglesas e belgas). Levedura de vinho também pode ser usada em conjunto com outras leveduras. As variedades de lúpulos do velho mundo, principalmente alemãs ou inglesas, são utilizadas em baixas quantidades para não caracterizar excessivamente a cerveja.'
      comparison: Semelhante à Fruit Beer, mas evoluiu como um estilo autônomo devido à abundância de variedades de uvas na Itália.
      statistics:
        og:
          min: '1.055'
          max: '1.100'
        ibus:
          min: '6'
          max: '30'
        srm:
          min: '4'
          max: '25'
        abv:
          min: '4.5'
          max: '12'
      examples:
      - Montegioco Open Mind
      - Birrificio Barley BB5-10
      - Birrificio del Forte Il Tralcio
      - Viess Beer al mosto di gewurtztraminer
      - CRAK IGA Cabernet
      - Birrificio Apuano Ninkasi
      - Luppolajo Mons Rubus
      tags:
      - Specialty-beer
      - Fruit
    - id: X4
      name: Catharina Sour
      impression: Uma cerveja refrescante de trigo, ácida e com frutas, possui um caráter vívido de frutas e uma acidez lática limpa. A graduação alcoólica contida, o corpo leve, a carbonatação elevada e amargor abaixo da percepção fazem com que a fruta fresca seja o destaque. A fruta não precisa ser de caráter tropical, mas, normalmente, apresenta este perfil.
      aroma: Caráter de fruta de médio a alto, reconhecível e identificável de forma imediata. Acidez lática limpa, de intensidade baixa a média, que complementa a fruta. Malte tipicamente neutro, mas pode apresentar notas de pão e cereais em caráter de apoio. Fermentação limpa, sem caráter de levedura selvagem ou funky. Sem aroma de lúpulo. Sem álcool agressivo. Especiarias, ervas e vegetais devem complementar a fruta, se estiverem presentes.
      appearance: Coloração tipicamente bastante clara, de amarela-palha a dourada. Espuma branca de média a alta formação e média a boa retenção. A coloração da espuma e da cerveja podem ser alteradas e ficar com a coloração da fruta. Pode ser de bastante límpida a turva. Efervescente.
      flavor: Sabor de fruta fresca dominante, de médio a alto, e com acidez lática limpa, de baixa a média-alta, de forma complementar, mas notável. A fruta deve ter um caráter fresco, sem parecer cozida, parecida com geleia ou artificial. O malte é normalmente ausente; se presente, pode ter um caráter baixo de cereais ou pão, mas não deve nunca competir com a fruta ou a acidez. Amargor do lúpulo abaixo do limiar de percepção. Final seco, com um retrogosto limpo, ácido e frutado. Sem sabor de lúpulo, notas acéticas, diacetil, ou sabores funky, oriundos de Brettanomyces. Especiarias, ervas e vegetais são opcionais e em caráter complementar à fruta.
      mouthfeel: Corpo de baixo a médio-baixo. Carbonatação de média a alta. Sem aquecimento alcoólico. Acidez de baixa a média-baixa, sem ser agressivamente ácida ou adstringente.
      comments: Melhor servida fresca. A acidez pode fazer com que a cerveja pareça mais seca e com um corpo menor do que a densidade final sugere. Uma Berliner Weisse com adição de frutas deve ser inscrita na categoria 29A Fruit Beer.
      history: Os exemplos individuais existiam com nomes diferentes, anteriormente, no Brasil, mas o estilo se tornou popular com esse nome depois que foi definido formalmente, em 2015, durante uma reunião entre cervejeiros profissionais e caseiros em Santa Catarina. Utilizando ingredientes locais, adequado para um clima quente, o estilo se espalhou para outros estados do Brasil e além, sendo um estilo muito popular na América do Sul – tanto em competições comerciais como caseiras.
      ingredients: Malte Pilsen com malte de trigo ou trigo não maltado. A técnica de Kettle Sour com o uso de Lactobacillus é a mais comum de ser utilizada, seguida por uma fermentação com uma levedura ale neutra. A fruta é tipicamente adicionada nos estágios finais da fermentação. Frutas da estação, frescas, comumente tropicais. Especiarias, ervas e vegetais são opcionais, mas devem sempre estar em caráter de apoio e elevar a percepção da fruta.
      comparison: Como uma Berliner Weisse mais forte, mas com fruta fresca e sem Brett. Menos ácida do que Lambic e Gueuze e sem o caráter da Brett. A partir do guia de estilos 2021, cervejas semelhantes podem ser inscritas no estilo mais amplo 28C Wild Specialty Beer Style.
