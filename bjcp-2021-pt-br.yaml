  - id: '6'
    name: Amber Malty European Lager
    notes: Esta categoria agrupa as cervejas lagers de cor âmbar, de origem alemã e de baixa fermentação, com um equilíbrio maltado e teor alcoólico de vollbier (densidade inicial entre 11°P e 14°P) a starkbier (densidade inicial acima de 16°P).
    subcategory:
    - id: 6A
      name: Märzen
      impression: Uma cerveja lager alemã de cor âmbar com sabor de malte limpo, rico, tostado, como pão, amargor contido e um final bem atenuado. A impressão geral de malte é suave, elegante e complexa, com um retrogosto maltado rico que nunca é enjoativo ou pesado.
      aroma: Aroma maltado moderado, tipicamente rico, como pão, um pouco tostado e com leve notas de casca de pão. Perfil de fermentação lager limpo. Aroma de lúpulo muito baixo floral, herbal e/ou condimentado é opcional. Aromas de malte doce como caramelo, similar a biscoito seco ou torrado são inapropriados. Álcool muito leve pode ser percebido, mas nunca deve ser forte. O aroma primário deve ser de malte rico, limpo e elegante.
      appearance: Cor de âmbar alaranjado a cobre avermelhado profundo; não deve ser dourada. Limpidez brilhante com colarinho quase branco persistente.
      flavor: Sabor de malte rico de moderado a alto, que muitas vezes sugere um dulçor inicial, mas o final é de moderadamente seco a seco. Maltado característico e complexo, que muitas vezes inclui aspectos como pão e tostado. O amargor de lúpulo é moderado e o sabor de lúpulo floral, herbal e/ou condimentado é de baixo a inexistente. O lúpulo proporciona equilíbrio suficiente para que o sabor maltado e o final não pareçam doces. O retrogosto é maltado e persistente com os mesmos sabores de malte elegantes e ricos. Sabores aparentes de caramelo doce, biscoito seco ou torrado são inapropriados. Perfil de fermentação limpo.
      mouthfeel: Corpo médio com textura suave e cremosa que muitas vezes sugere uma sensação na boca mais cheia. Carbonatação média. Completamente atenuada, sem impressão de dulçor ou enjoativa. Pode ter um leve aquecimento alcoólico, mas a força alcoólica deve estar relativamente escondida.
      comments: As versões modernas domésticas da Oktoberfest alemã são douradas - veja o estilo Festbier para essa versão. Versões alemãs para exportação (para os Estados Unidos, pelo menos) geralmente são de cor laranja-âmbar, tem um caráter distinto de malte tostado e, muitas vezes, são rotuladas como Oktoberfest. Muitas versões artesanais de Oktoberfest são baseadas nesse estilo. Versões históricas da cerveja tendiam a ser mais escuras, mais para a faixa de cor marrom, mas houve muitos “tons” de Märzen (quando o nome era usado como teor alcoólico). A descrição desse estilo se refere especificamente à versão com maior teor alcoólico e de cor âmbar. A Festbier atual pode ser descrita como uma Märzen de corpo mais leve e mais clara.
      history: Como o nome sugere, originalmente era uma “cerveja de março”, produzida durante esse mês com um teor alcoólico mais alto e armazenada em cavernas frias durante o verão para maturação. As versões modernas remontam à lager desenvolvida pela Spaten, em 1841, contemporânea ao desenvolvimento da Vienna Lager. No entanto, o nome Märzen vem de muito antes que 1841 — os primeiros exemplares eram de coloração marrom-escuro e o nome se referia a uma faixa de teor alcoólico (14°P) ao invés de um estilo. A lager de cor âmbar foi servida na Oktoberfest de 1872 até 1990, quando a Festbier, de cor dourada, foi adotada como a cerveja padrão do festival.
      ingredients: O perfil de maltes varia, embora versões tradicionais alemãs enfatizem o malte Munich. A noção de elegância é proveniente de ingredientes da melhor qualidade, particularmente os maltes base. Mostura usando decocção é tradicional e realça o perfil rico de malte.
      comparison: Não tão forte e rica como uma Dunkles Bock. Com mais profundidade e riqueza de malte do que uma Festbier, com um corpo mais cheio e um pouco menos de lúpulo. Menos lupulada, mas igualmente maltada que uma Czech Amber Lager, mas com um perfil de malte diferente.
