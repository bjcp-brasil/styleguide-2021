  - id: '20'
    name: American Porter and Stout
    notes: Todas essas cervejas evoluíram de seus homônimos ingleses para serem totalmente transformadas por cervejeiros artesanais americanos. Geralmente, esses estilos são maiores, com teor alcoólico mais alto, mais torrados e mais centrados no lúpulo do que os respectivos estilos ingleses tradicionais. Esses estilos são agrupados devido a uma história compartilhada e o perfil de sabor semelhantes.
    subcategory:
    - id: 20A
      name: American Porter
      impression: Uma cerveja escura maltada, amarga e muitas vezes um pouco lupulada, com um caráter equilibrado, torrado e frequentemente achocolatado.
      aroma: Aroma torrado de médio-leve a médio-forte, muitas vezes com um caráter de chocolate, café leve ou levemente queimado, às vezes com um dulçor de caramelo ou toffee em segundo plano, ou uma riqueza maltada. O caráter de lúpulo de baixo a alto pode variar entre resinoso, terroso ou floral. Ésteres frutados moderados são opcionais. Não deve parecer pungente, acre ou ácida. O equilíbrio entre malte e lúpulo pode variar, mas deve sempre ter um aroma de malte torrado.
      appearance: Cor de marrom médio a marrom muito escuro, muitas vezes com reflexos rubis ou granada (vermelho escuro). Pode se aproximar da cor preta. Límpida, se não opaca. Colarinho volumoso, castanho, com retenção moderadamente boa.
      flavor: Sabor torrado moderadamente forte, muitas vezes com um caráter de chocolate e levemente queimado, às vezes com um caramelo doce ou riqueza de malte como suporte. Amargor de médio a alto e final seco a meio doce. Maltes escuros podem acentuar essa impressão, mas não devem adicionar um sabor acre, queimado ou áspero. Sabor de lúpulo de baixo a alto de perfil resinoso, terroso ou floral, que não deve colidir com o malte escuro. As versões com dry-hopping podem ter um lúpulo fresco ou sabor resinoso. Ésteres frutados moderados são opcionais. Não deve ter uma acidez picante.
      mouthfeel: Corpo de médio a médio-alto. Carbonatação de moderadamente baixa a moderadamente alta. Versões mais fortes podem ter um leve aquecimento alcoólico. Pode ter uma leve adstringência do malte escuro, mas esse caráter não deve ser forte.
      comments: Ocasionalmente chamada de Robust Porter, tornando-se cada vez mais difícil de encontrar. Um estilo bastante amplo e aberto à interpretação pelo cervejeiro. A intensidade e o sabor do malte escuro podem variar significativamente. Pode ou não ter um forte caráter de lúpulo ou subprodutos significativos da fermentação; assim pode parecer ter um caráter “americano” ou “britânico”.
      history: 'Uma versão mais forte e agressiva do que as anteriores Pre-Prohibition Porters ou English Porters, fabricadas pela primeira vez na era da cerveja artesanal moderna (introduzida em 1974). Este estilo descreve a versão artesanal moderna; veja Historical Beer: Pre-Prohibition Porter para a versão mais antiga dos EUA.'
      ingredients: Malte base pale, frequentemente malte crystal. Maltes escuros, geralmente malte black ou malte chocolate. Lúpulos americanos normalmente usados para amargor, mas lúpulos de finalização dos EUA ou do Reino Unido podem ser usados. A levedura Ale pode ser de versões americanas limpas ou de variedades inglesas com personalidade.
      comparison: Mais amarga e muitas vezes mais forte, com qualidades de malte mais escuro e secura do que as English Porters ou Pre-Prohibition Porters. Menos forte e assertiva do que American Stouts.
