  - id: '11'
    name: British Bitter
    notes: Após o final do século XIX, a família de Bitters britânicas surgiu a partir de pale ales inglesas, como um produto de barril (chope). O uso de maltes crystal em bitters tornou-se mais difundido após a Primeira Guerra Mundial. Tradicionalmente servida muito fresca, sem pressão (somente por densidade ou bomba manual) em temperaturas de adega (ou seja, “real ale”). A maioria das versões engarrafadas ou em barril de bitters produzidas no Reino Unido são frequentemente versões com maior teor alcoólico e maior carbonatação de produtos de barril produzidos para exportação e têm um caráter e equilíbrio diferentes do que seus equivalentes na Grã-Bretanha (muitas vezes sendo mais doces e menos lupuladas do que versões de barril). Essas diretrizes refletem a versão “real ale” do estilo, não as receitas de produtos comerciais para exportação. Existem muitas variações regionais de bitters, desde versões mais escuras e doces servidas quase sem colarinho até versões mais brilhantes, lupuladas
      e claras com espuma generosa e tudo o que há entre elas. Os juízes não devem enfatizar demais o componente caramelo desses estilos. Bitters exportadas podem estar oxidadas, o que aumenta os sabores de caramelo (assim como sabores mais negativos). Não assuma que os sabores derivados da oxidação são tradicionais ou necessários para o estilo.
    subcategory:
    - id: 11A
      name: Ordinary Bitter
      impression: Baixa densidade, teor alcoólico e carbonatação fazem desta uma cerveja session fácil de beber. O perfil de malte pode variar em sabor e intensidade, mas nunca deve sobrepor a impressão geral de amargor. A facilidade de consumo é um componente crítico do estilo.
      aroma: Aroma de malte de baixo a moderado, muitas vezes (mas nem sempre) com uma leve qualidade de caramelo. Complexidade de malte como pão, biscoito ou levemente tostado é comum. Frutado de leve a moderado. O aroma de lúpulo pode variar de moderado a nenhum, tipicamente com um caráter floral, terroso, resinoso ou frutado. Geralmente sem diacetil, embora níveis muito baixos sejam permitidos.
      appearance: Cor de âmbar claro a cobre claro. Limpidez de boa a brilhante. Colarinho de branco a quase branco de baixo a moderado. Pode ter muito pouco colarinho devido à baixa carbonatação.
      flavor: Amargor de médio a moderadamente alto. Ésteres frutados de moderadamente baixos a moderadamente altos. Sabor de lúpulo de baixo a moderado, tipicamente com caráter terroso, resinoso, frutado e/ou floral. Maltado de baixo a médio com final seco. O perfil de malte é tipicamente de pão, biscoito ou levemente tostado. Sabores de caramelo ou toffee de baixo a moderado são opcionais. O equilíbrio é muitas vezes decididamente amargo, embora o amargor não deva dominar completamente o sabor do malte, ésteres e lúpulo. Geralmente sem diacetil, embora níveis muito baixos sejam permitidos.
      mouthfeel: Corpo de leve a médio-leve. Carbonatação baixa, embora exemplos engarrafados possam ter carbonatação moderada.
      comments: A membra de menor densidade da família British Bitter, normalmente conhecida pelos consumidores simplesmente como “bitter” (embora os cervejeiros tendam a se referir a ela como Ordinary Bitter para distingui-la de outras membras da família).
      history: Veja os comentários na introdução da categoria.
      ingredients: Maltes pale ale, amber e/ou crystal. Pode usar um toque de malte escuro para ajuste de cor. Pode usar adjuntos como açúcar, milho ou trigo. Lúpulos de finalização ingleses são os mais tradicionais, mas qualquer lúpulo é permitido; se forem usados lúpulos americanos, é necessário um toque suave. Levedura britânica com caráter presente.
      comparison: Algumas variantes modernas são fabricadas exclusivamente com malte claro e são conhecidas como Golden Ales, Summer Ales ou Golden Bitters. A ênfase está na adição de lúpulo de amargor, em oposição à agressiva adição de lúpulo intermediária e tardia vista em ales americanas.
