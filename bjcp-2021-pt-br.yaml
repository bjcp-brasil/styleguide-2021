    - id: 17C
      name: Wee Heavy
      impression: Malte rico e doce, com profundidade de caramelo, toffee e sabores frutados. Corpo cheio e denso (com dextrinas), com aquecimento alcoólico. Amargor contido, mas não enjoativa ou xaroposa.
      aroma: Malte tostado forte, com alto aspecto de caramelo e toffee. Uma ampla gama de aromas de açúcar caramelizado e pão torrado como suporte são possíveis (migalhas de pão tostadas, biscoitos champagne, biscoitos ingleses, bolachas, torrone, caramelo etc). Às vezes leve nota torrada perceptível. Ésteres de frutas escuras ou secas e álcool de baixo a moderado. Lúpulos terrosos, florais, cítricos como laranja ou picantes muito baixos são opcionais.
      appearance: Cor de cobre claro a marrom escuro, muitas vezes com reflexos rubis profundos. Límpida. Geralmente tem um volumoso colarinho castanho, que pode não persistir. Lágrimas podem ser evidentes em versões com teor alcoólico mais alto.
      flavor: Malte rico e tostado, muitas vezes cheio e doce no paladar com sabores de caramelo e toffee, mas equilibrado pelo álcool e uma pitada de grãos torrados no final. O malte geralmente tem açúcar caramelizado e sabores tostados do mesmo tipo descrito no aroma. Álcool e ésteres de baixos a médios (ameixas, passas, frutos secos etc). Amargor baixo no equilíbrio, dando um final de meio seco a doce. Sabor de lúpulo médio-baixo é opcional, com descritores semelhantes ao aroma.
      mouthfeel: Corpo de médio-alto a alto, às vezes com uma viscosidade espessa, densa (com dextrinas), às vezes cremosa. Um aquecimento alcoólico suave, geralmente está presente e é desejável, pois equilibra a doçura do malte. Carbonatação moderada.
      comments: Uma ampla gama em relação a força é permitida; nem todas as versões tem teor alcoólico muito alto. Também conhecida como “Strong Scotch Ale”, o termo wee heavy significa “forte pequena” e remonta à cerveja que tornou o termo famoso, a Fowler’s Wee Heavy, uma 12 Guinea Ale (Moeda antiga da Inglaterra).
      history: Descendente das Edinburgh Ales, uma cerveja maltada mais forte, fabricada numa gama de intensidades alcoólicas, semelhante à Burton Ale (embora com metade da proporção de lúpulo). As versões modernas têm duas variantes principais, uma cerveja mais modesta com 5% de ABV e a mais conhecida cerveja com 8-9% de ABV. Como as densidades diminuíram ao longo do tempo, algumas das variações deixaram de ser produzidas.
      ingredients: Malte escocês pale ale, uma ampla gama de outros ingredientes é possível, incluindo adjuntos. Alguns podem usar malte crystal ou grãos mais escuros para conferir cor. Sem malte defumado com turfa.
      comparison: Um pouco semelhante a uma English Barley Wine, mas muitas vezes mais escura e mais caramelizada.
