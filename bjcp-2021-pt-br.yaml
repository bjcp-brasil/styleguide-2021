    - id: 13B
      name: British Brown Ale
      impression: Uma ale britânica maltada, caramelada e marrom sem os sabores torrados de uma Porter. Equilibrada e saborosa, mas geralmente com o teor alcoólico um pouco mais alto do que a maioria das cervejas medianas do Reino Unido.
      aroma: Aroma de malte leve e doce, com notas de toffee, nozes ou leve chocolate, e uma qualidade de caramelo de leve a pesado. Um leve, mas atraente aroma de lúpulo floral ou terroso também pode ser notado. Um leve aroma frutado pode ser evidente, mas não deve dominar.
      appearance: Cor de âmbar escuro a marrom escuro avermelhado. Límpida. Colarinho de baixo a moderado, com cor de quase branco a castanho claro.
      flavor: Dulçor do malte de suave a moderado, com um caráter de caramelo de baixo a alto, e um final de médio a seco. O malte também pode ter um caráter de nozes, torrado, biscoito, toffee ou leve chocolate. Amargor de médio a médio-baixo. O equilíbrio entre o malte e o lúpulo varia de uniforme a focado no malte. Baixo sabor de lúpulo floral ou terroso é opcional. Ésteres frutados de baixos a moderados são opcionais.
      mouthfeel: Corpo de médio-leve a médio. Carbonatação de média a média-alta.
      comments: Uma categoria ampla, com diversas interpretações possíveis, variando de versões mais claras e lupuladas às mais escuras e focadas em caramelo; no entanto, nenhuma das versões têm sabores fortemente torrados. Uma Double Brown Ale com teor alcoólico mais elevado era a mais popular no passado, mas é muito difícil de ser encontrada atualmente. Enquanto as London Brown Ales são comercializadas usando o nome de Brown Ale, nós as listamos como um estilo de julgamento diferente devido à diferença significativa de equilíbrio (especialmente em relação ao dulçor) e teor alcoólico; isso, no entanto, não significa que elas não fazem parte da mesma família.
      history: Brown ale tem uma longa história na Grã-Bretanha, embora diferentes produtos tenham usado esse nome em vários momentos. A Brown Ale moderna é uma criação do século 20; não é o mesmo que produtos históricos com o mesmo nome. Uma ampla gama de densidades foi produzida, mas as brown ales modernas são geralmente uma interpretação com teor alcoólico mais alto (pelos padrões atuais do Reino Unido). Este estilo é baseado nas modernas British brown ales com teor alcoólico mais alto, não em versões históricas ou da mais doce London Brown Ale descrita na categoria Historical Beer. Atualmente, predominantemente, mas não exclusivamente, um produto engarrafado.
      ingredients: Malte base britânico mild ale ou pale ale com maltes caramelo. Também pode ter pequenas quantidades de maltes mais escuros (por exemplo, chocolate) para dar cor e o caráter de nozes. As variedades de lúpulo inglês são as mais autênticas.
      comparison: Mais equilíbrio de malte do que British Bitters, com mais sabores de malte vindos de grãos mais escuros. Com teor alcoólico mais alto que uma Dark Mild. Menos torrado do que uma English Porter. Com teor alcoólico mais alto e muito menos doce que a London Brown Ale.
