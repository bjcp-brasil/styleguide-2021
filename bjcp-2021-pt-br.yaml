    - id: 27A
      name: 'Historical Beer: Pre-Prohibition Porter'
      impression: Uma adaptação americana histórica da English Porter por imigrantes alemães usando ingredientes americanos, incluindo adjuntos.
      aroma: Aroma de malte como cereais, com baixos níveis de chocolate, caramelo, biscoito, açúcar queimado, alcaçuz ou malte levemente queimado. Baixo aroma de lúpulo. Nível de baixo a moderadamente baixo de milho ou DMS é aceitável. Ésteres de muito baixos a nenhum. Diacetil de baixo a nenhum. Perfil de fermentação lager limpo é aceitável.
      appearance: Cor de marrom médio a escuro, embora alguns exemplares possam ser quase pretos, com reflexos rubi ou de cor mogno. Relativamente clara. Espuma de cor castanha, de baixa a média formação, persistente.
      flavor: Sabor moderado de malte que remete a cereais e pão, com baixos níveis de chocolate, malte queimado, açúcar queimado, caramelo, biscoito, alcaçuz, melaço ou tosta. Sabor de milho ou DMS é aceitável em níveis baixos a moderados. Amargor de médio-baixo a moderado. Baixo sabor de lúpulo floral, condimentado ou terroso é opcional. O equilíbrio é tipicamente nivelado entre o malte e o lúpulo, com um final moderadamente seco. Perfil de fermentação limpo, entretanto, ésteres leves são permitidos.
      mouthfeel: Corpo de médio-baixo a médio. Carbonatação moderada. Cremosidade de baixa a moderada. Pode ter uma leve adstringência de malte escuro.
      comments: Também às vezes conhecida como Pennsylvania Porter ou East Coast Porter. Este estilo não descreve produtos da era colonial.
      history: Produzida comercialmente na Filadélfia durante o período revolucionário como uma adaptação da cerveja inglesa. Evoluiu mais tarde, quando os imigrantes alemães aplicaram métodos de fabricação de cerveja lager durante a segunda metade dos anos 1800. A Lei Seca acabou com a maioria da produção de cerveja Porter nos Estados Unidos, exceto em alguns estados regionais do Nordeste e do Meio-Atlântico, onde ela era mais popular.
      ingredients: Malte de duas ou seis fileiras. Baixas porcentagens de maltes escuros, incluindo malte black, chocolate e brown (cevada torrada normalmente não é usada). Adjuntos são aceitáveis, incluindo milho, alcaçuz cervejeiro, melaço e porterine (caramelo escuro de xarope de milho). Versões mais históricas terão até vinte por cento de adjuntos. Levedura lager ou ale. Lúpulos de amargor americanos históricos ou tradicionais, lúpulos americanos ou alemães para final de fervura.
      comparison: Mais suave e com menos amargor de lúpulo do que uma American Porter (moderna). Menos caráter de caramelo e mais suave do que uma English Porter, com mais caráter de adjunto ou de uma cerveja lager. Mais amargor e torrado do que uma International Dark Lager.
