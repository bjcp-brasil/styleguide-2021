    - id: 23C
      name: Oud Bruin
      impression: Uma ale belga maltada, maturada e de certo modo ácida, com um sabor de malte caramelo-chocolate e, frequentemente, álcool em teor considerável.
      aroma: Ricamente maltada com ésteres frutados e uma acidez maturada. Ésteres de médio a médio-alto, comumente remetendo a uvas passas, ameixas, figos, tâmaras, laranjas, cerejas pretas ou ameixas secas. Malte de médio-baixo a médio-alto, com caráter caramelo, toffee, melado ou chocolate. Fenóis baixos com caráter condimentado-picante são opcionais. Um aroma ácido baixo é aceitável e pode aumentar modestamente com o tempo, mas não deve chegar a um nível fortemente acético, de caráter avinagrado. Aroma de lúpulo é ausente. Exemplares maturados podem apresentar um caráter de oxidação que levemente remeta a nozes e/ou xerez.
      appearance: Coloração marrom-avermelhado profundo. Boa limpidez. De média a boa retenção de espuma. Colarinho de marfim a castanho claro na cor.
      flavor: Maltada com complexidade frutada e, tipicamente, algum sabor de caramelo escuro ou açúcar queimado. Malte de médio-baixo a médio-alto, com os mesmos descritores do aroma. De médio a médio-alto frutado, com mesmos descritores do aroma. Fenóis baixos, com caráter condimentado-picante, são opcionais. Uma leve acidez muitas vezes torna-se mais pronunciada em exemplares bem maturados, juntamente com algum caráter como xerez, produzindo perfil e retrogosto “doces e azedos” (agridoces). A acidez não deve chegar a um nível fortemente acético, de caráter avinagrado. Sabor de lúpulo ausente. Amargor de lúpulo contido. Equilíbrio para o malte, mas com frutado e acidez presentes. Combinações e fonte de açúcares podem produzir finais e equilíbrios variados.
      mouthfeel: Corpo de médio a médio-cheio. Carbonatação baixa a moderada. Sem adstringência. Versões mais fortes podem apresentar aquecimento bem perceptível.
      comments: Maturação longa e mistura de cervejas jovens e envelhecidas podem ocorrer, agregando suavidade e complexidade e equilibrando qualquer caráter azedo e áspero. Este estilo foi, tradicionalmente, pensado para guarda, portanto, exemplares com caráter de maturação moderada são considerados superiores aos exemplares mais jovens. Versões com frutas devem ser inscritos como uma 29A Fruit Beer.
      history: Uma cerveja nativa da Flandres Oriental, representada pelos produtos da cervejaria Liefman, com raízes remetendo aos anos 1600. Os cervejeiros belgas consideram a Flanders Red e a Oud Bruin da mesma família de estilos, mas a primeira diferenciação foi feita quando Michael Jackson inicialmente definiu os estilos de cerveja, dado que os perfis de sabor são claramente diferentes. Muitos exemplares modernos são influenciados pela popularidade da Liefmans Goudenband. Sem correlação com a lager holandesa escura e doce de mesmo nome.
      ingredients: Malte Pilsen, maltes escuros crystal, milho e pequenas quantidades de malte para cor. Lúpulos continentais de baixo alfa ácido. Sacch e Lacto. Maturada. Água rica em carbonatos e magnésio típica da região de origem.
      comparison: Um caráter mais intenso de malte, com mais caramelo, toffee, sabores de chocolate e coloração mais escura distinguem estas cervejas das Flanders Red Ale. A Oud Bruin é menos acética e mais maltada que uma Flanders Red e os sabores frutados são mais orientados para o malte. Nos tempos modernos a Oud Bruin também tende a ser mais alcoólica do que tipicamente é observado nas Flanders Red Ales. Se difere da Lambic já que não são espontaneamente fermentadas e não contém trigo.
