    - id: 5B
      name: Kölsch
      impression: Uma cerveja sutil, clara, brilhante e límpida com um delicado equilíbrio entre o caráter de malte, fruta e lúpulo. Amargor moderado e bem atenuada, mas com o final suave. O frescor faz muita diferença a esta cerveja, pois o perfil delicado pode desaparecer rapidamente com o tempo.
      aroma: Aroma de malte adocicado de cereal de muito-baixo a baixo. Aroma sutil de frutas (maçã, pera ou às vezes cereja) é opcional, mas bem-vindo. Aroma de lúpulo floral, condimentado e/ou herbal baixo é opcional. A intensidade dos aromas é bastante sutil, mas geralmente equilibrada, limpa, fresca e agradável.
      appearance: De amarelo médio a dourado claro. Limpidez brilhante. Possui uma delicada espuma branca que pode não persistir.
      flavor: Apresenta um delicado equilíbrio entre o sabor de malte, frutado, amargor e lúpulo, com final limpo e bem atenuado. Caráter de malte lembrando cereais de médio a médio-baixo, pode apresentar notas muito leves de pão ou mel. O frutado pode apresentar um dulçor quase imperceptível. Amargor de médio-baixo a médio. Sabor de lúpulo floral, condimentado e/ou herbal de baixo a moderadamente-alto; a maioria é de médio-baixo a médio. Pode ter uma impressão inicial de malte neutro a um leve dulçor de malte. Sabor suave e arredondado. O final é suave, seco e levemente bem definido (crisp), sem ser acentuado ou cortante. Sem dulçor residual perceptível. Embora o equilíbrio entre os componentes de sabor possa variar, nenhum é forte.
      mouthfeel: Corpo de médio-leve a médio; a maioria é médio-leve. Carbonatação de média a média-alta. Suave e macia, mas bem atenuada sem ser pesada. Sem aspereza.
      comments: Uma cerveja tradicional, de alta fermentação e maturada a frio, da cidade de Colônia, Alemanha (Köln). As cervejarias de Colônia se diferenciam entre si pelo equilíbrio, então ao julgar permita uma gama de variações dentro do estilo. As versões mais secas podem parecer mais lupuladas ou mais amargas do que os níveis de IBU podem sugerir. O delicado perfil de sabor não envelhece bem, portanto deve-se ficar atento a defeitos oriundos de oxidação. Em Colônia é servida em um copo alto e estreito de 200 ml chamado Stange.
      history: Colônia tem uma tradição cervejeira desde a Idade Média, mas a cerveja agora conhecida como Kölsch foi desenvolvida no final dos anos 1800 como uma alternativa às lagers claras. A baixa fermentação foi na realidade proibida em Colônia. Kölsch é uma denominação protegida pela Kölsch Konvention (1986) e é restrita a cervejarias dentro e ao redor de Colônia. A Konvention simplesmente define a cerveja como uma “Vollbier” leve, altamente atenuada, com lúpulo acentuado, límpida e de alta fermentação.
      ingredients: Lúpulos tradicionais alemães. Malte alemão Pils, Pale e/ou Vienna. Levedura ale alemã limpa e atenuante. Ocasional uso de malte de trigo em pequenas quantidades. A prática comercial atual é fermentar em torno de 15°C, acondicionar a frio próximo ao congelamento por até um mês e servir fresca.
      comparison: Pode ser confundida com uma Cream Ale ou com uma German Pils um tanto sutil.
