    - id: 27A
      name: 'Historical Beer: London Brown Ale'
      impression: Uma ale marrom de baixo teor alcoólico, deliciosa, doce e maltada, com complexidade de malte como caramelo e toffee e um final de sabor doce.
      aroma: Aroma moderado de dulçor de malte, muitas vezes com um rico caráter de caramelo ou toffee. Ésteres frutados de baixos a médios, geralmente frutas escuras, como ameixas. Muito baixo aroma de lúpulo terroso ou floral é opcional.
      appearance: Cor de marrom médio a muito escuro, mas pode ser quase preta. Quase opaca, embora deva ser relativamente límpida se visível. Espuma de quase branca a castanha, com formação de baixa a moderada.
      flavor: Profundo sabor doce de malte tipo caramelo ou toffee no paladar, perdurando até o final, frequentemente com notas de biscoito e café. Alguns ésteres de frutas escuras podem estar presentes; perfil de fermentação relativamente limpo para uma cerveja inglesa. Baixo amargor. Baixo sabor de lúpulo terroso ou floral é opcional, mas é raro. Sabor moderadamente baixo de malte torrado ou malte black mais pungente é opcional. Final moderadamente doce com retrogosto suave e maltado. Pode ter um sabor doce açucarado.
      mouthfeel: Corpo médio, mas a doçura residual pode dar uma impressão mais encorpada. Carbonatação de média-baixa a média. Bastante cremosa e de textura suave, particularmente pela sua densidade.
      comments: Cada vez mais rara, a Mann’s tem mais de 90% de participação de mercado na Grã-Bretanha, mas em um segmento cada vez menor. Sempre engarrafada. Frequentemente usada como misturas doces entre Milds e Bitters de barril nos pubs. As versões comerciais podem ser pasteurizadas e adoçadas, o que dá um sabor mais açucarado.
      history: Desenvolvida pela Mann’s como um produto engarrafado em 1902. Elencada na época como “a cerveja mais doce de Londres”. As versões anteriores à Primeira Guerra Mundial tinham cerca de 5% ABV, mas com o mesmo equilíbrio geral. Diminuiu em popularidade na segunda metade do século 20 e agora está quase extinta.
      ingredients: Malte pale ale inglês como base, com uma grande proporção de malte caramelo mais escuros e frequentemente algum malte black e de trigo (este é o grão tradicional da Mann – outras podem contar com açúcares escuros para cor e sabor). Água com teor de carbonato de moderado a alto. Lúpulo inglês. Adoçada pós-fermentação com lactose ou adoçantes artificiais, ou sacarose, se pasteurizada.
      comparison: Pode parecer uma versão menos torrada de uma Sweet Stout (e de menor densidade, pelo menos para os exemplos de Sweet Stout dos EUA) ou uma versão doce de uma Dark Mild.
