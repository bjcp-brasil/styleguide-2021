  - id: '28'
    name: American Wild Ale
    notes: 'O nome American Wild Ale é comumente usado por cervejeiros artesanais e homebrewers. No entanto, a palavra Wild não implica que essas cervejas sejam necessariamente fermentadas espontaneamente; em vez disso, indica que elas são influenciadas por outra microbiota além das leveduras cervejeiras tradicionais ou talvez sejam cervejas de fermentação mista. O uso da palavra American não significa que a cerveja deva ser baseada em um estilo clássico de cerveja americana ou que os métodos sejam praticados exclusivamente nos Estados Unidos. Estilos base nesta categoria não precisam ser estilos clássicos (embora possam ser); algo como “Blond Ale, 7%” seria bom, já que o estilo base é frequentemente perdido devido ao caráter de fermentação. Esta categoria destina-se a uma ampla gama de cervejas que não se enquadram nos estilos tradicionais europeus ácidos, selvagens ou de fermentação espontânea. Todos os estilos nesta categoria são cervejas especiais onde muitas interpretações criativas
      são possíveis e os estilos são definidos apenas pelo uso de ingredientes e perfis de fermentação específicos. Como estilos especiais, a descrição obrigatória fornecida pelo participante é de extrema importância para o juiz. Os estilos nesta categoria são diferenciados pelos tipos de leveduras e bactérias que são utilizados – veja o preâmbulo de cada estilo para mais informações. Usamos os termos abreviados de conversação utilizados na indústria cervejeira: Brett para Brettanomyces, Sacch para Saccharomyces, Lacto para Lactobacillus e Pedio para Pediococcus. Consulte o glossário para obter informações adicionais. O estilo Wild Specialty Beer é para cervejas de outros estilos dentro desta categoria quando ingredientes especiais são adicionados. Notas de segundo plano de carvalho podem ser usados em todos os estilos dentro desta categoria, mas cervejas envelhecidas em outras madeiras com sabores únicos ou barris que continham outros produtos alcoólicos devem ser inseridas no estilo Wild
      Specialty Beer.'
    subcategory:
    - id: 28A
      name: Brett Beer
      impression: Uma cerveja frequentemente mais seca e frutada do que o estilo base sugere. Notas frutadas ou funky variam de baixas a altas, dependendo da idade da cerveja e cepas de Brettanomyces utilizadas. Pode apresentar leve acidez que não seja láctica.
      aroma: Varia com o estilo base. Brett Beers jovens apresentam notas frutadas (por exemplo, frutas tropicais, frutas de caroço ou frutas cítricas), no entanto a intensidade varia de acordo com as cepas de Brettanomyces utilizadas. Brett Beers mais velhas apresentam leve funky conforme passa o tempo (por exemplo, celeiro, palha úmida, leve terroso e notas defumadas), no entanto essa característica não deve dominar.
      appearance: Varia com o estilo base. Limpidez variável e depende do estilo base e ingredientes utilizados. Turbidez baixa não necessariamente é uma falha.
      flavor: Varia com o estilo base. O caráter de Brettanomyces varia de mínimo a agressivo. Pode ser bastante frutado (por exemplo, frutas tropicais, bagas, frutas de caroço ou frutas cítricas) ou ter algum defumado, terroso ou notas de celeiro. Não deve ter um funky desagradável como Band-Aid, fétido, removedor de esmalte, queijo etc. Sempre frutado quando a cerveja é jovem e ganhando mais funky com o envelhecimento. Pode não ser láctica. Sabores de malte são frequentemente menos pronunciados do que no estilo base, deixando a cerveja frequentemente seca e com final bem definido devido à alta atenuação da Brettanomyces.
      mouthfeel: Varia com o estilo base. Geralmente tem um corpo baixo, mais leve do que o esperado para o estilo base, embora um corpo muito baixo seja uma falha. Carbonatação usualmente de moderada a alta. Retenção de espuma é variável, mas frequentemente menor que a do estilo base.
      comments: O estilo base descreve a maior parte das características destas cervejas, mas a adição de Brettanomyces garante um produto mais seco, mais leve e frequentemente mais frutado e funky. Versões jovens são mais vividas e frutadas, enquanto as mais velhas possuem funk mais complexo e podem perder mais do caráter do estilo base. O caráter de Brettanomyces deve sempre combinar com o estilo base; essas cervejas nunca devem ser uma ’bomba de Brett’. Embora a Brettanomyces possa produzir baixos níveis de ácidos orgânicos, não é um método primário de acidificação de cerveja.
      history: Interpretações modernas de cerveja artesanal americana ou experimentações inspiradas em wild ales belgas ou cervejas inglesas históricas com Brettanomyces. As ditas cervejas 100% Brett ganharam popularidade após o ano 2000, mas foi quando se imaginava que a Saccharomyces Trois fosse uma cepa de Brettanomyces (o que não é). Atualmente Brettanomyces usada em conjunto com uma fermentação com Saccharomyces é uma prática padrão.
      ingredients: Virtualmente qualquer estilo de cerveja (exceto os que já utilizam a co-fermentação Saccharomyces ou Brettanomyces), depois finalizada com uma ou mais cepas de Brettanomyces. Uma alternativa é uma fermentação mista com Saccharomyces e uma ou mais cepas de Brettanomyces. Sem Lactobacillus.
      comparison: Comparada com o mesmo estilo de cerveja sem Brettanomyces, uma Brett Beer será mais seca, mais atenuada, mais frutada, com corpo mais leve e levemente com mais funky conforme envelhece. Menos acidez e profundidade do que wild ales belgas.
      statistics:
        notes: Varia com o estilo base.
      examples:
      - Boulevard Saison Brett
      - Hill Farmstead Arthur
      - Logsdon Seizoen Bretta
      - Lost Abbey Brett Devo
      - Russian River Sanctification
      - The Bruery Saison Rue
      tags:
      - craft-style
      - north-america
      - specialty-beer
      - wild-fermentation
    - id: 28B
      name: Mixed-Fermentation Sour Beer
      impression: Uma versão ácida e funky de um estilo base de cerveja.
      aroma: Varia com o estilo base. A contribuição de micróbios que não são Saccharomyces deve ser de perceptível a forte e frequentemente contribui com uma nota selvagem, ácida e funky. Os melhores exemplares apresentam uma amplitude de aromáticos ao invés de uma característica única e dominante. O aroma deve ser convidativo, não agressivo e desagradável.
      appearance: Varia com o estilo base. Limpidez pode variar; turbidez baixa não é necessariamente uma falha. Retenção de espuma pode ser ruim.
      flavor: Varia com o estilo base. Procure um equilíbrio agradável entre a cerveja base e o caráter da fermentação. Uma variedade de resultados é possível, desde acidez e funky bastante altos até uma cerveja sutil, agradável e harmoniosa. Os melhores exemplos são prazerosos de beber com os ésteres e fenóis complementando o malte ou o lúpulo. O caráter selvagem pode ser proeminente, mas não precisa ser dominante em um estilo com um perfil intenso de malte ou lúpulo. A acidez deve ser firme, mas agradável, variando de limpa a complexa, mas não deve ser agressiva ou com caráter de vinagre; ácido acético proeminente ou ofensivo é uma falha. O amargor tende a ser baixo, especialmente conforme a acidez aumenta.
      mouthfeel: Varia com o estilo base. Geralmente tem um corpo baixo, quase sempre mais leve do que o esperado para o estilo base. Carbonatação usualmente moderada a alta, embora muitas vezes menor em exemplares de alto teor alcoólico.
      comments: O estilo base é menos relevante neste estilo porque as leveduras e bactérias tendem a dominar o perfil. Amargor normalmente é contido, uma vez que acidez e amargor são sensações conflitantes no palato. Características inapropriadas incluem diacetil, solvente, textura filante ou viscosa e oxidação intensa.
      history: Interpretações modernas artesanais ou experimentações inspiradas em sour ales belgas.
      ingredients: Virtualmente qualquer estilo de cerveja. Frequentemente fermentada por uma combinação de Lactobacillus, Pediococcus, Saccharomyces e/ou Brettanomyces. Pode também ser uma mistura de estilos. O uso de madeira ou envelhecimento em barricas é bastante comum, mas não obrigatório; caso presente não deve ser um sabor primário ou dominante.
      comparison: Uma versão ácida e funky de um estilo base de cerveja, mas não necessariamente é tão ácida ou funky quanto alguns exemplos europeus de cervejas ácidas.
      statistics:
        notes: Varia com o estilo base.
      examples:
      - Boulevard Love Child
      - Jester King Le Petit Prince
      - Jolly Pumpkin Oro de Calabaza
      - Lost Abbey Ghosts in the Forest
      - New Belgium Le Terroir
      - Russian River Temptation
      tags:
      - craft-style
      - north-america
      - sour
      - specialty-beer
      - wild-fermentation
    - id: 28C
      name: Wild Specialty Beer
      impression: Uma American Wild Ale com frutas, ervas, especiarias ou outros ingredientes especiais.
      aroma: Varia com o estilo base. O ingrediente especial deve ser evidente, assim como as características de uma fermentação selvagem esperadas para o estilo base. Os melhores exemplares apresentam uma mistura de aromáticos de fermentação e de ingredientes especiais, criando um aroma que pode ser difícil de atribuir precisamente.
      appearance: Varia com o estilo base, geralmente apresentando cor, tonalidade ou nuance de um ingrediente especial (principalmente no caso de uso de frutas) tanto na cerveja quanto na espuma. Limpidez variável; leve turbidez não é uma falha. Retenção de espuma normalmente baixa.
      flavor: Varia com o estilo base. O ingrediente especial deve ser evidente assim como as características de uma fermentação selvagem esperadas para o estilo base. Se frutas foram fermentadas, o dulçor geralmente não aparece, restando apenas os ésteres frutados. Frutas e outros ingredientes especiais podem adicionar acidez; caso positivo a acidez pode ser proeminente, mas não deve ser intensa demais. Tanto a acidez quanto taninos provenientes de frutas e outros ingredientes especiais podem aumentar a percepção de secura, portanto cuidados devem ser observados com o equilíbrio da cerveja. A acidez deve realçar a percepção de sabores de frutas, mas não prejudicar. Notas de madeira, caso presentes, agregam sabor, mas devem ser equilibradas.
      mouthfeel: Varia com o estilo base. Geralmente tem um corpo baixo, mais leve do que o esperado para o estilo base. Carbonatação usualmente moderada a alta; a carbonatação deve estar de acordo com a do estilo base caso seja declarado. A presença de taninos de ingredientes especiais (frequentemente frutas ou madeiras) pode contribuir com leve adstringência, aumentar o corpo ou fazer a cerveja ter uma percepção mais seca do que realmente é.
      comments: Este estilo destina-se a versões com frutas (e outros ingredientes especiais) de outros estilos da categoria 28, não variações de estilos clássicos europeus ácidos ou selvagens. Versões de Lambics com adição de frutas devem ser inscritas em 23F Fruit Lambic. Versões de outros estilos clássicos ácidos com frutas (por exemplo, Flanders Red, Oud Bruin, Gose, Berliner Weisse) devem ser inseridas em 29A Fruit Beer. Cervejas com açúcares e frutas não fermentadas adicionadas após a fermentação devem ser inseridas em 29C Specialty Fruit Beer.
      history: Interpretações modernas artesanais ou experimentações inspiradas em wild ales belgas.
      ingredients: Virtualmente qualquer estilo de cerveja. Qualquer combinação de Sacch, Brett, Lacto, Pedio ou outro microrganismo similar. Pode ser ainda uma mistura de estilos. Enquanto cerejas, framboesas e pêssegos são mais comuns, outras frutas também podem ser utilizadas. Vegetais com características de frutas (como pimentas, ruibarbo, abóbora) também podem ser utilizados. Envelhecimento em madeira ou em barricas é bastante comum, mas não obrigatório. É permitido o uso de madeiras com características únicas ou não usuais, ou madeiras com contato prévio com outros tipos de álcool.
      comparison: Como uma cerveja com frutas, ervas, condimentos ou madeira, mas ácida ou funky.
      statistics:
        notes: Varia com o estilo base.
      examples:
      - Cascade Bourbonic Plague
      - Jester King Atrial Rubicite
      - New Belgium Dominga Mimosa Sour
      - New Glarus Wisconsin Belgian Red
      - Russian River Supplication
      - The Lost Abbey Cuvee de Tomme
      tags:
      - craft-style
      - fruit
      - north-america
      - sour
      - specialty-beer
      - wild-fermentation
    - id: 28D
      name: Straight Sour Beer
      impression: Uma cerveja azeda, clara e refrescante com uma acidez lática limpa. Um suave sabor de malte claro suporta a acidez como limão com moderados ésteres frutados.
      aroma: Um caráter de acidez acentuada é dominante (de moderadamente alto a alto). Pode ter um caráter frutado moderado (muitas vezes como pêssego, damasco, limão ou maçã ácida). Sem aroma de lúpulo. Maltado claro de apoio, normalmente abiscoitado ou como bolacha de água-e-sal. Fermentação limpa.
      appearance: Cor muito clara. Limpidez varia de muito límpida até um pouco turva. Colarinho branco, denso e alto, com baixa retenção. Efervescente.
      flavor: Acidez lática limpa domina e pode ser bastante forte. Algum sabor complementar de pão, biscoito, bolacha de água-e-sal ou como cereais é geralmente notável. Amargor de lúpulo é indetectável. Nunca avinagrado ou com uma acidez picante. Caráter de fruta branca pode ser moderado, incluindo cítrico como limão ou maçã ácida que é geralmente notável. Final de quase seco a seco. O equilíbrio é dominado pela acidez, porém alguns sabores de malte e ésteres frutados devem estar presentes. Sem sabor de lúpulo. Limpa.
      mouthfeel: Corpo leve. Carbonatação moderada a alta. Nunca quente, embora exemplos de densidade inicial maior podem ter um caráter de aquecimento alcoólico. Acidez bem definida.
      comments: Uma versão mais forte de cervejas como Berliner Weisse com uma combinação de grãos menos restrita, e sem Brett. Esse estilo de cerveja é tipicamente utilizado como base para cervejas modernas que são altamente saborizadas com frutas, especiarias, açúcares, etc., essas devem ser inscritas em 28C Wild Specialty Beer.
      history: O cientista cervejeiro alemão, Otto Francke, desenvolveu o que se tornou conhecido como processo de acidificação Francke, que possibilitou o tradicional processo de fermentação mista da Berliner Weisse se tornar mais rápido e consistente; também é conhecido como kettle sour ou acidificação na panela. Muitas cervejas azedas modernas utilizam esse método para produção rápida e é uma alternativa para os complexos processos de produção em barris.
      ingredients: A maior parte, ou toda combinação de grãos, é de maltes Pale, Pilsen ou maltes de trigo em qualquer combinação. Maltes levemente tostados podem ser utilizados para maior profundidade maltada. Maltes como Carapils podem ser utilizados para o corpo. Açúcar claro pode ser utilizado para aumentar a densidade inicial sem aumentar o corpo. Sem lactose ou maltodextrina. Pode ser produzida por meio de kettle souring, culturas de cofermentação (levedura ou bactéria produtora de ácido lático), ou utilizando levedura especial para produção de ácido lático. Sem Brett.
      comparison: Exemplos de densidade mais baixa podem parecer muito com uma Berliner Weisse sem Brett. Comparados à Lambic, geralmente não são tão ácidas e com um acidez de fermentação lática limpa, com funk restrito abaixo do limiar de percepção. Maior teor alcoólico do que ambas.
      statistics:
        og:
          min: '1.048'
          max: '1.065'
        ibus:
          min: '3'
          max: '8'
        fg:
          min: '1.006'
          max: '1.013'
        srm:
          min: '2'
          max: '3'
        abv:
          min: '4.5'
          max: '7'
      examples:
      - Raramente são encontrados
      - esse estilo é tipicamente utilizado como base para outros estilos especiais (Specialty-Type Beers)
      tags:
      - pale-color
      - sour
      - top-fermented
  - id: '29'
    name: Fruit Beer
    notes: A categoria Fruit Beer é feita para cervejas produzidas com qualquer fruta ou combinações de frutas que estejam dentro de suas definições. Aqui, é utilizada a definição culinária da fruta, não a botânica - polpa, estruturas associadas à semente de plantas que são doces ou azedas e comestíveis no estado cru. Exemplos incluem frutas de pomar (maçã, pera, marmelo), frutas de caroço (cereja, ameixa, pêssego, damasco, manga etc), frutas vermelhas (qualquer fruta com a palavra ’berry’ - em inglês - no nome), groselhas, frutas cítricas, frutas secas (tâmara, ameixa, uva passa etc), frutas tropicais (banana, abacaxi, manga, goiaba, maracujá, papaia etc), figo, romã, e assim por diante. Não estão abrangidos aqui especiarias, ervas e vegetais como definidos na Categoria 30 - especialmente frutos botânicos que são tratadas como vegetais culinários (legumes). Se você precisar justificar uma fruta utilizando a palavra “tecnicamente” como parte da descrição, então não é isso que nós queremos
      dizer. Veja a introdução da seção Cervejas de Especialidade para comentários adicionais, particularmente sobre a avaliação do equilíbrio dos ingredientes adicionados à cerveja base.
    subcategory:
    - id: 29A
      name: Fruit Beer
      impression: Uma combinação harmoniosa entre frutas e cerveja, mas ainda assim reconhecível como cerveja. O caráter de frutas deve estar em equilíbrio com a cerveja e ser evidente, mas não proeminente a ponto de sugerir um produto artificial.
      aroma: Varia de acordo com o estilo base. O caráter de fruta deve ser notável no aroma; no entanto, algumas frutas (por exemplo, framboesas e cerejas) têm aromas mais intensos e distintos do que outras (por exemplo, mirtilos e morangos) – o que permite uma gama de caráter e intensidade de frutas, de sutil a agressivo. Aroma de lúpulo pode ser mais baixo do que o esperado para o estilo base, para mostrar melhor o caráter da fruta. A fruta deve adicionar complexidade, mas não deve estar proeminente a ponto de desequilibrar o produto final.
      appearance: Varia de acordo com o estilo base e ingredientes especiais utilizados. Cervejas de cor mais clara, incluindo o colarinho, podem apresentar cores vindas da adição. A cor da fruta na cerveja é geralmente mais clara do que a cor da polpa da própria fruta e pode ter tons ligeiramente diferentes. Limpidez variável, ainda que a turbidez seja geralmente não desejável. Alguns ingredientes podem impactar na retenção da espuma.
      flavor: Varia de acordo com o estilo base. Como no aroma, um distinto sabor de fruta deve ser notável e pode variar em intensidade, de sutil a agressivo; porém, o caráter da fruta não deve ser tão artificial ou inapropriadamente dominante a ponto de sugerir um “suco de frutas”. Amargor, sabores de lúpulo e malte, teor alcoólico e subprodutos de fermentação, como ésteres, devem ser apropriados para o estilo base, porém harmoniosos e equilibrados com os distintos sabores de frutas presentes. A fruta geralmente adiciona sabor, mas não dulçor; normalmente, o açúcar encontrado em frutas é totalmente fermentado e contribui para sabores mais leves e um final mais seco. Entretanto, dulçor residual não é necessariamente uma caraterística negativa, a não ser que traga um caráter cru, de não fermentado. Algumas frutas podem adicionar acidez, amargor e/ou taninos, que devem estar em equilíbrio no perfil final de sabor.
      mouthfeel: Varia de acordo com o estilo base. A fruta muitas vezes diminui o corpo e faz a cerveja parecer mais leve no palato. Algumas frutas menores e mais escuras podem adicionar uma profundidade tânica, mas essa adstringência não deve sobrepujar a cerveja base.
      comments: A descrição da cerveja é crítica para avaliação. Os juízes devem pensar mais no conceito declarado do que tentar detectar individualmente cada ingrediente utilizado. Equilíbrio, facilidade de beber e execução do tema (do estilo proposto) são os fatores mais importantes. A fruta deve complementar o estilo base, não sobrecarregá-lo. Os atributos do estilo base serão diferentes após a adição da fruta, ou seja, não espere que a cerveja tenha o sabor idêntico ao do estilo base inalterado. Fruit Beers com base de Estilos Clássicos devem ser inscritas neste estilo, exceto Lambic - existe um estilo especial para Fruit Lambic (23F). Cervejas com frutas, ácidas ou de fermentação mista, sem base de Estilo Clássico devem ser inscritas em 28C Wild Specialty Beer. Versões com fruta de Estilos Clássicos ácidos (por exemplo, Flanders Red Ale, Oud Bruin, Gose, Berliner Weisse) devem ser inscritas em 29A Fruit Beer. Versões com fruta de Estilos Clássicos em que especiarias são uma parte inerente
        da sua definição (por exemplo, Witbier, Gose) não contam como Spice Beer para fins de inscrição.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar de acordo com a cerveja base, mas a fruta poderá impactar na coloração.
      examples:
      - 21st Amendment Hell or High Watermelon
      - Anderson Valley Blood Orange Gose
      - Avery Liliko’i Kepolo
      - Ballast Point Grapefruit Sculpin
      - Bell’s Cherry Stout
      - Founders Rübæus
      tags:
      - fruit
      - specialty-beer
    - id: 29B
      name: Fruit and Spice Beer
      impression: Uma saborosa união entre frutas, especiarias e cerveja, mas ainda assim reconhecível como cerveja. O caráter de frutas e de especiarias devem estar em equilíbrio com a cerveja e ser evidentes, mas não proeminentes a ponto de sugerir um produto artificial.
      aroma: Varia de acordo com o estilo base. O caráter de fruta e de especiaria deve ser notável no aroma; no entanto, algumas frutas e especiarias (por exemplo, framboesas, cerejas, canela, gengibre) têm aromas mais intensos e distintos do que outras (por exemplo, mirtilos e morangos) - o que permite uma gama de caráter e intensidade de frutas, de sutil a agressivo. Aroma de lúpulo pode ser mais baixo do que o esperado para o estilo base, para mostrar melhor o caráter de especialidade. Os ingredientes especiais devem adicionar complexidade, mas não devem estar proeminentes a ponto de desequilibrar o produto final.
      appearance: Varia de acordo com o estilo base e ingredientes especiais utilizados. Cervejas de cor mais clara, incluindo o colarinho, podem apresentar cores vindas da adição. A cor da fruta na cerveja é geralmente mais clara do que a cor da polpa da própria fruta e pode ter tons ligeiramente diferentes. Limpidez variável, ainda que a turbidez seja geralmente não desejável. Alguns ingredientes podem impactar na retenção da espuma.
      flavor: Varia de acordo com o estilo base. Como no aroma, um distinto sabor de fruta e de especiaria deve ser notável e pode variar em intensidade, de sutil a agressivo, porém o caráter da fruta não deve ser tão artificial ou inapropriadamente dominante a ponto de sugerir um “suco de frutas com especiarias”. Amargor, sabores de lúpulo e malte, teor alcoólico e subprodutos de fermentação, como ésteres, devem ser apropriados para o estilo base, porém harmoniosos e equilibrados com os distintos sabores de frutas e especiarias presentes. A fruta geralmente adiciona sabor, mas não dulçor; normalmente, o açúcar encontrado em frutas é totalmente fermentado e contribui para sabores mais leves e um final mais seco. Entretanto, dulçor residual não é necessariamente uma caraterística negativa, a não ser que traga um caráter cru, de não fermentado. Alguns ingredientes podem adicionar acidez, amargor e/ou taninos, que devem estar em equilíbrio no perfil final de sabor.
      mouthfeel: Varia de acordo com o estilo base. A fruta muitas vezes diminui o corpo e faz a cerveja parecer mais leve no palato. Algumas frutas menores e mais escuras podem adicionar uma profundidade tânica, mas essa adstringência não deve sobrepujar a cerveja base. Algumas SHVs podem aumentar ou diminuir o corpo. Alguns SHVs podem adicionar um pouco de adstringência, ainda que um caráter de especiaria “crua” não seja desejável.
      comments: A descrição da cerveja é crítica para avaliação. Os juízes devem pensar mais no conceito declarado do que tentar detectar individualmente cada ingrediente utilizado. Equilíbrio, facilidade de beber e execução do tema (do estilo proposto) são os fatores mais importantes. Os ingredientes especiais devem complementar o estilo base, não sobrecarregá-lo. Os atributos do estilo base serão diferentes após a adição de fruta e especiaria, ou seja, não espere que a cerveja tenha o sabor idêntico ao do estilo base inalterado.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar de acordo com a cerveja base, mas a fruta poderá impactar na coloração.
      examples:
      - Cigar City Margarita Gose
      - Firestone Walker Chocolate Cherry Stout
      - Golden Road Spicy Mango Cart
      - Kona Island Colada Cream Ale
      - New Glarus Blueberry Cocoa Stout
      - Sun King Orange Vanilla Sunlight
      tags:
      - fruit
      - specialty-beer
      - spice
    - id: 29C
      name: Specialty Fruit Beer
      impression: Uma atraente combinação de fruta, açúcar e cerveja, mas ainda assim reconhecível como cerveja. O caráter de fruta e açúcar deve estar em equilíbrio com a cerveja e ser evidente, mas não proeminente a ponto de sugerir um produto artificial.
      aroma: O mesmo de Fruit Beer, com exceção que alguns fermentáveis adicionados (por exemplo, mel e melaço) podem acrescentar um componente de aroma. Qualquer componente adicional de aroma que estiver presente deve estar em equilíbrio com os componentes da fruta e da cerveja e formar uma combinação agradável.
      appearance: A mesma de Fruit Beer.
      flavor: O mesmo de Fruit Beer, com exceção que alguns fermentáveis adicionados (por exemplo, mel e melaço) podem adicionar um componente de sabor. Qualquer componente adicional de sabor que estiver presente deve estar em equilíbrio com os componentes da fruta e da cerveja e formar uma combinação agradável. Açúcares adicionados não devem ter um sabor cru, não fermentado. Alguns açúcares adicionados terão elementos não fermentáveis que podem prover um final mais cheio e doce; açúcares totalmente fermentáveis podem deixar o final mais ralo.
      mouthfeel: A mesma de Fruit Beer, ainda que, dependendo do tipo de açúcar adicionado, pode ter o corpo aumentado ou diminuído.
      comments: Se os fermentáveis ou processos não adicionarem um caráter distinguível para a cerveja, inscreva-a como outro estilo de Fruit Beer (não Specialty Fruit Beer) e omita a descrição dos ingredientes extras ou processos.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar de acordo com a cerveja base, mas a fruta poderá impactar na coloração.
      examples:
      - The Bruery Goses are Red
      - New Planet Raspberry Ale
      - Tired Hands Strawberry Milkshake IPA
      - WeldWerks Piña Colada IPA
      tags:
      - fruit
      - specialty-beer
    - id: 29D
      name: Grape Ale
      impression: Combina o perfil de um vinho espumante e uma cerveja base relativamente neutra, permitindo que as qualidades aromáticas da uva se misturem agradavelmente com os aromas de lúpulo e de levedura. Pode variar de refrescante a complexa.
      aroma: As características aromáticas da variedade da uva são perceptíveis, mas não devem dominar. O carácter da uva deve se fundir bem com o caráter do malte base subjacente. Embora o aroma do lúpulo seja geralmente contido, pode variar de médio-baixo a totalmente ausente. A fermentação é geralmente bastante limpa, mas pode apresentar notas de especiarias delicadas e ésteres frutados. Banana, tutti-frutti e similares são considerados como falhas.
      appearance: A cor pode variar de dourado claro a rubi, mas aquelas que usam uvas vermelhas tendem ao bordô. Estas cores mais escuras podem vir do uso de produtos de uva cozida ou concentrada, nunca de cereais especiais escuros. Espuma de branca a avermelhada, com retenção geralmente média-baixa. A limpidez é geralmente boa. Nunca turva.
      flavor: Assim como no aroma, o caráter da uva pode variar de sutil a médio-alto e ser mais proeminente. Sabores de frutas (tropical, vermelhas, de caroço etc.) adequados à variedade da uva utilizada. Uvas vermelhas mais escuras podem contribuir com sabores mais rústicos (por exemplo, terroso, tabaco, couro). O caráter de malte é de suporte, não deve ser forte e geralmente deve ser de variedade clara, levemente tostada. Níveis muito baixos de malte cristal claro são permitidos, mas o caráter torrado ou forte de chocolate é sempre inadequado. O amargor é geralmente baixo e os sabores de lúpulo podem ser de baixos a inexistentes. Notas ácidas suaves, devido à variedade e quantidade de uva utilizada, são comuns e podem ajudar a melhorar a digestibilidade, mas não devem se aproximar do limite do “azedo”. Carvalho complementar é opcional, mas um caráter funky de Brettanomyces não deve estar presente. Fermentação limpa.
      mouthfeel: A carbonatação de média-alta a alta melhora a percepção do aroma. O corpo é geralmente de baixo a médio e alguma acidez pode contribuir para aumentar a percepção de secura. O final é extremamente seco e bem definido. Exemplos fortes no teor alcoólico podem mostrar algum aquecimento alcoólico.
      comments: O teor alcoólico pode ir de 4,5% a 12,5%, mas é mais comum estar na faixa de ABV listada abaixo. A percepção da cor varia amplamente, com base na tonalidade da fruta adicionada.
      history: Inicialmente produzida por Birrificio Montegioco e Birrificio Barley em 2006-2007. Tornou-se mais popular depois de ser publicada nas Diretrizes de 2015 como Italian Grape Ale (IGA) e inspirou muitas variações locais em outros países.
      ingredients: Malte Pilsen ou Pale, uso contido de malte cristal ou de trigo. O mosto de uva (variedades tintas ou brancas, tipicamente mosto fresco) geralmente representa de 15 a 20% do total do perfil de maltes, mas pode exceder 40%. O mosto é fermentado com a cerveja e não uma mistura de vinho e cerveja. Leveduras de perfil frutado e picante são as mais comumente usadas, mas podem ser utilizadas variedades neutras. O lúpulo deve ser selecionado para complementar o perfil geral. Esta cerveja não é sujeita a dry-hopping. O uso de carvalho é permitido, mas não é obrigatório e não deve ser predominante ou em níveis mais fortes do que os encontrados em vinho.
      comparison: Base semelhante a vários estilos belgas, como Belgian Blonde, Saison e Belgian Single, mas com uvas. Exemplos mais fortes são semelhantes à Belgian Tripel ou à Belgian Golden Strong Ale, mas com uvas. Não contém o caráter funky, como a Fruit Lambic.
      statistics:
        og:
          min: '1.059'
          max: '1.075'
        ibus:
          min: '10'
          max: '30'
        fg:
          min: '1.004'
          max: '1.013'
        srm:
          min: '4'
          max: '8'
        abv:
          min: '6'
          max: '8.5'
      examples:
      - Montegioco Open Mind
      - Birrificio del Forte Il Tralcio
      - Luppolajo Mons Rubus
      - Firestone Walker Feral Vinifera
      - pFriem Family Brewers Druif
      - 4 Árvores Abbondanza
      tags:
      - fruit
      - specialty-beer
  - id: '30'
    name: Spiced Beer
    notes: Foram utilizadas as definições comuns ou culinárias de especiarias, ervas ou vegetais, e não as definições botânicas ou científicas. De maneira geral, especiarias são as sementes secas, vagens de sementes, frutas, raízes, cascas, etc. de plantas utilizadas para dar sabor à comida. Ervas são plantas ou partes de plantas (folhas, flores, pétalas, talos) utilizadas para dar sabor à comida. Vegetais são plantas comestíveis salgadas ou menos doces, usados principalmente para cozinhar e, às vezes, para serem comidos crus. Vegetais podem incluir algumas frutas botânicas. Esta categoria explicitamente inclui todos as especiarias, ervas e vegetais culinários, como amêndoas (ou qualquer coisa que tenha nut no nome em inglês, incluindo coco), pimenta, café, chocolate, pontas de abeto, rosa mosqueta, hibisco, cascas e raspas de frutas (porém, não o suco), ruibarbo, e similares. Não estão incluídos aqui frutas ou grãos. Açúcares e xaropes fermentáveis com sabor (por exemplo, néctar de agave,
      xarope de bordo, melaço, sorgo, mel) ou adoçantes (por exemplo, lactose) podem ser incluídos somente em combinação com outros ingredientes permitidos e não devem ter um caráter dominante. Veja a categoria 29 para a definição e exemplos de frutas. Veja a introdução da seção Cerveja de Especialidade para comentários adicionais, particularmente relacionados à avaliação do equilíbrio dos ingredientes adicionados com a cerveja base.
    subcategory:
    - id: 30A
      name: Spice, Herb, or Vegetable Beer
      impression: Uma atraente fusão entre especiarias, ervas ou vegetais (SHVs) e cerveja, mas ainda assim reconhecível como cerveja. O caráter de SHV deve estar em equilíbrio com a cerveja e ser evidente, mas não proeminente a ponto de sugerir um produto artificial.
      aroma: Varia de acordo com o estilo base. O caráter de SHV deve ser notável no aroma; no entanto, alguns SHVs (por exemplo, gengibre, canela e alecrim) têm aromas mais fortes e mais distintos do que outros (por exemplo, a maioria dos vegetais) – o que permite uma gama de caráter e intensidade de SHV, de sutil a agressivo. Aroma de lúpulo pode ser mais baixo do que o esperado para o estilo base, para mostrar melhor o caráter de SHV. As especiarias, ervas e vegetais devem adicionar complexidade, mas não devem estar proeminentes a ponto de desequilibrar o produto final.
      appearance: Varia de acordo com o estilo base e ingredientes especiais utilizados. Cervejas de cor mais clara, incluindo o colarinho, podem apresentar cores vindas da adição. Limpidez variável, ainda que a turbidez seja geralmente não desejável. Alguns ingredientes podem impactar na retenção da espuma.
      flavor: Varia de acordo com o estilo base. Como no aroma, um distinto sabor de SHV deve ser notável e pode variar em intensidade, de sutil a agressivo. Alguns SHV são inerentemente amargos e podem resultar numa cerveja mais amarga do que o estilo base declarado. Amargor, sabores de lúpulo e malte, teor alcoólico e subprodutos de fermentação, como ésteres, devem ser apropriados para o estilo base, porém harmoniosos e equilibrados com os distintos sabores de SHVs presentes.
      mouthfeel: Varia de acordo com o estilo base. SHVs podem aumentar ou diminuir o corpo. Alguns SHVs podem adicionar um pouco de adstringência, ainda que um caráter de especiaria “crua” seja indesejável.
      comments: A descrição da cerveja é crítica para avaliação. Os juízes devem pensar mais no conceito declarado do que tentar detectar individualmente cada ingrediente utilizado. Equilíbrio, facilidade de beber e execução do tema (do estilo proposto) são os fatores mais importantes. Os SHVs devem complementar o estilo base, não sobrecarregá-lo. Os atributos do estilo base serão diferentes após a adição dos SHVs, ou seja, não espere que a cerveja tenha o sabor idêntico ao do estilo base inalterado.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar de acordo com a cerveja base.
      examples:
      - Alesmith Speedway Stout
      - Elysian Avatar Jasmine IPA
      - Founders Breakfast Stout
      - Rogue Yellow Snow Pilsner
      - Traquair Jacobite Ale
      - Young’s Double Chocolate Stout
      tags:
      - specialty-beer
      - spice
    - id: 30B
      name: Autumn Seasonal Beer
      impression: Uma cerveja maltada e condimentada, que muitas vezes tem um corpo rico e leve aquecimento alcoólico no final, sugerindo um bom acompanhamento à estação fria e, muitas vezes, evocando as tradições da época da colheita ou Dia de Ação de Graças.
      aroma: Maltado, condimentado e equilibrado. Uma ampla faixa é aceita, desde que lembre o tema de colheita. Os ingredientes declarados e o conceito definem a expectativa. Lúpulos são geralmente sutis. Álcool muitas vezes presente, porém suave e de suporte. Os componentes devem estar bem integrados e criar uma apresentação coerente. Veja a seção de Sabor para os perfis de especiaria, malte, açúcar e vegetais.
      appearance: Cor de âmbar médio a marrom acobreado; versões mais claras são as mais comuns. Límpida, quando não opaca. Colarinho de boa formação, persistente, de coloração quase branca a bege. Algumas versões com abóboras darão tons não usuais para a cerveja, com toques alaranjados.
      flavor: Maltado, condimentado e equilibrado. Deve-se permitir a criatividade do cervejeiro para atingir o objetivo do tema. Especiarias adocicadas ou aquecedoras são comuns (por exemplo, cravo, canela e gengibre). Sabores ricos e tostados de malte são comuns e podem incluir sabores de caramelo, pão tostado, crosta de torta, biscoito ou nozes. Podem incluir característicos sabores de açúcares, como melaço, mel ou açúcar mascavo. Sabores derivados de abóboras são muitas vezes difíceis de identificar, apenas provendo um dulçor mais rico. Os ingredientes especiais devem dar suporte e equilíbrio, sem ofuscar a cerveja base. Amargor e sabor de lúpulo são usualmente restritos para não interferirem no caráter especial. Geralmente o final é um pouco cheio e satisfatório, ocasionalmente com um leve sabor de álcool. Características de malte torrado são tipicamente ausentes.
      mouthfeel: Corpo geralmente de médio a alto, podendo ser viscosa. Carbonatação de moderadamente baixa a moderadamente alta. Caráter de envelhecimento e aquecimento alcoólico são permitidos.
      comments: Utilizando o perfil sensorial de ingredientes que sugerem a temporada de colheita (do Hemisfério Norte), como torta de abóbora, torta de maçã ou batata doce caramelizada, equilibrados com, muitas vezes, uma cerveja base de suporte, muitas vezes maltada. A descrição da cerveja é crítica para avaliação. Os juízes devem pensar mais no conceito declarado do que tentar detectar individualmente cada ingrediente utilizado. Equilíbrio, facilidade de beber e execução do tema (do estilo proposto) são os fatores mais importantes.
      ingredients: Especiarias são necessárias e, muitas vezes, aquelas que remetem ao outono do Hemisfério Norte, épocas de colheita e Dia de Ação de Graças (por exemplo, pimenta da Jamaica, noz-moscada, canela, cravo e gengibre), porém qualquer combinação é possível e a criatividade é incentivada. Adjuntos que fornecem sabor são comuns (por exemplo, melaço, açúcar invertido, açúcar mascavo, mel e xarope de bordo). Abóboras e morangas são muitas vezes utilizadas.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar dependendo do estilo base. ABV é geralmente acima de 5% e a maioria dos exemplos apresenta cor âmbar acobreada.
      examples:
      - Dogfish Head Punkin Ale
      - Elysian Punkuccino
      - Rogue Pumpkin Patch Ale
      - Schlafly Pumpkin Ale
      - UFO Pumpkin
      - Weyerbacher Imperial Pumpkin
      tags:
      - specialty-beer
      - spice
    - id: 30C
      name: Winter Seasonal Beer
      impression: Uma cerveja mais forte, escura e condimentada, que muitas vezes possui um corpo rico e um final que aquece, sugerindo um bom acompanhamento para a temporada fria de inverno.
      aroma: Maltado, condimentado, frutado e equilibrado. Uma ampla faixa é possível, desde que recorde o tema de férias de inverno (ou festividades de fim de ano, do Hemisfério Norte). Os ingredientes declarados e o conceito definem a expectativa. Muitas vezes com caráter de frutas escuras ou secas. Lúpulos são geralmente sutis. Álcool muitas vezes presente, porém suave e de suporte. Aromas maltados ou de açúcar tendem a trazer para si o equilíbrio geral e servem de suporte para as especiarias. Os componentes devem estar bem integrados e criar uma apresentação coerente. Veja a seção de Sabor para os perfis de especiaria, malte, açúcar e fruta.
      appearance: Cor de âmbar médio a marrom muito escuro (as versões mais escuras são mais comuns). Límpida, se não for opaca; normalmente límpida, embora versões mais escuras podem ser virtualmente opacas. Colarinho de quase branco a castanho, com boa formação e persistente.
      flavor: Maltado, condimentado e equilibrado. Deve-se permitir a criatividade do cervejeiro para atingir o objetivo do tema. Especiarias adocicadas ou aquecedoras são comuns. Sabores ricos e tostados de malte são comuns e podem incluir sabores de caramelo, pão tostado, nozes ou chocolate. Podem incluir sabores de frutas secas ou de suas cascas, como passas, ameixa, figo, cereja, casca de laranja ou limão. Podem incluir característicos sabores de açúcares, como melaço, mel ou açúcar mascavo. Os ingredientes especiais devem dar suporte e equilíbrio, sem ofuscar a cerveja base. Amargor e sabor de lúpulo são normalmente restritos, para não interferirem no perfil especial. Geralmente, o final é cheio e satisfatório, ocasionalmente com um leve sabor de álcool. Características de malte torrado são raras e, normalmente, não são mais fortes do que as de chocolate.
      mouthfeel: Corpo geralmente de médio a alto, muitas vezes viscosa. Carbonatação de moderadamente baixa a moderadamente alta. Caráter de envelhecimento e aquecimento alcoólico são permitidos.
      comments: Utilizando o perfil sensorial de ingredientes que sugerem a temporada de férias de fim de ano (do Hemisfério Norte), como biscoitos de Natal, biscoitos de gengibre, bolo inglês de Natal, bolo de rum, gemada, pinheiros, mix de ervas secas ou especiarias de vinho quente, em equilíbrio com uma cerveja base de suporte, muitas vezes maltada, aquecedora e escura. A descrição da cerveja é crítica para avaliação. Os juízes devem pensar mais no conceito declarado do que tentar detectar individualmente cada ingrediente utilizado. Equilíbrio, facilidade de beber e execução do tema (do estilo proposto) são os fatores mais importantes.
      history: A temporada de festas de inverno é uma época tradicional no Hemisfério Norte, em que velhos amigos se encontram e as cervejas um pouco mais alcoólicas e ricas são servidas. Muitos cervejeiros oferecem produtos sazonais que podem ser mais escuros, fortes, condimentados, ou com mais personalidade que as cervejas feitas durante todo o ano. Versões condimentadas são uma tradição americana ou belga, uma vez que cervejarias alemãs ou inglesas tradicionalmente não utilizam especiarias em suas cervejas. Muitos cervejeiros artesanais americanos foram inspirados pela Anchor Our Special Ale, produzida pela primeira vez em 1975.
      ingredients: Especiarias são necessárias e, muitas vezes, aquelas que remetem ao Natal do hemisfério Norte (por exemplo, pimenta da Jamaica, noz-moscada, canela, cravo e gengibre), porém qualquer combinação é possível e a criatividade é incentivada. Cascas de frutas (por exemplo, laranja e limão) podem ser utilizadas, assim como adições sutis de outras frutas (muitas vezes secas ou escuras). Adjuntos que fornecem sabor são comuns (por exemplo, melaço, melado, açúcar invertido, açúcar mascavo, mel, xarope de bordo). Normalmente ales, embora existam lagers fortes e escuras.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar dependendo do estilo base. ABV é geralmente acima de 6% e a maioria dos exemplos apresenta cor mais escura.
      examples:
      - Anchor Christmas Ale
      - Great Lakes Christmas Ale
      - Harpoon Winter Warmer
      - Rogue Santa’s Private Reserve
      - Schlafly Christmas Ale
      - Troeg’s The Mad Elf
      tags:
      - specialty-beer
      - spice
    - id: 30D
      name: Specialty Spice Beer
      impression: Uma atraente combinação entre especiarias, ervas ou vegetais (SHVs), açúcares e cerveja, mas ainda assim reconhecível como cerveja. O caráter de SHVs e açúcar deve estar em equilíbrio com a cerveja e ser evidente, mas não proeminente a ponto de sugerir um produto artificial.
      aroma: O mesmo de SHV Beer, com exceção que alguns fermentáveis adicionados (por exemplo, mel e melaço) podem acrescentar um componente de aroma. Qualquer componente adicional de aroma que estiver presente deve estar em equilíbrio com os componentes do SHV e da cerveja e formar uma combinação agradável.
      appearance: A mesma da especiaria, erva e/ou vegetal.
      flavor: O mesmo de SHV Beer, com exceção que alguns fermentáveis adicionados (por exemplo, mel e melaço) podem adicionar um componente de sabor. Qualquer componente adicional de sabor que estiver presente deve estar em equilíbrio com os componentes SHVs e da cerveja e formar uma combinação agradável. Açúcares adicionados não devem ter um sabor cru, não fermentado. Alguns açúcares adicionados terão elementos não fermentáveis que podem prover um final mais cheio e doce; açúcares totalmente fermentáveis podem deixar o final mais ralo.
      mouthfeel: A mesma de SHV Beer, ainda que, dependendo do tipo de açúcar adicionado, pode ter o corpo aumentado ou diminuído.
      comments: Se os fermentáveis ou processos não adicionarem um caráter distinguível para a cerveja, inscreva-a como outro estilo de Spiced Beer (não Specialty Spiced Beer) e omita a descrição dos ingredientes extras ou processos.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar de acordo com a cerveja base.
      examples:
      - New Belgium Honey Orange Tripel
      - Westbrook It’s Tiki Time
      tags:
      - specialty-beer
      - spice
  - id: '31'
    name: Alternative Fermentables Beer
    notes: Esta categoria contém Cervejas de Especialidade com a adição de cereais ou açúcar, usados para fornecer um caráter distinto. Veja a sessão Introdução a Cervejas de Especialidade para mais comentários, particularmente referente ao equilíbro dos ingredientes adicionados à cerveja base.
    subcategory:
    - id: 31A
      name: Alternative Grain Beer
      impression: Uma cerveja base apresentando ou aprimorada pelo caráter dos cereais adicionados. O caráter específico depende de quais cereais são usados.
      aroma: O mesmo do estilo base de cerveja. Os cereais adicionados podem resultar em um caráter particular, embora, com alguns deles, a cerveja simplesmente apresente um caráter levemente superior de cereais ou de nozes; alguns podem ter um caráter relativamente neutro.
      appearance: A mesma do estilo base da cerveja, embora alguma turbidez adicional possa estar presente.
      flavor: O mesmo do estilo base de cerveja. Os cereais adicionados devem ser perceptíveis no sabor, embora não necessariamente identificáveis. Alguns cereais contribuem com um sabor adicional, como de pão ou nozes, enquanto outros simplesmente aprimoram o sabor da cerveja base. Alguns cereais adicionam secura ao final.
      mouthfeel: A mesma do estilo base da cerveja, embora muitos cereais adicionados aumentem o corpo e a viscosidade (por exemplo aveia, centeio), enquanto outros promovem uma cerveja mais leve (por exemplo cereais sem glúten).
      comments: O cereal adicionado deve estar aparente no perfil sensorial. Se o cereal alternativo não fornece um caráter distinto e perceptível à cerveja, inscreva-a como um estilo base. Esta subcategoria não deve ser usada para estilos em que o cereal alternativo é fundamental para a sua definição (por exemplo Rye IPA, Oatmeal Stout, International Lagers com adição de arroz ou milho). Note que o saquê não é uma cerveja e não faz parte desta categoria.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar de acordo com a cerveja base.
      examples:
      - Blue/Point Rastafarye Ale
      - Green’s Indian Pale Ale
      - Lakefront New Grist
      - New Planet Pale Ale
      - Rogue Morimoto Soba Ale
      - Voodoo Swimming Jeans
      tags:
      - specialty-beer
    - id: 31B
      name: Alternative Sugar Beer
      impression: Uma saborosa união entre açúcar e cerveja, mas ainda assim reconhecível como cerveja. O caráter de açúcar deve estar em equilíbrio com a cerveja e em evidência, mas não a ponto de sugerir um produto artificial.
      aroma: O mesmo do estilo base de cerveja, exceto que alguns fermentáveis adicionados (p.ex. mel, melaço) podem trazer aromas, que devem ser agradáveis e estar em equilíbrio com a cerveja.
      appearance: A mesma do estilo base da cerveja, embora alguns açúcares possam adicionar cor, geralmente mais escura.
      flavor: O mesmo do estilo base de cerveja, exceto que alguns fermentáveis adicionados (p.ex. mel, melaço) podem trazer sabores, que devem ser agradáveis e estar em equilíbrio com a cerveja. Açúcares adicionados não devem ter um sabor cru, não fermentado. Alguns açúcares não fermentáveis tornam o final mais cheio (doce), enquanto açúcares totalmente fermentáveis podem secá-lo.
      mouthfeel: A mesma do estilo base da cerveja, embora, dependendo do tipo de açúcar adicionado, o corpo possa aumentar ou diminuir.
      comments: O açúcar adicionado deve estar aparente no perfil sensorial. Se os açúcares não fornecem um caráter distinto e perceptível à cerveja, inscreva-a como um estilo base. Uma cerveja não deve ter tanto mel que a leve a ser percebida mais como um hidromel com cerveja (um braggot) do que uma cerveja com mel. Esta subcategoria não deve ser usada para estilos em que o açúcar alternativo é fundamental para a sua definição, ou quando pequena quantidade de açúcar com sabor neutro é usada simplesmente para aumentar a densidade e/ou a atenuação ou diminuir o sabor e/ou corpo; essas cervejas devem ser inscritas normalmente como o estilo base.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar de acordo com a cerveja base.
      examples:
      - Bell’s Hopslam
      - Lagunitas Brown Shugga’
      - Cervejaria Colorado Appia
      - Fifth Hammer Break of Jawn
      - Groundswell Piloncillo
      - Long Trail Harvest
      - New Glarus Cabin Fever
      tags:
      - specialty-beer
  - id: '32'
    name: Smoked Beer
    notes: Esta categoria contém Cervejas de Especialidade que possuem um caráter defumado.
    subcategory:
    - id: 32A
      name: Classic Style Smoked Beer
      impression: Uma fusão bem equilibrada de malte e lúpulos do estilo base com um agradável caráter defumado.
      aroma: Um agradável equilíbrio entre o aroma esperado na cerveja base e o malte defumado. O caráter defumado varia de baixo a assertivo e pode ter o caráter derivado de vários tipos de madeira (por exemplo, amieiro, carvalho, faia). O equilíbrio entre o defumado e a cerveja pode variar - eles não precisam estar igualmente intensos. Entretanto, a combinação resultante deve ser atrativa. Aroma acentuado, fenólico, áspero, como borracha ou queimado derivado de defumação é inapropriado.
      appearance: Varia. A aparência deve refletir o estilo base, embora a cor geralmente seja um pouco mais escura que o esperado para o estilo base sem o defumado.
      flavor: Similar ao aroma, com o caráter de malte defumado de baixo a assertivo e em equilíbrio com a cerveja base. Cada tipo de madeira produz diferentes perfis de sabores. O equilíbrio entre o defumado e a cerveja pode variar, mas a combinação resultante deve ser agradável. O defumado pode adicionar alguma secura ao final. Sabor acentuado, amargo, queimado, carbonizado, como borracha, sulfuroso, medicinal ou fenólico derivado de defumação é inapropriado.
      mouthfeel: Varia de acordo com o estilo base da cerveja. Significante aspereza adstringente, fenólica ou derivada de defumação é uma falha.
      comments: Use este estilo para cervejas diferentes do estilo Rauchbier de Bamberg (ou seja, Märzen defumada com madeira de faia), que tem seu próprio estilo. Os juízes devem avaliar essas cervejas principalmente com relação ao equilíbrio geral e em quão bem o caráter defumado aprimora a cerveja base.
      history: O processo de usar maltes defumados foi adaptado a muitos estilos pelos cervejeiros artesanais. Cervejeiros alemães usaram maltes defumados, tradicionalmente, em cervejas do tipo Bock, Doppelbock, Weissbier, Munich Dunkel, Schwarzbier, Munich Helles, Pils e outros estilos especiais.
      ingredients: Os diferentes elementos usados para defumar o malte resultam em características únicas de sabor e aroma. Maltes defumados por faia e outras madeiras de lei podem ser usados (por exemplo, carvalho, bordo, mesquita, amieiro, pecã, macieira, cerejeira, e outras madeiras de árvores frutíferas). Estas madeiras podem lembrar certos alimentos defumados (por exemplo, nogueira com costelas, bordo com bacon ou linguiça, amieiro com salmão). Madeiras perenes nunca devem ser usadas, já que adicionam sabor medicinal, resinoso ao malte. Caráter notável de malte defumado por turfa é universalmente indesejável, devido ao seus fenóis pungentes, com um terroso que lembra poeira. Os outros ingredientes restantes variam de acordo com o estilo base. Se os maltes defumados forem combinados com outros ingredientes não habituais (por exemplo, frutas, vegetais, especiarias, mel) em quantidades notáveis, a cerveja resultante deve ser inscrita no estilo 32B Specialty Smoked Beer
      statistics:
        notes: Varia de acordo com o estilo base da cerveja.
      examples:
      - Alaskan Smoked Porter
      - Schlenkerla Oak Smoke Doppelbock
      - Schlenkerla Rauchbier Weizen
      - Schlenkerla Rauchbier Ur-Bock
      - O’Fallon Smoked Porter
      - Spezial Rauchbier Lagerbier
      tags:
      - smoke
      - specialty-beer
    - id: 32B
      name: Specialty Smoked Beer
      impression: Uma fusão bem equilibrada de malte e lúpulos do estilo base da cerveja de especialidade, com um agradável caráter defumado.
      aroma: Um agradável equilíbrio entre o aroma esperado na cerveja base, o malte defumado e quaisquer outros ingredientes especiais utilizados. O caráter defumado varia de baixo a assertivo e pode ter o caráter derivado de vários tipos de madeira (por exemplo, amieiro, carvalho, faia). O equilíbrio entre o defumado, a cerveja e ingredientes especiais pode variar - eles não precisam estar igualmente intensos. Entretanto, a combinação resultante deve ser atrativa. Aroma acentuado, fenólico, áspero, como borracha ou queimado derivado de defumação é inapropriado.
      appearance: Varia. A aparência deve refletir o estilo base, embora a cor geralmente seja um pouco mais escura que o esperado para o estilo base sem o defumado. O uso de certas frutas e especiarias também pode afetar a cor e a tonalidade da cerveja.
      flavor: Similar ao aroma, com o caráter de malte defumado de baixo a assertivo em equilíbrio com a cerveja base e ingredientes especiais. Cada tipo de madeira produz diferentes perfis de sabores. O equilíbrio entre o defumado, a cerveja e ingredientes especiais pode variar, mas a combinação resultante deve ser agradável. O defumado pode adicionar alguma secura ao final. Sabor acentuado, amargo, queimado, carbonizado, como borracha, sulfuroso, medicinal ou fenólico derivado de defumação é inapropriado.
      mouthfeel: Varia de acordo com o estilo base da cerveja. Significante aspereza adstringente, fenólica ou derivada de defumação é uma falha.
      comments: Os juízes devem avaliar essas cervejas principalmente com relação ao equilíbrio geral e em quão bem o caráter defumado aprimora a cerveja base e os ingredientes especiais.
      ingredients: O mesmo que o estilo 32A Classic Style Smoked Beer, com a possível adição de ingredientes especiais (por exemplo, frutas, especiarias, vegetais, mel) em quantidades perceptíveis.
      statistics:
        notes: Varia de acordo com o estilo base da cerveja.
      examples:
      - Fat Head’s Up in Smoke
      - Ommegang Bourbon Barrel Vanilla Smoked Porter
      tags:
      - smoke
      - specialty-beer
  - id: '33'
    name: Wood Beer
    notes: Esta categoria contém Cervejas de Especialidade com caráter de envelhecimento em madeira ou em barril, com ou sem caráter adicional de álcool.
    subcategory:
    - id: 33A
      name: Wood-Aged Beer
      impression: Um aprimoramento agradável do estilo base da cerveja, com as características do envelhecimento em contato com a madeira. Os melhores exemplos serão suaves, saborosos, bem equilibrados e bem envelhecidos.
      aroma: Varia de acordo com o estilo base. Um aroma amadeirado, de baixo a moderado, geralmente está presente; algumas variedades podem ter um caráter mais forte ou distinto. A madeira fresca pode, ocasionalmente, transmitir cheiro de madeira crua e recém-cortada, embora esse caráter nunca deva ser muito forte. Se a madeira for tostada ou carbonizada, pode haver de baixo a moderado caráter de baunilha, caramelo, toffee, tosta ou cacau.
      appearance: Varia de acordo com o estilo base. Frequentemente uma cerveja mais escura do que o estilo base inalterado, particularmente se forem usados barris tostados ou carbonizados.
      flavor: Varia de acordo com o estilo base. A madeira geralmente contribui com um sabor amadeirado e, possivelmente, com um perfil característico da variedade utilizada. A madeira nova pode adicionar uma impressão de madeira crua e recém cortada. A madeira tostada ou carbonizada pode adicionar notas de baunilha, caramelo, butterscotch, pão tostado, nozes tostadas, café, chocolate ou cacau, dependendo da variedade de madeira e do nível de queima usada. Os sabores derivados da madeira devem ser equilibrados, sustentados e perceptíveis, sem serem excessivos em relação ao estilo base da cerveja.
      mouthfeel: Varia de acordo com o estilo base. Os taninos da madeira podem aumentar a percepção de corpo, além de potencializar a secura no final; alguma adstringência dos taninos da madeira é permitida. As características azedas ou ácidas devem ser baixas ou inexistentes, e nunca devem distrair.
      comments: Grande parte do caráter depende do tipo de madeira usada e de como ela complementa e aprimora o estilo base. O caráter de envelhecimento é permitido, mas oxidação ou acidez excessivas são falhas. Álcool perceptível não é uma falha em estilos base mais fortes. Esta categoria não deve ser usada para estilos base onde o envelhecimento em madeira é um requisito fundamental (por exemplo, Flanders Red, Lambic). Cervejas feitas com envelhecimento limitado em madeira ou produtos que fornecem apenas um caráter sutil podem ser inseridas nas categorias de estilo base de cerveja, desde que o caráter de madeira não seja destacado.
      history: Um método de produção tradicional, que raramente é usado pelas principais cervejarias e, geralmente, apenas para produtos especiais. Mais popular entre as cervejarias artesanais modernas, que procuram produtos novos e diferenciados. Os barris e tonéis de carvalho são tradicionais, embora outras madeiras estejam se tornando mais populares.
      ingredients: Varia de acordo com o estilo base. Envelhecido em barris ou tonéis de madeira ou, ainda, usando aditivos à base de madeira (por exemplo, lascas, ripas, espirais, cubos). Estilos base mais encorpados e de maior densidade geralmente são usados, pois podem resistir melhor aos sabores adicionais, embora experimentações sejam incentivadas.
      statistics:
        notes: 'IBU: varia com o estilo base SRM: varia com o estilo base, geralmente mais escura do que a base inadulterada OG: varia com o estilo base, geralmente acima da média FG: varia com o estilo base ABV: varia com o estilo base, geralmente acima da média'
      examples:
      - Bush Prestige
      - Cigar City Spanish Cedar Jai Alai
      - Firestone Walker Double Barrel Ale
      - Midnight Sun Arctic Devil
      - Petrus Aged Pale
      - Samuel Smith Yorkshire Stingo
      tags:
      - specialty-beer
      - wood
    - id: 33B
      name: Specialty Wood-Aged Beer
      impression: Um aprimoramento do estilo base da cerveja, com as características provenientes do envelhecimento em contato com a madeira, incluindo as que estiveram previamente em contato com bebidas alcoólicas. Os melhores exemplos serão suaves, saborosos, bem equilibrados e bem envelhecidos.
      aroma: Varia de acordo com o estilo base. Um aroma amadeirado, de baixo a moderado, geralmente está presente; algumas variedades podem ter um caráter mais forte ou distinto. Se a madeira for tostada ou carbonizada, pode haver de baixo a moderado caráter de baunilha, caramelo, toffee, tosta ou cacau. Os aromas associados ao álcool previamente armazenado na madeira (por exemplo, de destilados, vinho) devem ser perceptíveis, mas equilibrados.
      appearance: Varia de acordo com o estilo base. Frequentemente uma cerveja mais escura do que o estilo base inalterado, particularmente se forem usados barris carbonizados. Cervejas envelhecidas em barris de vinho ou outras bebidas com cores distintas também podem conferir cor à cerveja finalizada.
      flavor: Varia de acordo com o estilo base. A madeira geralmente contribui com um sabor amadeirado e, possivelmente, com um perfil característico da variedade utilizada. A madeira tostada ou carbonizada pode adicionar notas de baunilha, caramelo, butterscotch, pão tostado, nozes tostadas, café, chocolate ou cacau, dependendo da variedade de madeira e do nível de queima usada. Os sabores derivados da madeira e do álcool previamente armazenado na madeira devem ser equilibrados, mutuamente sustentados e perceptíveis, sem serem excessivos em relação ao estilo base da cerveja ou um ao outro.
      mouthfeel: Varia de acordo com o estilo base. Os taninos da madeira podem aumentar a percepção de corpo, além de potencializar a secura no final; alguma adstringência dos taninos da madeira é permitida. Geralmente apresenta aquecimento alcoólico adicional, mas que não deve ser quente ou áspero. As características azedas ou ácidas devem ser baixas ou inexistentes, e nunca devem distrair.
      comments: O sucesso neste estilo depende do quanto os caráteres amadeirado e alcoólico complementam e aprimoram a cerveja base, bem como se estão bem integrados com o perfil geral de sabor. O caráter de envelhecimento é permitido, mas oxidação ou acidez excessivas são falhas. Cervejas selvagens (wild ales) especiais envelhecidas em madeira devem ser inscritas em 28C Wild Specialty Beer.
      history: Igual a 33A Wood-Aged Beer.
      ingredients: Varia de acordo com o estilo base. Envelhecidas em tonéis ou barris de madeira anteriormente utilizados para armazenar bebidas alcoólicas (por exemplo, uísque, bourbon, rum, gin, tequila, porto, xerez, vinho Madeira, vinho). Estilos base mais encorpados e de maior densidade geralmente são usados, pois podem resistir melhor aos sabores adicionais, embora experimentações sejam incentivadas.
      statistics:
        notes: 'IBU: varia com o estilo base SRM: varia com o estilo base, geralmente mais escura do que a base inadulterada OG: varia com o estilo base, geralmente acima da média FG: varia com o estilo base ABV: varia com o estilo base, geralmente acima da média'
      examples:
      - AleSmith Barrel-Aged Old Numbskull
      - Founders Kentucky Breakfast Stout
      - Firestone Walker Parabola
      - Goose Island Bourbon County Stout
      - Great Divide Barrel Aged Yeti
      - The Lost Abbey Angel’s Share Ale
      tags:
      - specialty-beer
      - wood
  - id: '34'
    name: Specialty Beer
    notes: Ainda que existam diversas Cervejas de Especialidade neste guia, a categoria Specialty Beer é destinada às cervejas que não se enquadram em nenhum outro lugar. Por favor, verifique cada uma das categorias anteriores de Cervejas de Especialidade antes de inscrever uma cerveja em um destes estilos.
    subcategory:
    - id: 34A
      name: Commercial Specialty Beer
      impression: De acordo com a cerveja declarada.
      aroma: De acordo com a cerveja declarada.
      appearance: De acordo com a cerveja declarada.
      flavor: De acordo com a cerveja declarada.
      mouthfeel: De acordo com a cerveja declarada.
      comments: Destinada a ser uma subcategoria que engloba cervejas específicas, baseadas em exemplares comerciais únicos, e que não se encaixam nos demais estilos existentes. Versões anteriores do Guia de Estilos incluíam o chamado Belgian Specialty Ale; este estilo se enquadra no mesmo propósito, permitindo cervejas não-belgas e com objetivo similar.
      statistics:
        notes: OG, FG, IBU, SRM e ABV vão variar de acordo com a cerveja base declarada.
      examples:
      - Orval
      - La Chouffe
      tags:
