  - id: '25'
    name: Strong Belgian Ale
    notes: Esta categoria contém cervejas claras, bem atenuadas, de equilibradas a amargas, onde muitas vezes os sabores são conduzidos mais pelas leveduras do que pelo malte e onde o teor alcoólico é geralmente mais elevado (embora exista uma variação dentro dos estilos).
    subcategory:
    - id: 25A
      name: Belgian Blond Ale
      impression: Uma cerveja belga dourada, moderadamente forte, com agradável complexidade cítrica e condimentada oriunda da levedura, que deixa na boca um suave maltado, com final macio e seco.
      aroma: Maltado de intensidade de leve a moderada que remete a adocicado como cereais, levemente tostado ou biscoito água e sal. Perfil de levedura de sutil a moderado com ésteres que remetem a cítrico e frutados (como limões e laranjas) e fenóis em segundo plano que remetem a picante e condimentados. Notas de lúpulos com perfil terroso ou condimentado são opcionais. Leve perfume alcoólico e indicações de um leve dulçor oriundo do malte, que pode ter um perfil de mel ou açúcar. Sutil, mas ainda assim complexo.
      appearance: Cor amarelo profundo a um dourado profundo. Geralmente muito límpida. Colarinho quase branco, espesso, denso e cremoso. Boa retenção e com rendado belga (Belgian lace).
      flavor: Semelhante ao aroma, sendo percebido primeiro um sabor maltado doce de grãos que pode ser de leve a moderado. Pode ser percebido levemente na boca um adocicado que remete a açúcar caramelizado ou doçura de mel. Amargor médio, com o malte levemente superior no equilíbrio. Perfil de levedura de baixo a moderado, com ésteres que remetem a limões e laranjas, bem como leve fenólico picante e condimentado. Pode ter um perfil perfumado leve. Sabor leve de lúpulo, que pode ser terroso ou picante, complementando a levedura. Final de médio-seco a seco, macio e suave, com álcool leve e a malte no retrogosto.
      mouthfeel: Carbonatação de médio-alta a alta, que pode dar a sensação borbulhante que enche a boca. Corpo médio. Leve a moderado aquecimento alcoólico, mas suave. Pode ser cremosa.
      comments: A maioria dos exemplos comerciais estão na faixa de 6,5 a 7% de ABV. Muitas vezes possui um caráter como de uma lager, com um perfil mais limpo quando comparado com outros estilos belgas. Os belgas que falam a língua flamenga usam o termo Blond, ao passo que os que falam francês escrevem Blonde. Muitas cervejarias belgas, monásticas ou artesanais, são chamadas de Blond, mas estas não seriam representativas do estilo.
      history: O desenvolvimento do estilo é relativamente recente para atender ao apelo de bebedores de Pilsen europeias, tornando-se mais popular em decorrência de sua forte comercialização, bem como a sua ampla distribuição. Apesar das alegações de que o estilo tenha surgido em 1200, ele somente foi criado após II Guerra Mundial e foi popularizado pela Leffe.
      ingredients: Malte pilsen belga, maltes aromáticos, açúcar e outros adjuntos, cepas de leveduras belgas tipo Abbey, lúpulos continentais. Especiarias não são tradicionalmente utilizados, mas quando presentes, devem possuir apenas um caráter de fundo.
      comparison: Semelhante a força alcoólica e o equilíbrio de Belgian Dubbel, mas de coloração dourada e sem os sabores de maltes escuros. Semelhante ao perfil de uma Belgian Golden Strong Ale ou de uma Belgian Tripel, embora um pouco mais maltada, não tão amarga e mais suave em relação ao álcool.
