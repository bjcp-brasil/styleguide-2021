  - id: '8'
    name: Dark European Lager
    notes: Essa categoria contém lagers alemãs vollbier (densidade inicial entre 11°P e 14°P), com a cor mais escura do que âmbar castanho.
    subcategory:
    - id: 8A
      name: Munich Dunkel
      impression: Uma lager marrom e maltada tradicional da Baviera. Sabores de malte profundamente tostados, como pão, sem qualquer sabor torrado ou queimado. Suave e rica com amargor contido e final relativamente seco que permite ser consumida em quantidade.
      aroma: Maltado rico de moderado a alto, como casca de pão tostada com notas de chocolate, nozes, caramelo e/ou toffee. Versões tradicionais frescas frequentemente apresentam níveis mais altos de chocolate. O caráter de malte é mais um maltado rico do que um dulçor açucarado ou de caramelo. Perfil de fermentação limpo. Um aroma leve de lúpulo condimentado, floral e/ou herbal é opcional.
      appearance: De cobre profundo a marrom escuro, frequentemente com um tom vermelho ou granada. Colarinho cremoso de bege claro a bege médio. Geralmente límpida.
      flavor: Sabores ricos de malte similares ao aroma (com os mesmos descritores de malte) de médio a alto. Amargor contido, de médio-baixo a médio, que proporciona um equilíbrio geral maltado. Maltada e suave na boca, sem ser excessivamente doce, e um final médio-seco com um retrogosto maltado. Sem sabores de malte torrado, queimado e/ou amargo, os sabores tostados não devem ter uma secura áspera de cereais e os sabores de caramelo não devem ser doces. Sabor de lúpulo condimentado, herbal e/ou floral de baixa intensidade é opcional. Caráter de fermentação limpo.
      mouthfeel: Corpo de médio a médio-cheio, dando uma sensação suave e que lembra dextrinas, sem ser pesada ou enjoativa. Carbonatação moderada. Caráter de lager suave. Sem adstringência áspera ou agressiva. Sem aquecimento alcoólico.
      comments: Um estilo tradicional de Munich, a companheira escura da Helles. Versões da Francônia são mais amargas do que as de Munich.
      history: Desenvolvida na Spaten, em meados de 1830, depois do desenvolvimento do malte Munich e vista como a sucessora das cervejas escuras regionais da época. Ainda que sendo original de Munich, o estilo se tornou popular por toda a Baviera (especialmente na Francônia).
      ingredients: Tradicionalmente, maltes Munich, mas Pils e Vienna também podem ser usados. Leve uso de maltes especiais para cor e profundidade. Mostura por decocção é tradicional. Lúpulos alemães e levedura lager.
      comparison: Não é tão intensa em malte ou potente como uma Dunkles Bock. Sem os sabores mais torrados e muitas vezes o amargor de lúpulo de uma Schwarzbier. Mais rica, centrada em malte e menos lupulada que uma Czech Dark Lager.
