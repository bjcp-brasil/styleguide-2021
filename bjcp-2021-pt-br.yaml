    - id: 27A
      name: 'Historical Beer: Pre-Prohibition Lager'
      impression: Uma american lager clara com adjuntos, amarga e lupulada, muitas vezes com um forte perfil de sabor que remete a milho, embora existam versões de sabor neutro e com final mais bem definido.
      aroma: Malte de baixo a médio como cereais. Dulçor como milho, de baixo a moderado, é opcional. Rústico aroma de lúpulo floral, herbal ou condimentado de médio a moderadamente alto, sem caráter de variedades modernas cítricas ou frutadas. Perfil limpo de fermentação. Pode apresentar algum caráter de levedura semelhante à American Lager moderna. Baixo DMS é aceitável.
      appearance: Cor de amarelo a dourado profundo. Espuma branca substancial e duradoura. Limpidez brilhante.
      flavor: Malte de médio a médio-alto com sabor como cereais. Opcionais notas arredondadas como milho e impressão de dulçor. Substancial amargor do lúpulo resiste ao malte e perdura através do final seco, de macio a bem definido. De médio a alto sabor de lúpulo rústico floral, herbal ou condimentado. Amargor de médio a alto, limpo e não agressivo. Sem retrogosto áspero. Perfil de fermentação geralmente neutro, mas algum caráter de levedura semelhante à American Lager é permitido.
      mouthfeel: Corpo de médio a médio-alto com uma sensação na boca moderadamente rica e cremosa. Suave e com uma maturação longa a frio bem feita. Carbonatação de média a alta.
      comments: Às vezes chamada de Classic American Pilsner. As versões à base de arroz têm um caráter mais bem definido e neutro e não possuem sabores de milho.
      history: Uma adaptação das lagers continentais por imigrantes alemães cervejeiros em meados de 1800 nos EUA. Tornou-se mais popular na década de 1870, mas enfraqueceu em teor alcoólico, amargor e popularidade após a Lei Seca e foi amplamente substituída pela Standard American Lager. Ressuscitada pelos cervejeiros caseiros em meados da década de 1990, mas existem poucos exemplos comerciais.
      ingredients: Cevada de seis fileiras. Adjuntos de milho ou arroz, até 30%. Lúpulo tradicional americano ou continental. Lúpulo americano moderno é inapropriado. Levedura lager.
      comparison: Equilíbrio e amargor similares às modernas Czech Premium Pale Lagers, mas exibindo cereais e lúpulos nativos americanos da era antes da Lei Seca dos EUA. Mais forte, amarga e saborosa do que as American Lagers claras modernas, muitas vezes com maior teor alcoólico.
