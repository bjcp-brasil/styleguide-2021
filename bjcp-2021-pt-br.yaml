styleguide:
  version: '2021'
  revision: '2'
  category:
  - id: '1'
    name: Standard American Beer
    notes: Essa categoria descreve cervejas americanas comuns que têm um amplo apelo ao público. Ela inclui tanto ales quanto lagers, e as cervejas desta categoria geralmente não são complexas, possuindo sabores suaves e acessíveis. As ales costumam ter qualidades semelhantes às lagers ou são projetadas para atrair bebedores de lagers de consumo em massa como cervejas de transição. Cervejas de consumo em massa com apelo ou origem internacional são descritas na categoria International Lager.
    subcategory:
    - id: 1A
      name: American Light Lager
      impression: Uma lager altamente carbonatada, de corpo muito baixo e quase sem sabor, criada para ser consumida muito gelada. Muito refrescante e para matar a sede.
      aroma: Aroma de malte baixo é opcional, mas pode ser percebido como granulado, adocicado ou que remete a cereais, se presente. Aroma leve de lúpulo condimentado, floral e/ou herbal é opcional. Embora seja desejável um perfil de fermentação limpo, uma leve presença de caráter de levedura não é considerada um defeito.
      appearance: Cor de palha muito claro a amarelo claro. Colarinho branco, não muito persistente. Muito límpida.
      flavor: Sabor relativamente neutro, com um final nítido e seco, com um sabor que remete a cereais ou semelhante a milho de baixo a muito baixo que pode ser percebido como dulçor devido ao baixo amargor. Sabor de lúpulo floral, condimentado e/ou herbal de baixo a muito baixo é opcional, mas raramente é forte o suficiente para ser detectado. Amargor de baixo a muito baixo. Equilíbrio pode variar de ligeiramente maltado a ligeiramente amargo, mas geralmente é equilibrada. A alta carbonatação pode realçar a nitidez do final seco. Perfil limpo de fermentação.
      mouthfeel: Corpo muito leve, às vezes aguado. Carbonatação muito alta, gera sensação de carbonatação picante na língua.
      comments: Desenvolvida para atrair o maior público possível. Sabores fortes significam falha na cerveja. Com pouco sabor de malte ou lúpulo, o caráter de levedura muitas vezes é o que diferencia as diversas marcas.
      history: A cervejaria Coors produziu brevemente uma cerveja Light Lager no início da década de 1940. As versões modernas foram inicialmente produzidas pela Rheingold em 1967 para atrair consumidores preocupados com a alimentação saudável, mas só se tornaram populares a partir de 1973, quando a Miller Brewing adquiriu a receita e promoveu a cerveja intensivamente para os fãs de esportes com a campanha “tastes great, less filling” (em português “saboroso, com menos calorias”). As cervejas desse gênero se tornaram as mais vendidas nos Estados Unidos na década de 1990.
      ingredients: Cevada de duas ou seis fileiras com até 40% de adjuntos (arroz ou milho). Enzimas adicionais podem reduzir ainda mais o corpo e a quantidade de carboidratos. Levedura Lager. Mínimo uso de lúpulos.
      comparison: Uma versão com corpo mais leve, menos álcool e menos calorias que uma American Lager. Menos caráter de lúpulo e amargor do que uma German Leitchbier.
      statistics:
        og:
          min: '1.028'
          max: '1.040'
        ibus:
          min: '8'
          max: '12'
        fg:
          min: '0.998'
          max: '1.008'
        srm:
          min: '2'
          max: '3'
        abv:
          min: '2.8'
          max: '4.2'
      examples:
      - Bud Light
      - Coors Light
      - Grain Belt Premium Light American Lager
      - Michelob Light
      - Miller Lite
      - Old Milwaukee Light
      tags:
      - balanced
      - bottom-fermented
      - lagered
      - north-america
      - pale-color
      - pale-lager-family
      - session-strength
      - traditional-style
    - id: 1B
      name: American Lager
      impression: Uma cerveja lager muito clara, altamente carbonatada, de corpo leve, bem atenuada, com um sabor neutro e amargor baixo. Servida bem gelada, muito refrescante e para matar a sede.
      aroma: Aroma de malte baixo é opcional, mas pode ser percebido como cereais, adocicado ou semelhante a milho, se presente. Aroma leve de lúpulo condimentado ou floral é opcional. Embora seja desejável um perfil de fermentação limpo, uma leve presença de caráter de levedura não é considerada um defeito.
      appearance: Cor de palha muito claro a amarelo médio. Colarinho branco, não muito persistente. Límpida.
      flavor: Sabor relativamente neutro, com um final bem nítido e seco. Sabor que remete a cereais ou milho de baixo a moderadamente baixo, que pode ser percebido como dulçor, devido ao baixo amargor. Sabor de lúpulo moderadamente baixo é opcional, podendo ter perfil floral, condimentado ou herbal, quando forte o suficiente para ser distinguido. Amargor de baixo a médio-baixo. Equilíbrio pode variar de ligeiramente maltado a ligeiramente amargo, mas é geralmente equilibrada. A carbonatação alta pode realçar a nitidez e o final seco. Perfil de fermentação limpo.
      mouthfeel: Corpo de baixo a médio-baixo. Carbonatação muito alta, gera sensação de carbonatação picante na língua.
      comments: Frequentemente, é o que os não-apreciadores de cervejas artesanais esperam ser servido quando pedem cerveja nos Estados Unidos. Pode ser comercializada como Pilsner fora da Europa, mas não deve ser confundida com exemplos tradicionais. Sabores fortes são considerados um defeito. Com pouco sabor de malte ou lúpulo, o caráter da levedura é o que mais frequentemente diferencia as marcas.
      history: Originou-se da Pre-Prohibition Lager (ver Categoria 27) nos Estados Unidos, após a Lei Seca e a Segunda Guerra Mundial. As cervejarias sobreviventes se consolidaram, expandiram a distribuição e promoveram intensamente um estilo de cerveja que agradava grande parte da população. Tornou-se o estilo de cerveja dominante por muitas décadas e deu origem a muitos concorrentes internacionais que desenvolveriam produtos igualmente sem sabor para o mercado em massa, apoiados por uma intensa campanha publicitária.
      ingredients: Malte de cevada de duas ou seis fileiras, com até 40% de adjuntos (arroz ou milho). Levedura Lager. Uso leve de lúpulos.
      comparison: Mais forte, com mais sabor e corpo que uma American Light Lager. Menos amargor e sabor que uma International Pale Lager. Significativamente menos sabor, lúpulo e amargor do que as tradicionais Pilsners europeias.
      statistics:
        og:
          min: '1.040'
          max: '1.050'
        ibus:
          min: '8'
          max: '18'
        fg:
          min: '1.004'
          max: '1.010'
        srm:
          min: '2'
          max: '3.5'
        abv:
          min: '4.2'
          max: '5.3'
      examples:
      - Budweiser
      - Coors Original
      - Grain Belt Premium Lager
      - Miller High Life
      - Old Style
      - Pabst Blue Ribbon
      - Special Export
      tags:
      - balanced
      - bottom-fermented
      - lagered
      - north-america
      - pale-color
      - pale-lager-family
      - standard-strength
      - traditional-style
    - id: 1C
      name: Cream Ale
      impression: Uma cerveja americana, "lawnmower" (termo em inglês usado para definir uma cerveja leve, refrescante e fácil de beber, típica de atividades ao ar livre, como cortar a grama), limpa, bem atenuada e altamente carbonatada. Fácil de beber, suave e refrescante, com mais caráter do que as típicas American Lagers, mas ainda sutil e contida.
      aroma: Notas de malte de médio-baixo a baixo, com um aroma doce semelhante a milho. DMS em baixa intensidade é opcional. Aroma de lúpulo médio-baixo é opcional, podendo ser de qualquer variedade, ainda que notas florais, condimentadas e herbais sejam mais comuns. Em geral, tem um aroma sutil e equilibrado. Ésteres frutados de baixa intensidade são opcionais.
      appearance: Cor de palha claro a dourado claro, embora geralmente tendendo ao mais claro. Colarinho de baixa a média formação, com carbonatação de média a alta. Boa retenção de espuma. Limpidez brilhante e cristalina. Esfervecente.
      flavor: Amargor de lúpulo de baixo a médio-baixo. Dulçor de malte de baixo a moderado, variando de acordo com a densidade original e atenuação. O malte é geralmente neutro, possivelmente com notas de grãos ou bolacha água-e-sal. Geralmente bem atenuada. Sabor equilibrado, com lúpulo apenas o suficiente para dar suporte ao malte. Um sabor leve de milho é comum, mas DMS em baixa intensidade é opcional. O final pode variar de seco, leve e bem definido, ao levemente doce. Perfil de fermentação limpo, mas ésteres frutados de baixa intensidade são opcionais. Sabor de lúpulo de baixo a médio-baixo de qualquer variedade, mas tipicamente floral, condimentado e/ou herbal. Sutil.
      mouthfeel: Geralmente leve e bem definida, embora o corpo possa ser médio. Sensação na boca é suave, com atenuação de média a alta; níveis de atenuação mais elevados podem conferir uma qualidade saciante. Alta carbonatação.
      comments: A maioria dos exemplares comerciais possuem OG (densidade original) variando na faixa de 1,050-1,053 e o amargor raramente ultrapassa 20 IBU.
      history: Uma ale de alta carbonatação e de consumo rápido da segunda metade do século XIX, que sobreviveu à Lei Seca. Uma ale feita para competir com as lagers produzidas no Canadá e nos estados do Nordeste, Médio Atlântico e Centro-Oeste dos Estados Unidos.
      ingredients: Malte americano de seis fileiras ou uma combinação de malte de seis fileiras com malte Norte Americano de duas fileiras. Até 20% de milho na mostura e até 20% de açúcar na fervura. Qualquer variedade de lúpulo, frequentemente Americanos rústicos e/ou Continentais. Levedura ale de caráter limpo, ou uma mistura de leveduras ale e lager.
      comparison: Semelhante ao estilo Standard American Lager, com mais caráter. Corpo mais leve, mais suave e mais carbonatada que uma Blonde Ale. Pode parecer uma Kölsch um pouco mais sutil.
      statistics:
        og:
          min: '1.042'
          max: '1.055'
        ibus:
          min: '8'
          max: '20'
        fg:
          min: '1.006'
          max: '1.012'
        srm:
          min: '2'
          max: '5'
        abv:
          min: '4.2'
          max: '5.6'
      examples:
      - Genesee Cream Ale
      - Liebotschaner Cream Ale
      - Little Kings Cream Ale
      - Kiwanda Pre-Prohibition Cream Ale
      - Sleeman Cream Ale
      - Sun King Sunlight Cream Ale
      tags:
      - any-fermentation
      - balanced
      - north-america
      - pale-ale-family
      - pale-color
      - standard-strength
      - traditional-style
    - id: 1D
      name: American Wheat Beer
      impression: Uma cerveja de trigo clara e refrescante, com notas de cereais, pão e massa de pão crua, com perfil de fermentação limpo e com caráter de lúpulo e amargor variáveis. O seu corpo mais baixo e a alta carbonatação contribuem para que seja fácil de beber.
      aroma: Caráter de trigo de baixo a moderado, lembrando cereais, pão e massa de pão crua. Dulçor de malte de baixo a moderado é aceitável. Ésteres de intensidade moderada são opcionais, geralmente com perfil neutro; banana é inapropriado. Aroma de lúpulo de baixo a moderado com notas cítricas, condimentadas, florais e frutadas. Tipicamente não leva dry-hopping. Não possui aroma fenólico de cravo.
      appearance: Geralmente de amarelo claro ao dourado. A limpidez pode variar de brilhante a turva, em função da levedura, assemelhando-se a uma Weissbier. Colarinho branco, volumoso e persistente.
      flavor: Sabor de trigo de baixo a moderado-alto, que remete a cereais, pão e massa de pão crua, que pode persistir até o final. Pode ter dulçor moderado de malte ou pode ter final bem seco e definido. Amargor de lúpulo de baixo a moderado, que às vezes pode persistir até o final. Equilibrada, mas pode ser levemente amarga. Sabor de lúpulo de baixo a moderado com notas cítricas, condimentadas, florais e frutadas. Ésteres de intensidade moderada são opcionais, sem banana e sem fenólico que lembra cravo.
      mouthfeel: Corpo de médio-baixo a médio. Carbonatação de média-alta a alta. Leve cremosidade é opcional; as cervejas de trigo às vezes têm uma impressão suave e aveludadas.
      comments: Existem diferentes variações, desde uma cerveja relativamente doce e fácil de beber até uma cerveja seca e agressivamente lupulada com um forte sabor de trigo. Cervejas do tipo American Rye (de centeio) devem ser classificadas como 31A Alternative Grain Beer.
      history: Uma adaptação do estilo Weissbier, feita por cervejarias artesanais americanas, utilizando levedura neutra e mais lúpulo; produzida pela primeira vez pela Anchor em 1984 e mais tarde popularizada pela Widmer.
      ingredients: Levedura americana ale neutra ou lager. Levedura alemã de Weissbier é inapropriada. Malte de trigo (frequentemente de 30-50%, em menor quantidade que em uma típica Weissbier). Lúpulos americanos, alemães e/ou do Novo Mundo.
      comparison: Mais caráter de lúpulo e menos caráter de levedura que uma Weissbier. Nunca apresenta o caráter de banana e cravo da Weissbier. Geralmente tem a mesma variedade e equilíbrio das Blonde Ales, mas com um caráter de trigo como sabor principal de malte.
      statistics:
        og:
          min: '1.040'
          max: '1.055'
        ibus:
          min: '15'
          max: '30'
        fg:
          min: '1.008'
          max: '1.013'
        srm:
          min: '3'
          max: '6'
        abv:
          min: '4'
          max: '5.5'
      examples:
      - Bell’s Oberon
      - Boulevard Unfiltered Wheat Beer
      - GoodLife Sweet As\! Pacific Ale
      - Goose Island 312 Urban Wheat Ale
      - Widmer Hefeweizen
      tags:
      - any-fermentation
      - balanced
      - craft-style
      - north-america
      - pale-color
      - standard-strength
      - wheat-beer-family
  - id: '2'
    name: International Lager
    notes: International lagers são cervejas lagers premium, industriais e de massa produzidas na maioria dos países do mundo. Sejam elas desenvolvidas a partir de estilos norte-americanos ou europeus, todas tendem a apresentar um caráter bastante uniforme e são fortemente comercializadas. Com origem vagamente relacionada às lagers originais do tipo Pilsner, as variações com mais cor apresentam sabores adicionais de malte, ainda assim mantendo um amplo apelo. Em muitos países, os estilos são referidos pelos nomes locais. O uso do termo “international” não significa que a cerveja seja realmente rotulada como tal, mas sim se trata de mais uma categorização de cervejas semelhantes produzidas em todo o mundo.
    subcategory:
    - id: 2A
      name: International Pale Lager
      impression: Uma lager clara altamente atenuada, sem sabores fortes, geralmente bem equilibrada e altamente carbonatada. Servida gelada, é refrescante e mata a sede.
      aroma: Aroma de malte que remete a cereais ou levemente doce, como milho, de baixo a médio-baixo. Aroma de lúpulo condimentado, floral ou herbal de muito baixo a médio. Perfil de fermentação limpo.
      appearance: Cor de palha clara a dourada. Espuma branca e cremosa, que pode ter baixa retenção. Muito límpida.
      flavor: Sabor de malte remetendo a cereais de baixo a moderado, amargor de médio-baixo a médio, com final bem definido, seca e bem atenuada. O caráter de cereais pode ser um tanto neutro ou demonstrar uma leve qualidade de biscoito água-e-sal ou pão. Caráter moderado de milho ou dulçor de malte são opcionais. Sabor de lúpulo floral, condimentado e/ou herbal médio também é opcional. O equilíbrio pode variar de levemente maltado a levemente amargo, mas normalmente é mais próximo de ser equilibrado. Retrogosto neutro com malte leve e, às vezes, sabor de lúpulo.
      mouthfeel: Corpo de leve a médio. Carbonatação de média-alta a alta. Pode apresentar uma leve picância de gás carbônico língua.
      comments: Costuma ter menos adjuntos que as American Lagers. Pode ser puro malte, mas sabores fortes ainda são considerados falhas. Engloba uma ampla categoria de lagers internacionais do mercado de massa que vão das lagers americanas mais premium até as típicas cervejas internacionais “importadas” ou de “garrafas verdes” encontradas nos Estados Unidos e em muitos mercados de exportação. Muitas vezes rotulada de forma confusa como “Pilsner”. Qualquer skunky (aroma de gambá) nas cervejas comerciais é uma falha de manuseio e não uma característica do estilo.
      history: Desenvolvida nos Estados Unidos como a versão premium da American lager padrão, com história semelhante. Fora dos Estados Unidos, desenvolvida como uma imitação das lagers de estilo americano ou como uma versão mais acessível (e frequentemente mais seca e menos amarga) de uma cerveja do tipo Pilsner. Geralmente amplamente comercializadas e exportadas por grandes cervejarias industriais ou multinacionais.
      ingredients: Cevada de duas ou seis fileiras. Arroz, milho ou açúcar como adjuntos podem ser usados, mas geralmente são puro malte.
      comparison: Geralmente mais amarga e encorpada que a American Lager. Menos lupulada e amarga que a German Pils. Menos corpo, sabor de malte e caráter de lúpulo do que a Czech Premium Pale Lager. Versões mais robustas podem se aproximar em sabor a Munich Helles, embora com mais característica de adjuntos.
      statistics:
        og:
          min: '1.042'
          max: '1.050'
        ibus:
          min: '18'
          max: '25'
        fg:
          min: '1.008'
          max: '1.012'
        srm:
          min: '2'
          max: '6'
        abv:
          min: '4.5'
          max: '6'
      examples:
      - Asahi Super Dry
      - Birra Moretti
      - Corona Extra
      - Devils Backbone Gold Leaf Lager
      - Full Sail Session Premium Lager
      - Heineken
      - Red Stripe
      - Singha
      tags:
      - balanced
      - bottom-fermented
      - lagered
      - pale-color
      - pale-lager-family
      - standard-strength
      - traditional-style
    - id: 2B
      name: International Amber Lager
      impression: Uma lager âmbar, maltada, suave e fácil de beber, com um caráter que remete a caramelo ou tostado. Em geral é razoavelmente bem atenuada, muitas vezes com caráter de adjunto e amargor contido.
      aroma: Aroma de malte lembrando cereais de baixo a moderado, frequentemente com notas de caramelo e/ou tostado com intensidade de muito baixa a moderada. Ocasionalmente nozes ou biscoito, mas nunca torrado. Aroma leve e discreto de lúpulo floral e/ou condimentado. Perfil de fermentação limpo.
      appearance: Cor de âmbar dourado a cobre avermelhado. Limpidez brilhante. Espuma de branca a quase branca, que pode ter baixa persistência.
      flavor: Sabor de malte de baixo a moderado, frequentemente como caramelo ou pão tostado. Adocicado lembrando milho de baixo a médio-baixo é opcional. Amargor de baixo a moderado, dando à cerveja um equilíbrio que pode ir de maltado a relativamente uniforme. Sabor de lúpulo de baixo a moderado, com característica floral, herbal e/ou condimentado. Perfil de fermentação limpo. O final é moderadamente seco com retrogosto moderadamente maltado. A cerveja pode parecer levemente doce se o nível de amargor for baixo.
      mouthfeel: Corpo de leve a médio. Carbonatação de média a alta. Suave. Alguns exemplares podem ser ligeiramente cremosos.
      comments: Um amplo espectro de cervejas âmbar de mercado de massa que se desenvolveram independentemente em vários países ou descrevendo cervejas âmbar bastante genéricas com mais relevância histórica, mas que eventualmente se transformaram em um produto indistinguível nos tempos modernos.
      history: Varia de acordo com o país, mas geralmente representa uma adaptação da International Pale Lager do mercado de massa ou uma evolução de estilos locais em produtos mais genéricos.
      ingredients: Malte base de duas ou seis fileiras. Maltes de cor, como Victory, âmbar e/ou torrado. Pode ser puro malte ou utilizar adjuntos. Permite o uso de açúcares e/ou corantes. Malte caramelo. Lúpulo europeu e/ou americano.
      comparison: Sabor de malte menos desenvolvido do que numa Vienna Lager, geralmente com sabor de adjunto. Sabor menos robusto e menos amargor do que numa Altbier.
      statistics:
        og:
          min: '1.042'
          max: '1.055'
        ibus:
          min: '8'
          max: '25'
        fg:
          min: '1.008'
          max: '1.014'
        srm:
          min: '6'
          max: '14'
        abv:
          min: '4.5'
          max: '6'
      examples:
      - Abita Amber Lager
      - Brooklyn Lager
      - Capital Wisconsin Amber Lager
      - Dos Equis Amber
      - Grain Belt NordEast
      - Yuengling Lager
      tags:
      - amber-color
      - amber-lager-family
      - bottom-fermented
      - lagered
      - malty
      - standard-strength
      - traditional-style
    - id: 2C
      name: International Dark Lager
      impression: Uma versão mais escura, mais rica e um pouco mais doce da International Pale Lager, com um pouco mais de corpo e sabor, porém igualmente contida no amargor. O baixo amargor deixa o malte como elemento principal de sabor e os baixos níveis de lúpulo contribuem muito pouco para o equilíbrio.
      aroma: Aroma sutil de malte. Aroma de malte caramelo e/ou torrado médio-baixo é opcional. Aroma de lúpulo floral, herbal e/ou condimentado leve é opcional. Perfil de fermentação limpo.
      appearance: Cor de âmbar profundo a marrom muito escuro, com limpidez brilhante e reflexos rubi. Espuma com cor de bege a castanho claro que pode ter baixa persistência.
      flavor: Dulçor de malte de baixo a médio. Sabor de malte caramelo e/ou torrado médio-baixo é opcional, possivelmente com notas de café, melaço, açúcar mascavo e/ou cacau. Sabor de lúpulo floral, herbal e/ou condimentado de baixa intensidade é opcional. Amargor de baixo a médio. Pode apresentar um caráter frutado muito leve. Final moderadamente bem definido. O equilíbrio é geralmente um tanto maltado. Sabores moderadamente fortes de malte torrado ou queimado são inapropriados.
      mouthfeel: Corpo de leve a médio-leve. Suave, com leve cremosidade. Carbonatação de média a alta.
      comments: Uma ampla variedade de lagers internacionais que são mais escuras do que as versões pale (claras) e não assertivamente amargas ou torradas.
      history: Versões mais escuras das International Pale Lagers, geralmente criadas pelas mesmas grandes cervejarias industriais e destinadas a atrair um público amplo. Muitas vezes uma adaptação da lager industrial clara padrão com mais cor ou dulçor, ou uma versão mais acessível (e econômica) das lagers escuras mais tradicionais.
      ingredients: Cevada de duas ou seis fileiras, com milho, arroz e/ou açúcares como adjuntos. Uso contido de malte caramelo e malte torrado mais escuro. Versões comerciais podem utilizar corante.
      comparison: Menos sabor e riqueza do que a Munich Dunkel, Schwarzbier ou outras lagers escuras. Frequentemente utiliza adjuntos, como é típico de outras International Lagers
      statistics:
        og:
          min: '1.044'
          max: '1.056'
        ibus:
          min: '8'
          max: '20'
        fg:
          min: '1.008'
          max: '1.012'
        srm:
          min: '14'
          max: '30'
        abv:
          min: '4.2'
          max: '6'
      examples:
      - Baltika \#4 Original
      - Dixie Blackened Voodoo
      - Heineken Dark Lager
      - Saint Pauli Girl Dark
      - San Miguel Dark
      - Shiner Bock
      tags:
