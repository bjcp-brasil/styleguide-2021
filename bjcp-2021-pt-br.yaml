    - id: 5C
      name: German Helles Exportbier
      impression: Uma lager alemã dourada, que equilibra perfil de malte suave e caráter amargo e lupulado em uma cerveja de teor alcoólico e corpo levemente acima da média.
      aroma: Aroma de lúpulo floral, condimentado e/ou herbal de médio-baixo a médio. Aroma de malte adocicado de cereais de intensidade moderada, possivelmente com notas leves de tostado, pão e/ou massa de pão. Perfil de fermentação limpo. Lúpulo e malte são perceptíveis e, geralmente, em equilíbrio.
      appearance: De amarelo médio a dourado profundo. Límpida. Colarinho branco persistente.
      flavor: Malte e lúpulo em intensidade moderada e equilibrados, com amargor dando suporte. Sabores de malte e lúpulo similar ao aroma (com os mesmos descritores e intensidades). Amargor médio e perceptível, cheia no paladar, com final médio-seco. Perfil limpo de fermentação. Retrogosto com malte e lúpulos geralmente em equilíbrio. Caráter mineral geralmente é percebido mais como um arredondamento, aumento de percepção de sabor e uma secura nítida no final, do que como sabor mineral evidente. Sulfato de fundo é opcional.
      mouthfeel: Corpo de médio a médio-cheio. Carbonatação média. Macia e suave na boca. Aquecimento alcoólico muito leve pode ser percebido em versões mais fortes.
      comments: 'Também conhecida como Dortmunder Export, Dortmunder, Export ou simplesmente Dort. Chamada de Export dentro da Alemanha e em outros lugares, frequentemente, de Dortmunder. A palavra Export é também um descritor da potência da cerveja, segundo a tradição cervejeira alemã e também pode ser aplicada a outros estilos. Fica entre uma German Pils e uma Munich Helles em vários aspectos: cor, equilibro entre lúpulo e malte, final e amargor.'
      history: Desenvolvida em Dortmund, na região industrial de Ruhr, em meados de 1870, como resposta as cervejas claras tipo Pilsner. Tornou-se muito popular depois da Segunda Guerra Mundial, mas perdeu popularidade em meados de 1970. Outras cervejas de classe Export se desenvolveram independentemente e refletiam versões ligeiramente mais fortes das cervejas existentes.
      ingredients: Água com caráter mineral e altos níveis de sulfatos, carbonatos e cloretos. Lúpulos tradicionais alemães ou tchecos. Malte Pilsner. Levedura lager alemã. Mostura por decocção é tradicional.
      comparison: Menos lúpulos de finalização e mais corpo do que uma German Pils. Mais amarga e seca do que uma Munich Helles. Mais forte, seca e menos lupulada do que uma Czech Premium Pale Lager.
