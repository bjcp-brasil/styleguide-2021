    - id: 12B
      name: Australian Sparkling Ale
      impression: Uma ale clara, bem equilibrada, altamente carbonatada e refrescante, adequada para consumo em climas quentes. Bastante amarga, com perfil moderado de lúpulo herbal condimentado e ésteres, como maçã e pera. Sabores de malte suaves e neutros, com corpo mais cheio, mas com final seco e altamente atenuada.
      aroma: Aroma relativamente suave e limpo, com uma mistura equilibrada de ésteres, lúpulo, malte e levedura - todos de intensidade de moderada a baixa. Os ésteres frequentemente remetem a peras e maçãs, opcionalmente com um leve toque de banana. Os lúpulos são terrosos, herbáceos ou podem apresentar o característico aroma ferroso associado a variedade Pride of Ringwood. O malte pode variar de neutros e similar a cereais a moderadamente doce ou levemente semelhante a pão; nenhum caramelo deve ser perceptível. Exemplares muito frescos podem apresentar um leve aroma de levedura e sulfuroso.
      appearance: Cor de amarelo intenso a âmbar claro, frequentemente dourado médio. Colarinho branco espesso, espumoso e persistente, com bolhas pequenas. Efervescência perceptível devido à alta carbonatação. Limpidez brilhante quando decantada, mas normalmente é servida com a levedura, apresentando uma aparência turva. Normalmente não é turva, a menos que a levedura seja servida durante o serviço.
      flavor: Sabor de malte médio a baixo, arredondado, como grãos a pão, inicialmente suave a maltado-doce, mas com amargor médio a médio-alto que cresce no meio do palato para equilibrar o malte. Sabores de caramelo normalmente ausentes. Altamente atenuada, resultando em um final seco e bem definido com um amargor persistente, embora o corpo dê uma impressão de cheio. Sabor de lúpulo de médio a médio-alto, um tanto terroso e possivelmente herbal, resinoso, apimentado ou semelhante ao ferro, mas não floral, permanecendo no retrogosto. Ésteres de médio-alto a médio-baixo, frequentemente lembrando peras e maçãs. Banana é opcional, mas nunca deve dominar. Pode ser levemente mineral ou sulfurosa, especialmente se houver levedura em suspensão. Não deve ser sem graça.
      mouthfeel: Carbonatação de alta a muito alta, proporcionando bolhas que enchem a boca e uma picada carbônica viva e refrescante. Corpo de médio a médio-alto, tendendo ao lado mais alto quando servida com levedura. Suave, mas gasosa. Versões mais fortes podem apresentar um leve aquecimento alcoólico, mas versões de menor teor alcoólico não devem apresentar essa característica. Muito bem atenuada; não deve ter dulçor residual.
      comments: A Coopers fabrica seu carro-chefe Sparkling Ale desde 1862, embora a formulação tenha mudado ao longo dos anos. Atualmente, a cerveja terá uma limpidez brilhante quando decantada, mas nos pubs geralmente se despejam a maior parte da cerveja em um copo, em seguida agitam a garrafa e despejam toda levedura. Em alguns bares, a garrafa é rolada ao longo da bancada. Quando servido em chope, a cervejaria instrui os bares a inverter o barril para despertar o fermento. Uma aparência turva para o estilo parece ser uma preferência do consumidor moderno. Sempre naturalmente carbonatada, mesmo no barril. Uma ale atual, melhor apreciada fresca.
      history: Registros cervejeiros mostram que a maioria das cervejas australianas fabricadas no século 19 era chope XXX (Mild) e porter. A Ale em garrafa foi originalmente desenvolvida para competir com as pale ales engarrafadas importadas de cervejarias britânicas, como Bass e Wm Younger’ Monk. No início do século 20, a pale ale engarrafada saiu de moda e as cervejas lager “mais leves” estavam em voga. Muitas Australian Sparkling e Pale Ales foram rotuladas como ales, mas na verdade eram lagers de baixa fermentação com perfil de malte muito semelhante às ales que substituíram. Coopers de Adelaide, Sul da Austrália é a única cervejaria sobrevivente que produz o estilo Sparkling Ale.
      ingredients: Malte pale australiano de 2 fileiras, levemente torrado, variedades pilsen podem ser usadas. Pequenas quantidades de malte crystal apenas para ajuste de cor. Os exemplos modernos não usam adjuntos, açúcar de cana apenas para priming. Exemplos históricos usando 45% de malte de 2 fileiras e 30% de malte mais proteico (6 fileiras), usariam cerca de 25% de açúcar para diluir o teor de nitrogênio. Lúpulos australianos tradicionalmente usados, Cluster e Goldings até serem substituídos em meados da década de 1960 pelo Pride of Ringwood. Levedura do tipo Burton altamente atenuante (cepa australiana típica). Perfil de água variável, tipicamente com baixo teor de carbonato e sulfato moderado.
      comparison: Superficialmente semelhante às English Pale Ales, embora muito mais carbonatadas, com menos caramelo, menos lúpulos tardios e apresentando a assinatura da levedura e variedade de lúpulo. Mais amargor do que os IBU podem sugerir devido à alta atenuação, baixa densidade final e lúpulo um tanto áspero.
