    - id: 27A
      name: 'Historical Beer: Lichtenhainer'
      impression: Uma cerveja de trigo histórica da Europa Central, ácida, defumada e de baixa densidade. Caráter complexo e, ainda assim, refrescante devido a alta atenuação e carbonatação junto com baixo amargor e acidez moderada.
      aroma: Aroma moderadamente forte de defumado fresco. Leve nota de acidez. Ésteres frutados médio-baixos, possivelmente como maçãs ou limões. Malte moderado como pão e cereais. O caráter de defumado é mais forte que as notas de pão e o defumado tem um caráter “seco”, como restos de uma fogueira, não um defumado “gorduroso”. Sem lúpulos.
      appearance: Colarinho quase branco, alto, firme e persistente. Cor de amarelo a dourado. Consideravelmente límpida, pode ser um tanto turva.
      flavor: Sabor frutado moderadamente forte, possivelmente como limões e maçãs. Acidez láctica limpa, de intensidade moderada, sem qualquer funk. Caráter de defumado por madeira seca similar ao aroma, intensidade média. Final seco, com acidez e defumado no retrogosto. Amargor baixo; acidez fornece o equilíbrio, não os lúpulos. Na boca, fresca e limpa, com um retrogosto levemente repuxante. O caráter de trigo está no lado baixo; o defumado e a acidez estão mais proeminentes no equilíbrio. O sabor azedo, como limão ou maçã verde, é mais forte no final com o defumado seguindo de perto. Sem lúpulos.
      mouthfeel: Acidez picante. Alta carbonatação. Corpo de médio a médio-baixo.
      comments: Servida jovem. Defumado e acidez é uma combinação não usual que pode ser um gosto adquirido.
      history: Originária de Lichtenhain, na Turingia (Alemanha central). O ápice da sua popularidade foi no final do século 19 e era mais amplamente disponível na Turingia. Como uma Berliner Weisse pre-1840.
      ingredients: Malte de cevada defumado, malte de trigo, lacto, levedura de alta fermentação. A lista de grãos varia mas o trigo tipicamente seria de 30 a 50%. Pode ser feita somente com malte de cevada.
      comparison: Na mesma família histórica geral de cervejas de trigo com baixo teor alcoólico da Europa Central que Gose, Grodziskie e Berliner Weisse; tem elementos de todas elas mas com seu próprio equilíbrio único - acidez e defumado não é encontrado em nenhum outro estilo. Não tão ácida como uma Berliner Weisse, provavelmente mais parecida com uma Gose defumada sem coentro e sal ou uma Grodziskie com a acidez de uma Gose.
