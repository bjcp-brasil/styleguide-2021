    - id: 23F
      name: Fruit Lambic
      impression: Uma cerveja de trigo belga, complexa, refrescante e agradavelmente ácida que combina um caráter complementar de frutas fermentadas com acidez funky de uma Gueuze.
      aroma: A fruta especificada deve ser o aroma dominante, misturando-se bem com os aromas similares da Gueuze (a mesma descrição se aplica, mas com a adição de um caráter de fruta fermentada).
      appearance: Como uma Gueuze, mas modificada pela cor da fruta utilizada, perdendo intensidade com o tempo. A limpidez costuma ser boa, embora algumas frutas não sedimentem o suficiente para torná-la límpida. Se altamente carbonatada da maneira tradicional terá uma espuma grossa, densa, geralmente de longa duração, semelhante a mousse, às vezes com uma tonalidade que reflete a fruta adicionada.
      flavor: Combina o perfil de sabor de uma Gueuze (aplica-se a mesma descrição) com contribuições perceptíveis do sabor da fruta adicionada. As versões tradicionais são secas e ácidas, com sabor de frutas fermentadas. As versões modernas podem ter uma doçura variável, que pode compensar a acidez. Os sabores de frutas também desaparecem com o tempo e perdem sua vitalidade, portanto, podem ser de baixa a alta intensidade.
      mouthfeel: Corpo baixo a médio-baixo; não deve ser aguada. Tem uma acidez de baixa a alta intensidade, trazendo a capacidade de franzir o rosto sem ser acentuadamente adstringente. Algumas versões têm um leve caráter de aquecimento. A carbonatação pode variar de efervescente a quase sem gás.
      comments: Produzida como Gueuze, com a fruta comumente adicionada no meio do envelhecimento, para que as leveduras e as bactérias possam fermentar todos os açúcares da fruta; ou adicionando frutas a uma Lambic, que é menos comum. Às vezes, a variedade de frutas pode ser difícil de identificar, pois as frutas fermentadas e envelhecidas costumam ser percebidas de maneira diferente das frutas frescas, mais reconhecíveis. A fruta pode trazer acidez e taninos, além de sabor e aroma; entender o caráter da fruta fermentada ajuda a julgar o estilo.
      history: Mesma história básica da Gueuze, incluindo a tendência recente de adoçar, mas com frutas além do açúcar. A fruta era tradicionalmente adicionada pelo responsável por fazer a mistura ou pelo taberneiro para aumentar a variedade de cervejas disponíveis nos cafés locais.
      ingredients: Mesma base da Gueuze. Fruta adicionada aos barris durante a fermentação e a mistura. Frutas tradicionais incluem cerejas ácidas e framboesas; frutas modernas incluem pêssegos, damascos, uvas e outros. Pode usar adoçantes naturais ou artificiais.
      comparison: Uma Gueuze com frutas, não apenas uma Fruit Beer ácida; o caráter selvagem deve ser evidente.
