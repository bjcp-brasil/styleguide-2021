  - id: '21'
    name: IPA
    notes: Esta categoria é para IPAs americanas modernas e suas derivações. Isso não implica que as IPAs inglesas não sejam propriamente IPAs ou que não haja uma relação entre elas. Este é simplesmente um método de agrupar estilos semelhantes para fins de competição. As IPAs inglesas são agrupadas com outras cervejas com derivação inglesa e a Double IPA é agrupada com as cervejas americanas mais fortes. O termo “IPA” é intencionalmente não grafado como “India Pale Ale”, já que nenhuma dessas cervejas historicamente foi para a Índia e muitas delas não são claras. Contudo, o termo IPA passou a ser um estilo definido em termos de equilíbrio na cerveja artesanal moderna.
    subcategory:
    - id: 21A
      name: American IPA
      impression: Uma cerveja americana clara, com teor alcoólico moderadamente alto, incontestavelmente lupulada e amarga. O equilíbrio é orientado para o lúpulo, com um perfil de fermentação limpo, final seco e suporte maltado limpo; que permite uma variação criativa para que o caráter de lúpulo se destaque.
      aroma: Aroma de lúpulo de proeminente a intenso, muitas vezes apresentando características de lúpulo americano ou do novo mundo, como cítrico, floral, de pinho, resinoso, de condimentos, de frutas tropicais, de frutas de caroço, de frutas vermelhas ou de melão. Caráter de malte limpo, como cereais, de baixo a médio-baixo, auxilia a atuação do lúpulo. Perfil de fermentação geralmente limpo, mas leve frutado é aceitável. Aroma contido de álcool é opcional.
      appearance: Cor variando de dourado médio a âmbar avermelhado claro. Límpida, porém uma turbidez leve é permitida. Colarinho de tamanho médio, de branco a quase branco, com boa persistência.
      flavor: Sabor de lúpulo de médio a muito alto (mesmos descritores do aroma). Maltado limpo, como cereais, de baixo a médio-baixo, possivelmente com leve sabor de caramelo e tostado. Amargor de médio-alto a muito alto. Final de seco a médio-seco. Retrogosto lupulado e amargo com suporte do malte. Ésteres baixos opcionais. Sabor limpo de álcool, em segundo plano, é opcional.
      mouthfeel: Corpo de médio-leve a médio, com uma textura suave. Carbonatação de média a média-alta. Sem aspereza. Um aquecimento macio, muito leve, é opcional.
      comments: A base para muitas variações modernas, incluindo a Double IPA que tem o teor alcoólico mais alto, bem como IPAs com vários outros ingredientes. Essas outras IPAs geralmente devem ser registradas no estilo 21B Specialty IPA. Uma India Pale Lager (IPL) pode ser inscrita como uma American IPA se possui caráter semelhante, caso contrário, 34B Mixed-Style Beer. O carvalho (qualquer madeira) é impróprio neste estilo, se for notável, registrar em 33A Wood-Aged Beer. Exemplos secos, nitidamente amargos e límpidos, às vezes são denominados como West Coast IPA, que, na verdade, é apenas um tipo de American IPA.
      history: Acredita-se que a primeira adaptação de cerveja artesanal americana moderna deste estilo tradicional inglês é a Anchor Liberty Ale, fabricada pela primeira vez em 1975. Usando lúpulo Cascade em flor; o estilo evoluiu além dessa cerveja original, que, agora, por comparação, tem um gosto mais parecido com uma American Pale Ale. As IPAs americanas de épocas anteriores não eram desconhecidas (principalmente a bem-conceituada Ballantine’s IPA, uma cerveja envelhecida em carvalho, usando uma antiga receita inglesa). Este estilo é baseado nos exemplos modernos de cervejas artesanais.
      ingredients: Malte base Pale Ale. Levedura americana ou inglesa com perfil limpo ou levemente frutado. Geralmente é puro malte, mas adições de açúcar são aceitáveis. Uso restrito de maltes crystal. Frequentemente se usa lúpulo americano ou do novo mundo, mas qualquer variedade é aceitável; novas variedades de lúpulo continuam sendo lançadas e podem ser utilizadas mesmo que não possuam os perfis sensoriais listados como exemplos.
      comparison: Com teor alcoólico mais alto e mais lupulada que a American Pale Ale. Comparada com a English IPA, tem menos caramelo, pão e tostado; muitas vezes mais lúpulo americano ou do novo mundo; menos ésteres derivados de levedura; menos corpo e muitas vezes um equilíbrio mais lupulado; tendo o teor alcoólico ligeiramente mais alto do que a maioria dos exemplos. Menos álcool do que uma Double IPA, mas com o equilíbrio semelhante.
