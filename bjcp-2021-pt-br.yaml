    - id: 21B
      name: 'Specialty IPA: Black IPA'
      impression: Uma cerveja com a secura, o equilíbrio de lúpulo e as características de sabor de uma American IPA, mas com a cor mais escura. Maltes mais escuros adicionam um sabor suave e um suporte, não um caráter fortemente torrado ou queimado.
      aroma: Aroma de lúpulo de moderado a alto, muitas vezes com um caráter de frutas de caroço, tropical, cítrico, resinoso, de pinho, de frutas vermelhas ou de melão. Malte de muito baixo a moderado, possivelmente com notas leves de chocolate, café ou tosta, bem como um dulçor de caramelo em segundo plano. Perfil de fermentação limpo, mas ésteres leves são aceitáveis.
      appearance: Cor de marrom escuro a preta. Limpa, quando não for opaca. Enevoado leve é permitido, mas não deve ser turva. Colarinho moderado, persistente, de castanho claro a castanho.
      flavor: Sabor de lúpulo de médio-baixo a alto, com os mesmos descritores do aroma. Sabor de malte de baixo a médio, com notas contidas de chocolate ou café, mas não queimadas ou como de cinzas. As notas torradas não devem colidir com os lúpulos. Caramelo claro e/ou toffee opcionais. Amargor de médio-alto a muito alto. Final de seco a ligeiramente seco, com um retrogosto amargo, mas não desagradável. Muitas vezes com um leve sabor de torra que pode contribuir para a impressão seca. Ésteres de baixos a moderados são opcionais. Sabor de álcool em segundo plano é opcional.
      mouthfeel: Macia. Corpo de médio-leve a médio. Carbonatação média. Leve cremosidade é opcional. Leve aquecimento alcoólico é opcional.
      comments: A maioria dos exemplos são de teor alcoólico padrão. Exemplares com teor alcoólico mais alto podem parecer uma porter lupulada, se feita muito no extremo do estilo, o que pode prejudicar sua facilidade de ser bebida.
      history: Uma variante da American IPA produzida comercialmente pela primeira vez por Greg Noonan como Blackwatch IPA, por volta de 1990. Popularizada a partir de meados dos anos 2000 no noroeste do Pacífico e no sul da Califórnia dos Estados Unidos, e foi uma moda popular no início dos anos 2010, antes de cair na obscuridade nos EUA.
      ingredients: Maltes torrados sem casca (debittered). Qualquer perfil de lúpulo americano ou do novo mundo é aceitável; novas variedades de lúpulo continuam a ser lançadas e, por isso, não se deve restringir o estilo às características de lúpulo listadas como exemplos.
      comparison: Equilíbrio e impressão geral de uma American ou de uma Double IPA, com torra contida, semelhante à encontrada na Schwarzbier. Não é tão rica e torrada como American Stout e Porter e com menos corpo, maior suavidade e maior facilidade de beber.
