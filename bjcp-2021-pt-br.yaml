    - id: 16D
      name: Foreign Extra Stout
      impression: Uma stout muito escura, rica, com teor alcoólico moderadamente alto, bastante seca, com sabores torrados proeminentes.
      aroma: Torra moderada a alta, como café, chocolate amargo ou cereais levemente queimados. Frutado baixo a médio. Pode ter um aroma doce, melaço, alcaçuz, frutas secas ou vínico. Versões com teor alcoólico mais alto podem ter um aroma sutil e limpo de álcool. Aroma baixo de lúpulo terroso, herbal ou floral opcional. Diacetil baixo opcional.
      appearance: Cor marrom muito profundo a preto. Limpidez geralmente obscurecida pela cor escura. Límpida, se não for opaca. Colarinho volumoso, castanho a marrom, com boa retenção.
      flavor: Torra moderada a alta, como café, chocolate amargo ou cereais levemente queimados, embora sem uma intensidade forte. Ésteres de baixo a médio. Amargor médio a alto. Final moderadamente seco. Sabor moderado de lúpulo terroso, herbal ou floral opcional. Diacetil médio-baixo opcional.
      mouthfeel: Corpo médio-cheio a cheio, muitas vezes com um caráter suave, às vezes cremoso. Pode ter um aquecimento alcoólico, mas não pode queimar. Carbonatação moderada a moderadamente alta.
      comments: Também conhecida como Foreign Stout, Export Stout e Foreign Export Stout. Versões históricas (antes da Primeira Guerra Mundial, pelo menos) tinham a mesmo OG que as Extra Stouts domésticas, mas dependendo da cervejaria poderia ter um ABV mais alto porque tinha uma fermentação secundária longa e com Brett. A diferença entre as versões nacionais e estrangeiras foram a lupulagem e o tempo de maturação.
      history: Stouts com teor alcoólico mais alto fabricadas para o mercado de exportação hoje, mas com uma história que remonta aos séculos 18 e 19, quando eram versões mais lupuladas de stouts de exportação com teor alcoólico mais alto. Cerveja originalmente maturada em barricas de madeira (vatted), mas a Guinness interrompeu essa prática na década de 1950. A Guinness Foreign Extra Stout (originalmente, West India Porter, mais tarde Foreign Extra Double Stout) foi fabricada pela primeira vez em 1801 de acordo com a Guinness com “lúpulo extra para dar um sabor distinto e uma vida útil mais longa em climas quentes”.
      ingredients: Malte pale, maltes torrados escuros e cereais, historicamente também poderiam ter usado maltes brown e âmbar. Lúpulo principalmente para amargor, variedades tipicamente inglesas. Pode usar adjuntos e açúcar para aumentar a densidade.
      comparison: Semelhante em equilíbrio a uma Irish Extra Stout, mas com mais álcool. Com teor alcoólico não tão alto nem tão intensa quanto uma Imperial Stout. Sem o forte amargor e os lúpulos de adição tardia das American Stout. densidade semelhante à Tropical Stout, mas com final mais seco e mais amargo.
