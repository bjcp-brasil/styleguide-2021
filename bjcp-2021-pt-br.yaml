    - id: 18B
      name: American Pale Ale
      impression: Uma cerveja artesanal americana clara, de teor alcoólico médio, com destaque para o lúpulo, e com suporte suficiente do malte para tornar a cerveja equilibrada e fácil de beber. Uma presença limpa de lúpulo pode refletir variedades clássicas ou modernas americanas ou do Novo Mundo, com uma ampla gama de características.
      aroma: Aroma de lúpulo de moderado a moderadamente-alto de variedades americanas e/ou do Novo Mundo, com uma ampla gama de características possíveis, incluindo cítrico, floral, de pinho, resinoso, condimentado, de frutas tropicais, de frutas de caroço, de frutas vermelhas e/ou de melão. Nenhuma dessas características específicas é obrigatório, mas um aroma lupulado deve ser evidente. Aroma maltado de baixo a moderado, de neutro a como cereais dá suporte à apresentação do lúpulo e pode mostrar pequenas quantidades de caráter de malte especial (por exemplo, pão, torrada, biscoito, caramelo). Ésteres frutados são opcionais, de força até moderada. Aroma fresco de dry-hopping é opcional.
      appearance: Cor de dourado claro a âmbar. Colarinho moderadamente volumoso, de branco a quase branco, com boa retenção. Geralmente bastante límpida.
      flavor: Caráter de lúpulo e malte semelhante ao aroma (os mesmos descritores e intensidades se aplicam). Os sabores de caramelo geralmente estão ausentes ou muito contidos, mas são aceitáveis, desde que não entrem em conflito com o lúpulo. Amargor de moderado a alto. Perfil limpo de fermentação. Os ésteres frutados de levedura podem ser de moderados a nenhum, embora muitas variedades de lúpulo sejam bastante frutadas. Final de médio a seco. O equilíbrio normalmente pende para o lúpulo de adição tardia e amargor; a presença de malte deve ser de suporte, não uma distração. O sabor e o amargor do lúpulo geralmente permanecem no final, mas o retrogosto geralmente deve ser limpo e não deve ser áspero. Sabor fresco de dry-hopping é opcional.
      mouthfeel: Corpo de médio-leve a médio. Carbonatação de moderada a alta. No geral, final macio, sem adstringência ou aspereza.
      comments: As versões americanas modernas geralmente são apenas IPAs de menor densidade. Tradicionalmente era um estilo que permitia a experimentação com maneiras de utilização e variedades de lúpulo, que agora podem ser encontrados como adaptações internacionais em países com um mercado emergente de cerveja artesanal. Os juízes devem considerar as características dos lúpulos americanos modernos e/ou do Novo Mundo à medida que são desenvolvidos e lançados.
      history: Uma adaptação moderna do mercado americano de cerveja artesanal da English Pale Ale, refletindo ingredientes locais. A Sierra Nevada Pale Ale foi produzida pela primeira vez em 1980 e ajudou a popularizar o estilo. Antes da explosão de popularidade das IPAs, esse estilo era o mais conhecido e o mais popular das cervejas artesanais americanas.
      ingredients: Malte pale ale neutro. Lúpulo americano e/ou do Novo Mundo. Levedura ale americana neutra ou inglesa levemente frutada. Pequenas quantidades de vários maltes especiais.
      comparison: Tipicamente de cor mais clara, mais limpa no perfil de fermentação e com menos sabores de caramelo do que as equivalentes inglesas. Pode haver alguma sobreposição de cores entre a American Pale Ale e a American Amber Ale. A American Pale Ale geralmente será mais limpa, terá um perfil de malte menos caramelizado, corpo mais leve e muitas vezes mais lúpulos de finalização. Menos amargor no equilíbrio e menor teor alcoólico que uma American IPA. Mais maltada, mais equilibrada, fácil de beber, e menos intensamente focada no lúpulo e amarga do que as American IPAs com teor alcoólico session (também conhecidas como Session IPAs). Mais amarga e lupulada que uma Blonde Ale.
