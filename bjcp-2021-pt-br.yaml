  - id: '24'
    name: Belgian Ale
    notes: Esta categoria contém as cervejas belgas e francesas altamente saborosas, de maltadas a balanceadas.
    subcategory:
    - id: 24A
      name: Witbier
      impression: Uma cerveja de trigo belga clara e turva, com especiarias que acentuam o caráter de levedura. Uma ale delicada, levemente picante e de força moderada. Witbier é uma bebida refrescante de verão com alta carbonatação, final seco e leve lupulagem.
      aroma: Malte moderado como pão, geralmente com leves notas de mel ou baunilha. Aroma de trigo levemente cereal e picante. Moderado perfume de coentro, cítrico; muitas vezes com uma nota complexa de ervas, especiarias ou apimentada no fundo. Moderado aroma frutado cítrico de casca de laranja. Um baixo aroma de lúpulo condimentado e herbal é opcional, mas geralmente ausente. As especiarias devem se misturar com aromas frutados, florais e doces e não devem ser excessivamente fortes.
      appearance: De cor palha muito clara a amarelo profundo. A cerveja ficará muito turva devido à turbidez causada pelo amido ou levedura, o que lhe confere um brilho leitoso amarelo-esbranquiçado. Colarinho denso, branco e como mousse. A retenção do colarinho deve ser muito boa.
      flavor: Sabor agradável de malte de pão e grãos, muitas vezes com um caráter de mel ou baunilha. Moderado sabor frutado cítrico de casca de laranja. Sabores condimentados de ervas, que podem incluir coentro e outras especiarias, são comuns e devem ser sutis e equilibrados, não dominantes. Sabor de lúpulo condimentado e terroso de baixo a nenhum que nunca ofusca as especiarias. O amargor do lúpulo é de baixo a médio-baixo e suporta os sabores refrescantes de frutas e especiarias. Refrescantemente com um final seco e bem definido, sem retrogosto amargo ou áspero.
      mouthfeel: Corpo médio-leve a médio, muitas vezes apresentando maciez e leve cremosidade. Caráter efervescente vindo da alta carbonatação. Refrescância gerada pela carbonatação, secura e falta de amargor no final. Sem aspereza ou adstringência. Não deve ser excessivamente seca ou aguada, nem deve ser espessa e pesada.
      comments: Versões históricas podem ter alguma acidez láctica, mas isso está ausente nas versões modernas. As especiarias podem ter alguma variação, mas não devem ser exageradas. Coentro de certa origem ou idade pode dar um caráter inadequado de presunto ou aipo. A cerveja tende a ser perecível, então exemplos mais jovens, frescos e bem manuseados são os mais desejáveis. Uma impressão de doçura geralmente se deve ao baixo amargor, não ao açúcar residual. A maioria dos exemplos parece ter aproximadamente 5% ABV.
      history: Uma cerveja de um grupo de cervejas brancas belgas medievais da área de Leuven, que se extinguiu em 1957 e mais tarde foi revivida por Pierre Celis em 1966, na companhia que se tornou a Hoegaarden. Depois que a Hoegaarden foi adquirida pela Interbrew, o estilo cresceu rapidamente e inspirou muitos produtos similares que são rastreáveis à recriação do estilo por Celis, não aqueles de séculos passados.
      ingredients: Trigo não maltado (30-60%), o restante de malte de cevada com baixa cor. Algumas versões usam até 5-10% de aveia crua ou outros grãos de cereais não maltados. Tradicionalmente usa sementes de coentro e casca seca de laranja Curaçao. Há rumores de que outras especiarias secretas são usadas em algumas versões, assim como as cascas de laranja doce. Levedura ale belga levemente frutada e picante.
      comparison: Baixo nível de amargor com equilíbrio semelhante ao de uma Weissbier, mas com especiarias e caráter cítrico provenientes de adições mais do que da levedura.
