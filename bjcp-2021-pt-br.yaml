    - id: 19B
      name: California Common
      impression: Uma cerveja tostada e caramelada, bastante amarga, com teor alcoólico padrão, com um frutado interessante e caráter rústico e amadeirado de lúpulo. Suave e bem carbonatada.
      aroma: Lúpulos herbáceos, resinosos, florais ou mentolados de moderado a alto. Leve frutado aceitável. Malte caramelo ou tostado, de baixo a moderado, traz suporte ao lúpulo.
      appearance: Cor de âmbar médio a cobre claro. Geralmente límpida. Colarinho moderado, quase branco, com boa retenção.
      flavor: Moderadamente maltada com um amargor de lúpulo pronunciado. O caráter de malte geralmente tem sabores tostados (não torrados) e caramelo. Sabor de lúpulo de baixo a moderadamente alto, geralmente mostrando qualidades rústicas e tradicionais de lúpulos americanos (geralmente herbal, resinoso, floral, mentolado). Final bastante seco e bem definido, com um amargor persistente de lúpulo e um sabor firme de malte como de grãos. Ésteres frutados leves são aceitáveis, caso contrário deve ser limpa.
      mouthfeel: Corpo médio. Carbonatação de média a média-alta.
      comments: Este estilo é definido de forma restrita com base no exemplo protótipo da Anchor Steam, embora permitindo o uso de outros ingredientes típicos da época. O lúpulo Northern Brewer não é requisito para o estilo; lúpulos modernos americanos e do Novo Mundo (especialmente os cítricos) são inadequados.
      history: Original da Costa Oeste americana, fabricada originalmente como Steam Beer durante a era da corrida do ouro. Grandes fermentadores abertos rasos (coolships) foram usados para compensar a falta de refrigeração e aproveitar as temperaturas frias na área da Baía de São Francisco. As versões modernas são baseadas na Anchor Brewing, que relançou o estilo na década de 1970.
      ingredients: Malte Pale Ale, lúpulos não cítricos (geralmente Northern Brewer), pequenas quantidades de malte tostado ou malte crystal. Levedura lager; no entanto, algumas cepas (geralmente com a menção de “Califórnia” no nome) funcionam melhor do que outras nas temperaturas de fermentação mais quentes normalmente usadas (13 a 16°C). Observe que algumas cepas de leveduras alemãs produzem caráter sulfuroso inadequado.
      comparison: Superficialmente semelhante a uma American Amber Ale, mas com opções específicas de malte e lúpulo – o sabor e o aroma do lúpulo são tradicionais (não modernos) do lúpulo americano, os sabores do malte são mais tostados, o lúpulo é sempre assertivo e uma levedura lager fermentada em temperatura mais quente é usada. Menos atenuada, menos carbonatada e menos frutada que a Australian Sparkling ale.
