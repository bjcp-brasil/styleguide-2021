    - id: 21B
      name: Specialty IPA
      impression: Reconhecível como IPA pelo equilíbrio - uma cerveja orientada para o lúpulo, amarga e seca - com a presença de algo a mais para distingui-la das categorias padrão. Deve ser fácil de ser bebida, independente da forma. Aspereza e peso excessivos são tipicamente falhas, assim como sabores fortes que geram conflitos entre o lúpulo e os outros ingredientes especiais.
      aroma: Um detectável aroma de lúpulo é necessário; a caracterização do lúpulo depende do tipo específico da Specialty IPA. Outros compostos aromáticos podem estar presentes; mas o aroma de lúpulo é tipicamente o elemento mais forte.
      appearance: A cor depende do tipo específico de Specialty IPA. A maioria deve ser límpida, mas uma leve turbidez é aceitável na maioria dos estilos. Cervejas mais escuras podem ser opacas, tornando a limpidez irrelevante. Colarinho bom e persistente, com cor dependente do estilo específico da Specialty IPA.
      flavor: Variável em cada estilo, com a qualidade de cada componente dependente da Specialty IPA específica. Sabor de lúpulo tipicamente de médio-baixo a alto. Amargor de lúpulo tipicamente de médio-alto a muito alto. Sabor de malte geralmente de baixo a médio. Comumente tem um final de seco a médio-seco. Algum sabor de álcool limpo pode ser notado em versões mais fortes. Vários tipos de Specialty IPAs podem apresentar características adicionais de malte e levedura, dependendo do estilo.
      mouthfeel: Macia. Corpo de médio-leve a médio. Carbonatação, geralmente, média. Um aquecimento alcoólico, em segundo plano, pode ser percebido em versões mais fortes.
      comments: Os participantes podem usar esta categoria para uma versão com intensidade diferente de uma IPA definida por sua própria subcategoria BJCP (por exemplo, American or English IPA com intensidade session - exceto quando já existir uma subcategoria BJCP para esse estilo (por exemplo, Double \[American\] IPA). Uma Session IPA é uma 21B Specialty IPA com um estilo base de 21A American IPA com teor alcoólico session. Uma Double IPA é da Categoria 22A e não da 21B.
      comparison: 'Tipos atualmente definidos: Belgian IPA, Black IPA, Brown IPA, Red IPA, Rye IPA, White IPA e Brut IPA'
      statistics:
        abv:
          min: '3.0'
          max: '5.0'
    - id: 21B
      name: 'Specialty IPA: Belgian IPA'
      impression: Uma IPA seca e lupulada, com frutado e picância provenientes de levedura belga. Muitas vezes de cor mais clara e mais atenuada, semelhante a uma Belgian Tripel que foi preparada com mais lúpulo.
      aroma: Aroma de lúpulo de moderado a alto, frequentemente refletindo o caráter de lúpulos americanos ou do novo mundo (tropical, melão, frutas de caroço, cítricos, pinho, etc.) ou lúpulos da europa continental (condimentados, herbais, florais, etc.), possivelmente com uma leve nota oriunda de dry-hop. Dulçor suave do malte, às vezes com um caráter açucarado ou de mel, mas raramente de caramelo. Ésteres de moderados a altos, geralmente de frutas cítricas, pera, maçã ou banana. Leve aroma de especiarias, cravo ou pimenta, é opcional. Leve aroma de álcool também é opcional.
      appearance: Cor de dourada clara a âmbar. Colarinho quase branco, de moderado a volumoso, com boa retenção. Limpidez de boa a bastante turva.
      flavor: Sabores frutados e de especiarias moderados, mesmos descritores do aroma. Sabor de lúpulo de moderado a alto, mesmos descritores do aroma. Sabor de malte de leve a relativamente neutro, como cereais, opcionalmente com níveis baixos de tosta, caramelo ou mel. Amargor de moderado a alto. Final de seco a meio seco, que muitas vezes acentua a percepção de amargor. O retrogosto tem um amargor persistente, mas não é desagradável.
      mouthfeel: Corpo de leve a médio. Carbonatação de média a alta, que pode aliviar a impressão do corpo. Aquecimento alcoólico leve é opcional.
      comments: A escolha da cepa de levedura e das variedades de lúpulo é fundamental, pois muitas combinações vão destoar de forma terrível.
      history: Um estilo relativamente moderno, datado de meados dos anos 2000. Cervejeiros caseiros e cervejarias artesanais, em suas receitas de American IPA, substituíram a levedura por uma belga. Normalmente, as cervejarias belgas adicionavam mais lúpulo às suas cervejas claras com teor alcoólico mais alto.
      ingredients: Cepas de leveduras belgas usadas na fabricação de Belgian Tripels e Golden Strong Ales. Exemplos americanos tendem a usar lúpulos americanos ou do novo mundo, enquanto as versões belgas tendem a usar lúpulos europeus e apenas malte claro. Adjuntos de açúcar são comuns.
      comparison: Um cruzamento entre uma American IPA ou Double IPA com uma Belgian Golden Strong Ale ou uma Belgian Tripel. Este estilo pode ser condimentado, com teor alcoólico mais alto, mais seco e mais frutado do que uma American IPA.
