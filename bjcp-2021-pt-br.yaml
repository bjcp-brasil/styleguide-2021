    - id: 21B
      name: 'Specialty IPA: Rye IPA'
      impression: Uma American IPA elaborada com o condimentado, granulado malte de centeio. O centeio traz um sabor de pão e apimentado, um corpo mais cremoso e um final seco e com sabor de cereais.
      aroma: Proeminente a intenso aroma de lúpulo, muitas vezes com um caráter de frutas de caroço, de frutas tropicais, de frutas cítricas, de resina, de pinho, de frutas vermelhas ou de melão. Baixo aroma apimentado de malte de centeio em conjunto, em segundo plano, com um perfil maltado limpo de cereais. Perfil de fermentação limpo. Ésteres leves são opcionais. Aroma leve de álcool é opcional.
      appearance: Cor variando de dourado médio a âmbar avermelhado claro. Límpida. Leve turbidez é opcional. Colarinho de tamanho médio, de branco a quase branco, com boa persistência.
      flavor: Sabor de lúpulo de médio a muito alto, com os mesmos descritores do aroma. Suporte maltado limpo, de baixo a médio-baixo, possivelmente com leve sabor de caramelo ou tostado. Sabor de centeio de baixo a moderado como cereais, apimentado e picante, que contribui para o final seco. Amargor de médio-alto a muito alto, sem aspereza. Retrogosto seco, amargo e lupulado. Ésteres baixos são opcionais. Sabor de álcool em segundo plano é opcional.
