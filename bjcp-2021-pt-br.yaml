  - id: '27'
    name: Historical Beer
    notes: 'A categoria Historical Beer contém estilos que quase desapareceram nos tempos modernos ou que eram muito mais populares no passado e agora são conhecidos apenas por meio de recriações. Esta categoria também pode ser usada para cervejas tradicionais ou nativas de importância cultural em certos países. Colocar uma cerveja na categoria histórica não significa que ela não esteja sendo produzida atualmente, apenas que é um estilo pouco difundido ou talvez esteja em processo de redescoberta por cervejeiros artesanais. A Historical Beer pode ser um estilo pouco difundido, atualmente produzido comercialmente ou não, que não está presente nas diretrizes de estilo como um estilo clássico. Pode ser que não se tenha ouvido falar dele, que nunca tenha sido visto em uma competição ou que não se tenha dados suficientes para preparar um conjunto razoável de diretrizes de julgamento. Se é um estilo com um nome que é ou foi realmente usado, provavelmente entrará nessa categoria. Este estilo não
      é para cervejas experimentais que nunca foram produzidas ou para outros estilos clássicos com ingredientes especiais adicionados. Qualquer Historical Beer listada nesta categoria ou contida na lista de Estilos Provisórios é considerada um Estilo Clássico para fins de inscrição nas categorias de cerveja do Tipo Especial com ingredientes adicionados (frutas, especiarias, madeira, defumado, etc). Isso significa que uma Historical Beer pode ser usada como um estilo base para cervejas do Tipo Especial sem tornar automaticamente a cerveja Experimental. O BJCP aceita submissões de Estilos Históricos bem pesquisados que possam ser apropriados para a lista de Estilos Provisórios em nosso site ou para futura inclusão nestas Diretrizes. Instruções para Inscrição: O participante deve especificar um estilo com uma descrição fornecida pelo BJCP da lista abaixo ou especificar um estilo de cerveja histórico diferente que não esteja descrito em outras partes destas diretrizes. No caso de um estilo
      que mudou substancialmente ao longo dos anos (como Porter ou Stout), o participante pode especificar um estilo BJCP existente, bem como a época (por exemplo, 1820 English Porter). Quando o participante especifica qualquer estilo que não esteja na lista fornecida pelo BJCP nesta categoria ou na lista de Estilos Provisórios, o participante deve fornecer uma descrição do estilo para os juízes com detalhes suficientes para permitir que a cerveja seja julgada. Se uma cerveja for inscrita com apenas o nome do estilo e nenhuma descrição, é muito improvável que os juízes entendam como julgá-la. Exemplos atualmente definidos: Kellerbier, Kentucky Common, Lichtenhainer, London Brown Ale, Piwo Grodziskie, Pre-Prohibition Lager, Pre-Prohibition Porter, Roggenbier, Sahti.'
    subcategory:
    - id: 27A
      name: 'Historical Beer: Kellerbier'
      impression: Uma lager alemã não filtrada, não pasteurizada e totalmente atenuada, tradicionalmente servida dos tanques de maturação. Pode ser um pouco mais rica, robusta e rústica do que os estilos base. Uma cerveja fresca sem defeitos de fermentação associados à cerveja jovem e verde (inacabada).
      aroma: Reflete o estilo base. Pode ter um caráter de pão e fermento adicionado pela levedura. Aroma limpo. Versões claras podem ter um caráter de lúpulo mais robusto. Versões escuras podem ter um perfil de malte mais rico.
      appearance: Reflete o estilo base. Pode ser turva ou levemente turva, nunca com turbidez excessiva. Provavelmente um pouco mais escura na aparência do que o estilo base.
      flavor: Reflete o estilo base. Pode ter um caráter de pão e fermento adicionado pela levedura. Versões claras podem ter um caráter de lúpulo mais robusto. As versões escuras podem ter um perfil de malte mais rico, mas nunca devem ter o caráter torrado. Pode ser um pouco mais amarga que o estilo base e um pouco mais pesada no final. Totalmente fermentada com um perfil de fermentação limpo; não deve apresentar defeitos que remetam a ovo, amanteigado, maçã ou similares.
      mouthfeel: Reflete o estilo base. Pode ter um pouco mais de corpo e uma textura mais cremosa do que o estilo base. Carbonatação típica do estilo base, mas pode ser menor.
      comments: Mais do que um estilo de cerveja, um estilo tradicional de servir, mas essas cervejas têm diferenças sensoriais das cervejas básicas. Devem ser julgadas como cervejas especiais; considere a variedade de kellerbiers com base na Helles para a Märzen para a Dunkel como um espectro contínuo, portanto, permita que o cervejeiro escolha a mais próxima, sem ser muito exigente quanto à adesão estrita ao estilo base. O nome significa literalmente cerveja de adega e é o manuseio suave e natural de uma lagerbier alemã de sabor fresco para serviço sazonal no local. Como as British Bitters é melhor apreciada localmente, pois os exemplares engarrafados podem não ter o frescor característico.
      history: Originalmente se referia à cerveja lager maturada nas cavernas ou adegas sob a cervejaria e depois servida a partir delas. Adaptada pela primeira vez à âmbar lager da Francônia, depois aos estilos locais de Munique. Mais recentemente, usada internacionalmente para criar variantes especiais da Pils. Por tradição, um estilo de servir para uma peculiaridade popular de verão na Baviera, mas agora amplamente adaptada como um termo de propaganda para lagers não filtradas.
      ingredients: Igual aos estilos básicos. Tradicionalmente carbonatada naturalmente. O dry-hopping não é um método tradicional de fabricação de cerveja alemã, mas alguns exemplos claros modernos usam essa técnica - que é permitida nesse estilo, desde que seja equilibrada. Tradicionalmente maturada a frio e não filtrada, essas cervejas nunca foram feitas para serem embaladas para venda externa.
      comparison: Mais rica ou mais robusta que o estilo base, possivelmente com um pouco mais de corpo e sensação na boca. Pode ser um pouco mais turva que a cerveja base.
      statistics:
        notes: As mesmas do estilo base.
      examples:
      - Märzen - Faust Kräusen Naturtrüb
      - Mahrs Bräu aU Ungespundet Kellerbier; Dunkel - Engel Kellerbier Dunkel
      - Paulaner Ur-Dunkel Naturtrüb; Helles - ABK Kellerbier Naturtrüb
      - Löwenbräu 1747 Original; Pils - Giesinger Feines Pilschen
      - Ketterer Zwickel-Pils
    - id: 27A
      name: 'Historical Beer: Kentucky Common'
      impression: Uma cerveja escura, limpa, seca, refrescante, ligeiramente maltada e com alta carbonatação. De sabor suave, com leve tostado e sabores de caramelo, servida bem fresca como uma cerveja leve, de salão.
      aroma: Maltado de baixo a médio como cereais, semelhante a milho ou dulçor de malte, com um leve tostado, cereal tipo biscoito, pão ou caramelo. Aroma de lúpulo de médio a moderadamente baixo, geralmente com caráter floral ou condimentado. Perfil limpo de fermentação, com possível éster leve que remete a fruto de baga. Baixos níveis de DMS são opcionais. Sem acidez. O equilíbrio tende ao malte.
      appearance: Cor de âmbar alaranjado a marrom. Normalmente límpida, mas pode ter uma leve turbidez. A formação de espuma pode não ser duradoura e geralmente é de cor branca a bege.
      flavor: Dulçor de malte como cereais moderado com notas de caramelo, toffee, pão ou biscoito de baixo a médio-baixo. Geralmente com sabores leves no palato, típico de cerveja com adjuntos; baixo dulçor de cereais semelhante a milho é comum. Sabor de lúpulo floral ou condimentado de médio a baixo. Amargor de médio a baixo, sem retrogosto áspero ou agressivo. Pode apresentar leve frutado. O equilíbrio no final é em direção ao malte, possivelmente com um sabor levemente mineral (como pederneira) ou mineral-sulfatado. O final é bastante seco. Sem acidez.
      mouthfeel: Corpo de médio a médio-baixo, com sensação na boca relativamente macia. Altamente carbonatada. Pode ter uma textura cremosa.
      comments: Relatos modernos do estilo geralmente mencionam acidez láctica ou uso da técnica sour mash, mas os registros cervejeiros de meados de 1900 em cervejarias maiores não têm indicação de longos descansos ácidos, sour mash ou envelhecimento prolongado. Essas histórias são provavelmente invenções modernas de cervejeiros caseiros, teorizando que, como os destiladores locais de Bourbon usavam sour mash, os cervejeiros também deveriam usá-lo. Nenhum registro indica uso de sour mash ou mesmo um perfil ácido na cerveja; pelo contrário, foi fabricada como uma cerveja barata e consumo rápido. Inscreva as versões ácidas em 28B Mixed-Fermentation Sour Beer.
      history: Kentucky Common, um estilo originalmente americano, foi quase exclusivamente produzido e vendido ao redor de Louisville, Kentucky, de algum período depois da Guerra Civil até a Lei Seca. Era barato e produzido rapidamente, colocado em barris enquanto fermentava ativamente e bem fechado para permitir a carbonatação na adega do salão. Antes da morte do estilo, ele representava cerca de 75% das vendas em torno de Louisville. Alguns especularam que era uma variante escura da Cream Ale, criada por cervejeiros imigrantes germânicos que adicionaram grãos mais escuros para ajudar a acidificar a água local rica em carbonatos.
      ingredients: Malte de cevada de seis fileiras. Grits (canjiquinha) de milho. Malte caramelo e black. Lúpulo americano rústico de amargor. Lúpulos continentais importados para acabamento. Água com alto teor de carbonato. Levedura ale.
      comparison: Como uma Cream Ale de cor mais escura, enfatizando o milho, mas com um leve caráter de malte no sabor. Sabores e equilíbrio de malte são provavelmente mais próximos das lagers modernas com adjuntos como a International Amber ou Dark Lagers, Irish Red Ales ou Belgian Pale Ales.
